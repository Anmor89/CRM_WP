<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>West Part CRM</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; -webkit-font-smoothing: antialiased; }
body { background: #F3F4F6; color: #111827; font-size: 14px; line-height: 1.5; }

:root {
  --wp-yellow: #FFC72C;
  --wp-yellow-dark: #E6B324;
  --wp-yellow-soft: #FFF4D1;
  --wp-black: #0F1115;
  --wp-black-2: #1A1D24;
  --wp-black-3: #252932;
  --bg: #F3F4F6;
  --surface: #FFFFFF;
  --border: #E5E7EB;
  --border-2: #D1D5DB;
  --text: #111827;
  --text-muted: #6B7280;
  --text-soft: #9CA3AF;
  --success: #16A34A;
  --success-soft: #DCFCE7;
  --warning: #F59E0B;
  --warning-soft: #FEF3C7;
  --danger: #DC2626;
  --danger-soft: #FEE2E2;
  --info: #2563EB;
  --info-soft: #DBEAFE;
  --indigo: #6366F1;
  --indigo-soft: #E0E7FF;
  --teal: #14B8A6;
  --teal-soft: #CCFBF1;
  --purple: #8B5CF6;
  --purple-soft: #EDE9FE;
  --pink: #EC4899;
  --pink-soft: #FCE7F3;
  --shadow-sm: 0 1px 2px rgba(15, 17, 21, 0.06);
  --shadow: 0 4px 12px rgba(15, 17, 21, 0.08);
  --shadow-lg: 0 16px 48px rgba(15, 17, 21, 0.18);
  --radius: 10px;
  --radius-sm: 6px;
}

.hidden { display: none !important; }
button { font: inherit; cursor: pointer; }
input, select, textarea { font: inherit; color: inherit; }
a { color: inherit; text-decoration: none; }

/* ========== LOGIN ========== */
.login-screen {
  position: fixed; inset: 0;
  background: radial-gradient(ellipse at top, #1A1D24 0%, #0F1115 70%);
  display: flex; align-items: center; justify-content: center;
  z-index: 100;
}
.login-card {
  background: var(--surface);
  border-radius: 16px;
  padding: 40px 36px;
  width: 100%; max-width: 380px;
  box-shadow: 0 24px 64px rgba(0,0,0,0.35);
  border-top: 4px solid var(--wp-yellow);
}
.login-logo { width: 140px; display: block; margin: 0 auto 20px; }
.login-card h1 { font-size: 28px; font-weight: 800; text-align: center; letter-spacing: -0.02em; }
.login-card .subtitle { text-align: center; color: var(--text-muted); margin: 6px 0 28px; font-size: 13px; }
.login-card form { display: flex; flex-direction: column; gap: 12px; }
.login-card input {
  padding: 12px 14px; border: 1px solid var(--border);
  border-radius: var(--radius); background: #FAFAFA;
  transition: all 0.15s;
}
.login-card input:focus { outline: none; border-color: var(--wp-yellow); background: white; box-shadow: 0 0 0 3px rgba(255,199,44,0.15); }
.login-card button[type="submit"] {
  padding: 12px; background: var(--wp-black); color: white;
  border: none; border-radius: var(--radius); font-weight: 600;
  margin-top: 4px; transition: background 0.15s;
}
.login-card button[type="submit"]:hover { background: var(--wp-black-2); }
.login-hint {
  margin-top: 22px; padding: 12px 14px;
  background: var(--wp-yellow-soft); border-radius: var(--radius);
  font-size: 12px; line-height: 1.6; color: #5C4914;
}
.login-hint b { color: #3A2F0F; }
.login-error {
  margin-top: 8px; padding: 10px 12px;
  background: var(--danger-soft); color: var(--danger);
  border-radius: var(--radius-sm); font-size: 13px;
}

/* ========== APP LAYOUT ========== */
.app { display: flex; height: 100vh; overflow: hidden; }

/* Sidebar */
.sidebar {
  width: 240px; flex-shrink: 0;
  background: var(--wp-black);
  color: #D1D5DB;
  display: flex; flex-direction: column;
}
.brand {
  padding: 20px 20px 16px;
  display: flex; align-items: center; gap: 10px;
  border-bottom: 1px solid var(--wp-black-3);
}
.brand img {
  width: 100px; height: auto;
  /* Using the dark-mode version with transparent background and white text */
}
.brand .crm-label {
  font-size: 11px; font-weight: 700; letter-spacing: 0.15em;
  color: #FFFFFF; padding: 3px 8px;
  border: 1px solid rgba(255, 255, 255, 0.55); border-radius: 4px;
  margin-left: auto;
}
.nav { padding: 12px 10px; flex: 1; overflow-y: auto; }
.nav-section {
  padding: 14px 12px 6px; font-size: 11px;
  letter-spacing: 0.1em; text-transform: uppercase;
  color: #6B7280; font-weight: 600;
}
.nav a {
  display: flex; align-items: center; gap: 12px;
  padding: 10px 12px; border-radius: 8px; margin: 1px 0;
  color: #D1D5DB; font-weight: 500; font-size: 14px;
  transition: all 0.12s; cursor: pointer;
}
.nav a:hover { background: var(--wp-black-2); color: white; }
.nav a.active { background: var(--wp-yellow); color: var(--wp-black); font-weight: 600; }
.nav a.active .nav-icon { color: var(--wp-black); }
.nav-icon { width: 18px; height: 18px; display: inline-flex; align-items: center; color: #9CA3AF; }
.nav-badge {
  margin-left: auto; background: var(--wp-black-3); color: #D1D5DB;
  font-size: 11px; font-weight: 600; padding: 2px 8px; border-radius: 10px;
}
.nav a.active .nav-badge { background: rgba(15,17,21,0.15); color: var(--wp-black); }

.user-block {
  padding: 14px 16px; border-top: 1px solid var(--wp-black-3);
  display: flex; align-items: center; gap: 10px;
}
.user-avatar {
  width: 36px; height: 36px; border-radius: 50%;
  background: var(--wp-yellow); color: var(--wp-black);
  font-weight: 700; display: flex; align-items: center; justify-content: center;
  font-size: 14px;
}
.user-info { flex: 1; min-width: 0; }
.user-name { color: white; font-weight: 600; font-size: 13px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.user-role { color: #9CA3AF; font-size: 11px; }
.logout-btn {
  background: transparent; border: 1px solid var(--wp-black-3);
  color: #9CA3AF; padding: 6px 8px; border-radius: 6px;
  transition: all 0.15s;
}
.logout-btn:hover { background: var(--wp-black-2); color: white; }

/* Main */
.main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
.topbar {
  background: var(--surface); border-bottom: 1px solid var(--border);
  padding: 14px 28px; display: flex; align-items: center; gap: 20px;
}
.topbar-title { font-size: 20px; font-weight: 700; letter-spacing: -0.01em; }
.topbar-search { flex: 1; max-width: 420px; position: relative; }
.topbar-search input {
  width: 100%; padding: 9px 14px 9px 38px;
  border: 1px solid var(--border); border-radius: 8px;
  background: #F9FAFB;
}
.topbar-search input:focus { outline: none; border-color: var(--wp-yellow); background: white; box-shadow: 0 0 0 3px rgba(255,199,44,0.15); }
.topbar-search::before {
  content: ''; position: absolute; left: 12px; top: 50%; transform: translateY(-50%);
  width: 16px; height: 16px;
  background: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='16' height='16' viewBox='0 0 24 24' fill='none' stroke='%236B7280' stroke-width='2'><circle cx='11' cy='11' r='8'/><line x1='21' y1='21' x2='16.65' y2='16.65'/></svg>") no-repeat;
}
.topbar-actions { display: flex; align-items: center; gap: 10px; margin-left: auto; }

.view-container { flex: 1; overflow-y: auto; padding: 24px 28px 40px; }

/* ========== BUTTONS ========== */
.btn {
  padding: 9px 16px; border-radius: 8px; border: 1px solid var(--border);
  background: white; color: var(--text); font-weight: 500;
  transition: all 0.15s; display: inline-flex; align-items: center; gap: 6px;
  white-space: nowrap;
}
.btn:hover { background: #F9FAFB; }
.btn-primary { background: var(--wp-yellow); color: var(--wp-black); border-color: var(--wp-yellow); font-weight: 600; }
.btn-primary:hover { background: var(--wp-yellow-dark); border-color: var(--wp-yellow-dark); }
.btn-dark { background: var(--wp-black); color: white; border-color: var(--wp-black); }
.btn-dark:hover { background: var(--wp-black-2); }
.btn-ghost { background: transparent; border-color: transparent; color: var(--text-muted); }
.btn-ghost:hover { background: #F3F4F6; color: var(--text); }
.btn-danger { background: white; border-color: var(--danger); color: var(--danger); }
.btn-danger:hover { background: var(--danger-soft); }
.btn-sm { padding: 6px 10px; font-size: 12px; }
.btn-icon { padding: 8px; }

/* ========== CARDS / GRID ========== */
.card {
  background: var(--surface); border-radius: var(--radius);
  border: 1px solid var(--border); box-shadow: var(--shadow-sm);
}
.card-header {
  padding: 16px 20px; border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between; gap: 12px;
}
.card-title { font-size: 15px; font-weight: 600; }
.card-body { padding: 20px; }
.card-row { display: flex; align-items: center; gap: 12px; padding: 12px 20px; border-bottom: 1px solid var(--border); }
.card-row:last-child { border-bottom: none; }

.grid { display: grid; gap: 16px; }
.grid-2 { grid-template-columns: repeat(2, 1fr); }
.grid-3 { grid-template-columns: repeat(3, 1fr); }
.grid-4 { grid-template-columns: repeat(4, 1fr); }
.grid-5 { grid-template-columns: repeat(5, 1fr); }
@media (max-width: 1200px) {
  .grid-4 { grid-template-columns: repeat(2, 1fr); }
  .grid-5 { grid-template-columns: repeat(3, 1fr); }
}

/* ========== KPI CARDS ========== */
.kpi {
  background: var(--surface); padding: 12px 14px; border-radius: var(--radius);
  border: 1px solid var(--border); position: relative; overflow: hidden;
}
.kpi-label { font-size: 11px; color: var(--text-muted); font-weight: 500; text-transform: uppercase; letter-spacing: 0.04em; }
.kpi-value { font-size: 20px; font-weight: 700; margin-top: 2px; letter-spacing: -0.01em; }
.kpi-sub { font-size: 11px; color: var(--text-muted); margin-top: 2px; }
.kpi-delta { font-size: 12px; font-weight: 600; margin-top: 6px; display: inline-flex; align-items: center; gap: 3px; }
.kpi-delta.pos { color: var(--success); }
.kpi-delta.neg { color: var(--danger); }
.kpi-accent { position: absolute; top: 0; right: 0; width: 4px; height: 100%; background: var(--wp-yellow); }
.kpi.dark { background: var(--wp-black); color: white; }
.kpi.dark .kpi-label { color: #9CA3AF; }
.kpi.dark .kpi-sub { color: #9CA3AF; }
.kpi.dark .kpi-accent { background: var(--wp-yellow); }

/* ========== STATUS / CHIPS ========== */
.chip {
  display: inline-flex; align-items: center; gap: 5px;
  padding: 3px 9px; border-radius: 999px;
  font-size: 11px; font-weight: 600; line-height: 1.4;
  white-space: nowrap;
}
.chip-dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; }
.chip-stage-contact { background: var(--indigo-soft); color: #4338CA; }
.chip-stage-talks { background: var(--info-soft); color: var(--info); }
.chip-stage-contract { background: var(--warning-soft); color: #92400E; }
.chip-stage-firstorder { background: var(--teal-soft); color: #0F766E; }
.chip-stage-active { background: var(--success-soft); color: #166534; }
.chip-stage-reject { background: var(--danger-soft); color: var(--danger); }
.chip-cat-A { background: #DCFCE7; color: #166534; }
.chip-cat-B { background: #FEF3C7; color: #92400E; }
.chip-cat-C { background: #FEE2E2; color: var(--danger); }
.chip-default { background: #F3F4F6; color: #4B5563; }
.chip-activity { background: #F1F5F9; color: #475569; }
.chip-yellow { background: var(--wp-yellow-soft); color: #5C4914; }
.chip-success { background: var(--success-soft); color: #166534; }
.chip-danger { background: var(--danger-soft); color: var(--danger); }
.chip-info { background: var(--info-soft); color: var(--info); }

/* ========== TABLE ========== */
.table-wrap { background: var(--surface); border-radius: var(--radius); border: 1px solid var(--border); overflow: hidden; }
table.data { width: 100%; border-collapse: collapse; }
table.data th, table.data td {
  padding: 10px 16px; text-align: left;
  border-bottom: 1px solid var(--border); font-size: 13px;
}
table.data th { background: #F9FAFB; font-weight: 600; color: var(--text-muted); font-size: 11px; letter-spacing: 0.05em; text-transform: uppercase; position: sticky; top: 0; z-index: 1; }
table.data th.sortable { cursor: pointer; user-select: none; }
table.data th.sortable:hover { background: #F1F2F4; color: var(--text); }
table.data th .sort-ind { display: inline-block; width: 12px; opacity: 0.4; margin-left: 4px; font-size: 10px; vertical-align: middle; }
table.data th.sort-asc .sort-ind, table.data th.sort-desc .sort-ind { opacity: 1; color: var(--wp-black); }
table.data th.sort-asc .sort-ind::after { content: '▲'; }
table.data th.sort-desc .sort-ind::after { content: '▼'; }
table.data tbody tr:last-child td { border-bottom: none; }
table.data tbody tr { transition: background 0.1s; }
table.data tbody tr:hover { background: #FAFBFC; cursor: pointer; }
.num { font-variant-numeric: tabular-nums; text-align: right !important; white-space: nowrap; }
.muted { color: var(--text-muted); }

/* ========== FUNNEL (Kanban) ========== */
.funnel-board { display: grid; grid-template-columns: repeat(6, minmax(220px, 1fr)); gap: 12px; overflow-x: auto; padding-bottom: 10px; }
.funnel-col {
  background: #F9FAFB; border-radius: var(--radius); border: 1px solid var(--border);
  display: flex; flex-direction: column; max-height: calc(100vh - 280px);
}
.funnel-col-head {
  padding: 14px 14px 10px; border-bottom: 1px solid var(--border);
  display: flex; align-items: center; gap: 8px;
}
.funnel-col-title { font-weight: 600; font-size: 13px; flex: 1; }
.funnel-col-count { background: var(--surface); border: 1px solid var(--border); padding: 1px 8px; border-radius: 10px; font-size: 12px; font-weight: 600; }
.funnel-col-bar { height: 3px; }
.funnel-col-body { flex: 1; overflow-y: auto; padding: 10px; display: flex; flex-direction: column; gap: 8px; }
.funnel-card {
  background: var(--surface); border-radius: 8px; border: 1px solid var(--border);
  padding: 10px 12px; cursor: pointer; transition: all 0.15s;
  box-shadow: var(--shadow-sm);
}
.funnel-card:hover { box-shadow: var(--shadow); transform: translateY(-1px); border-color: var(--wp-yellow); }
.funnel-card-name { font-weight: 600; font-size: 13px; line-height: 1.3; }
.funnel-card-meta { margin-top: 6px; display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
.funnel-card-rev { font-size: 11px; color: var(--text-muted); margin-top: 4px; }
.funnel-card[draggable="true"] { cursor: grab; }
.funnel-card.dragging { opacity: 0.4; cursor: grabbing; }
.funnel-col-body.drag-over { background: var(--wp-yellow-soft); box-shadow: inset 0 0 0 2px var(--wp-yellow); border-radius: var(--radius-sm); }

/* funnel visualization (analytics) */
.funnel-viz { padding: 20px; display: flex; flex-direction: column; gap: 8px; }
.funnel-stage {
  display: flex; align-items: center; gap: 14px;
  padding: 10px 14px; border-radius: 8px;
  background: var(--surface); border: 1px solid var(--border);
}
.funnel-stage-bar { flex: 1; height: 26px; background: #F3F4F6; border-radius: 6px; overflow: hidden; position: relative; }
.funnel-stage-bar-fill { height: 100%; border-radius: 6px; transition: width 0.4s; }
.funnel-stage-label { font-weight: 500; min-width: 160px; font-size: 13px; }
.funnel-stage-count { font-weight: 700; font-size: 14px; min-width: 50px; text-align: right; font-variant-numeric: tabular-nums; }
.funnel-stage-clickable { cursor: pointer; transition: all 0.15s; }
.funnel-stage-clickable:hover { border-color: var(--wp-yellow); background: #FFFDF5; transform: translateX(2px); }
.funnel-stage-clickable.is-selected { border-color: var(--wp-yellow); background: var(--wp-yellow-soft); box-shadow: inset 3px 0 0 var(--wp-yellow); }
.funnel-stage-pct { font-size: 11px; color: var(--text-muted); min-width: 50px; text-align: right; font-variant-numeric: tabular-nums; }

/* ========== FORMS ========== */
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-bottom: 14px; }
.form-row.full { grid-template-columns: 1fr; }
.form-row.three { grid-template-columns: 1fr 1fr 1fr; }
label.field { display: flex; flex-direction: column; gap: 5px; }
label.field span { font-size: 12px; font-weight: 600; color: var(--text-muted); }
label.field input, label.field select, label.field textarea {
  padding: 9px 12px; border: 1px solid var(--border);
  border-radius: var(--radius-sm); background: white;
}
label.field input:focus, label.field select:focus, label.field textarea:focus {
  outline: none; border-color: var(--wp-yellow);
  box-shadow: 0 0 0 3px rgba(255,199,44,0.15);
}
label.field textarea { min-height: 80px; resize: vertical; font-family: inherit; }

/* ========== MODAL ========== */
.modal-layer {
  position: fixed; inset: 0; background: rgba(15,17,21,0.5);
  display: flex; align-items: flex-start; justify-content: center;
  padding: 60px 20px 20px; z-index: 50; overflow-y: auto;
  backdrop-filter: blur(2px);
}
.modal {
  background: var(--surface); border-radius: 14px; width: 100%; max-width: 880px;
  box-shadow: var(--shadow-lg); overflow: hidden;
}
.modal.modal-wide { max-width: 1180px; }

/* Section headings within client card */
.card-section-h {
  font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em;
  color: var(--text-muted); margin: 18px 0 10px;
  border-bottom: 1px solid var(--border); padding-bottom: 6px;
}
.card-section-h:first-child { margin-top: 0; }

/* 2-column field layout */
.info-grid-2col { display: grid; grid-template-columns: 1fr 1fr; gap: 12px 24px; }
@media (max-width: 900px) { .info-grid-2col { grid-template-columns: 1fr; } }
.field-row { display: flex; flex-direction: column; gap: 4px; }
.field-row > span { font-size: 12px; font-weight: 500; color: var(--text-muted); }
.field-row > input, .field-row > select, .field-row > textarea {
  padding: 8px 12px; border: 1px solid var(--border); border-radius: var(--radius-sm); background: white; font-size: 14px;
}
.field-row > input:focus, .field-row > select:focus, .field-row > textarea:focus {
  outline: none; border-color: var(--wp-yellow); box-shadow: 0 0 0 3px rgba(255,199,44,0.15);
}
.field-row > input::placeholder, .field-row > textarea::placeholder { color: var(--text-soft); }

.big-comment {
  width: 100%; padding: 12px 14px; border: 1px solid var(--border); border-radius: var(--radius);
  background: #FCFCFD; font-size: 14px; font-family: inherit; resize: vertical; min-height: 80px;
}
.big-comment:focus { outline: none; border-color: var(--wp-yellow); background: white; box-shadow: 0 0 0 3px rgba(255,199,44,0.15); }
.big-comment::placeholder { color: var(--text-soft); font-style: italic; }

/* Embedded activity block inside card */
.embedded-activity {
  background: #FAFBFC; border: 1px solid var(--border); border-radius: var(--radius); padding: 14px;
}
.embedded-activity .comment-form { background: white; }
.embedded-activity .timeline { max-height: 280px; overflow-y: auto; padding: 0 4px; }

/* Wider modal body with comfortable padding */
.modal.modal-wide .modal-body { padding: 24px 32px; }
.client-card-grid { display: flex; flex-direction: column; gap: 14px; }

/* Status block: stage + category side by side */
.status-block {
  display: grid; grid-template-columns: 1fr 1fr; gap: 14px;
  background: linear-gradient(180deg, #FAFBFC 0%, #F3F4F6 100%);
  border: 1px solid var(--border); border-radius: var(--radius); padding: 14px 18px;
}
.status-cell { display: flex; flex-direction: column; gap: 6px; }
.status-label { font-size: 11px; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.05em; }
.status-value { min-height: 26px; display: flex; align-items: center; }
.status-reason { font-size: 12px; color: var(--text-muted); line-height: 1.4; min-height: 18px; }
.status-override { padding: 7px 10px; border: 1px solid var(--border); border-radius: 6px; background: white; font-size: 13px; margin-top: 4px; }
.status-override:focus { outline: none; border-color: var(--wp-yellow); }

/* Collapsible sections */
.card-collapse {
  border: 1px solid var(--border); border-radius: var(--radius);
  background: var(--surface); overflow: hidden;
  transition: all 0.15s;
}
.card-collapse[open] { background: #FCFDFE; border-color: var(--border-2); }
.card-collapse > summary {
  cursor: pointer; padding: 12px 16px; font-weight: 600; font-size: 14px;
  display: flex; align-items: center; gap: 10px;
  user-select: none; list-style: none;
}
.card-collapse > summary::-webkit-details-marker { display: none; }
.card-collapse > summary::before {
  content: '▸'; font-size: 11px; color: var(--text-muted);
  transition: transform 0.15s; display: inline-block; width: 12px;
}
.card-collapse[open] > summary::before { transform: rotate(90deg); }
.card-collapse > summary:hover { background: #F9FAFB; }
.card-collapse[open] > summary { border-bottom: 1px solid var(--border); }
.card-collapse > *:not(summary) { padding: 0 16px 16px; }
.summary-hint { font-weight: 400; color: var(--text-muted); font-size: 13px; margin-left: 8px; }
.modal-header {
  padding: 18px 24px; border-bottom: 1px solid var(--border);
  display: flex; align-items: center; gap: 14px;
}
.modal-title { font-size: 18px; font-weight: 700; flex: 1; letter-spacing: -0.01em; }
.modal-close { background: transparent; border: none; padding: 8px; border-radius: 6px; color: var(--text-muted); }
.modal-close:hover { background: #F3F4F6; color: var(--text); }
.modal-body { padding: 20px 24px; max-height: calc(100vh - 200px); overflow-y: auto; }
.modal-footer { padding: 14px 24px; border-top: 1px solid var(--border); display: flex; justify-content: flex-end; gap: 10px; background: #FAFBFC; }

/* ========== CLIENT CARD (modal) ========== */
.client-tabs { display: flex; gap: 2px; padding: 0 24px; border-bottom: 1px solid var(--border); background: var(--surface); margin: -20px -24px 20px; }
.client-tab { padding: 12px 16px; border: none; background: transparent; color: var(--text-muted); font-weight: 500; border-bottom: 2px solid transparent; transition: all 0.15s; }
.client-tab:hover { color: var(--text); }
.client-tab.active { color: var(--wp-black); border-bottom-color: var(--wp-yellow); font-weight: 600; }

/* ========== PAGE TABS ========== */
.page-tabs { display: flex; gap: 4px; margin-bottom: 16px; border-bottom: 1px solid var(--border); }
.page-tab { padding: 10px 16px; border: none; background: transparent; color: var(--text-muted); font-weight: 500; border-bottom: 2px solid transparent; transition: all 0.15s; font-size: 14px; cursor: pointer; }
.page-tab:hover { color: var(--text); }
.page-tab.active { color: var(--wp-black); border-bottom-color: var(--wp-yellow); font-weight: 600; }

/* Settings */
.setting-row { display: flex; align-items: center; gap: 10px; padding: 8px 0; cursor: pointer; }
.setting-row input[type="checkbox"] { width: 16px; height: 16px; accent-color: var(--wp-yellow); }
.setting-row span { font-size: 14px; }
.setting-input { padding: 6px 10px; border: 1px solid var(--border); border-radius: 6px; font-size: 13px; }
.setting-input:focus { outline: none; border-color: var(--wp-yellow); }
.manager-row { display: flex; align-items: center; gap: 10px; padding: 8px 12px; border: 1px solid var(--border); border-radius: 8px; background: #FAFBFC; }

.client-header {
  display: flex; align-items: flex-start; gap: 16px; padding: 18px 24px;
  background: linear-gradient(135deg, var(--wp-black) 0%, var(--wp-black-2) 100%);
  color: white; margin: -20px -24px 0;
}
.client-header-avatar {
  width: 56px; height: 56px; border-radius: 12px;
  background: var(--wp-yellow); color: var(--wp-black);
  display: flex; align-items: center; justify-content: center;
  font-weight: 800; font-size: 22px; flex-shrink: 0;
}
.client-header-info { flex: 1; min-width: 0; }
.client-header-name { font-size: 20px; font-weight: 700; letter-spacing: -0.01em; }
.client-header-meta { margin-top: 6px; color: #D1D5DB; font-size: 13px; display: flex; gap: 12px; flex-wrap: wrap; }
.client-header-meta span { display: inline-flex; align-items: center; gap: 5px; }

.info-grid { display: grid; grid-template-columns: 180px 1fr; gap: 8px 16px; align-items: center; }
.info-grid .info-label { font-size: 12px; color: var(--text-muted); font-weight: 500; }
.info-grid .info-value { font-size: 13px; font-weight: 500; }
.info-grid .info-value input, .info-grid .info-value select, .info-grid .info-value textarea {
  width: 100%; padding: 6px 10px; border: 1px solid var(--border); border-radius: 6px; background: white;
}
.info-grid .info-value input:focus, .info-grid .info-value select:focus, .info-grid .info-value textarea:focus {
  outline: none; border-color: var(--wp-yellow); box-shadow: 0 0 0 3px rgba(255,199,44,0.15);
}

/* Timeline */
.timeline { padding: 0; }
.timeline-item {
  display: flex; gap: 12px; padding: 12px 0;
  border-bottom: 1px solid var(--border);
}
.timeline-item:last-child { border-bottom: none; }
.timeline-dot {
  width: 32px; height: 32px; border-radius: 50%;
  background: var(--wp-yellow-soft); color: #5C4914;
  display: flex; align-items: center; justify-content: center; flex-shrink: 0;
  font-size: 13px; font-weight: 700;
}
.timeline-content { flex: 1; min-width: 0; }
.timeline-head { display: flex; align-items: baseline; gap: 8px; }
.timeline-author { font-weight: 600; font-size: 13px; }
.timeline-date { font-size: 12px; color: var(--text-muted); }
.timeline-body { margin-top: 4px; font-size: 13px; color: var(--text); line-height: 1.5; }
.timeline-kind { display: inline-block; padding: 1px 7px; background: var(--wp-yellow-soft); color: #5C4914; font-size: 11px; font-weight: 600; border-radius: 4px; margin-right: 6px; }

.comment-form {
  background: #F9FAFB; border-radius: var(--radius); padding: 14px;
  border: 1px solid var(--border); margin-bottom: 16px;
}
.comment-form-row { display: flex; gap: 10px; align-items: center; margin-bottom: 10px; }
.comment-form textarea { width: 100%; min-height: 70px; padding: 10px; border: 1px solid var(--border); border-radius: var(--radius-sm); background: white; resize: vertical; font-family: inherit; }
.comment-form select { padding: 7px 10px; border: 1px solid var(--border); border-radius: 6px; background: white; }

/* ========== CALENDAR ========== */
.calendar-head { display: flex; align-items: center; gap: 12px; padding: 14px 20px; border-bottom: 1px solid var(--border); }
.calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); }
.calendar-wd { padding: 8px 10px; font-size: 11px; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.05em; border-bottom: 1px solid var(--border); }
.calendar-day { min-height: 110px; border-right: 1px solid var(--border); border-bottom: 1px solid var(--border); padding: 8px; position: relative; }
.calendar-day.out { background: #FAFBFC; color: var(--text-soft); }
.calendar-day.today .calendar-daynum { background: var(--wp-yellow); color: var(--wp-black); }
.calendar-daynum { font-size: 13px; font-weight: 600; width: 24px; height: 24px; border-radius: 6px; display: inline-flex; align-items: center; justify-content: center; }
.calendar-event {
  margin-top: 4px; padding: 4px 7px; background: var(--info-soft); color: var(--info);
  font-size: 11px; border-radius: 4px; cursor: pointer; line-height: 1.3;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.calendar-event.k-call { background: var(--info-soft); color: var(--info); }
.calendar-event.k-meeting { background: var(--purple-soft); color: var(--purple); }
.calendar-event.k-contract { background: var(--warning-soft); color: #92400E; }
.calendar-event.k-followup { background: var(--success-soft); color: #166534; }

/* ========== ANALYTICS / CHARTS ========== */
.chart-card { background: var(--surface); border-radius: var(--radius); border: 1px solid var(--border); padding: 18px 20px; }
.chart-card h3 { font-size: 15px; font-weight: 600; margin-bottom: 14px; }
.chart-box { position: relative; height: 280px; }
.chart-box-sm { position: relative; height: 220px; }

/* ========== MISC ========== */
.flex { display: flex; }
.gap-2 { gap: 8px; } .gap-3 { gap: 12px; } .gap-4 { gap: 16px; }
.items-center { align-items: center; }
.justify-between { justify-content: space-between; }
.mt-3 { margin-top: 12px; } .mt-4 { margin-top: 16px; } .mt-5 { margin-top: 20px; } .mt-6 { margin-top: 24px; }
.mb-3 { margin-bottom: 12px; } .mb-4 { margin-bottom: 16px; }
.text-sm { font-size: 12px; }
.text-muted { color: var(--text-muted); }
.text-right { text-align: right; }
.fw-600 { font-weight: 600; } .fw-700 { font-weight: 700; }

.empty-state { padding: 60px 20px; text-align: center; color: var(--text-muted); }
.empty-state-icon { font-size: 36px; margin-bottom: 8px; opacity: 0.4; }

.filter-bar {
  display: flex; gap: 10px; flex-wrap: wrap;
  padding: 14px 0; align-items: center;
}
.filter-bar select, .filter-bar input {
  padding: 8px 12px; border: 1px solid var(--border); border-radius: var(--radius-sm); background: white; font-size: 13px;
}
.filter-bar input:focus, .filter-bar select:focus { outline: none; border-color: var(--wp-yellow); }

/* per-manager funnel mini */
.mini-funnel {
  display: flex; gap: 1px; border-radius: 4px; overflow: hidden; height: 8px; margin-top: 8px;
}
.mini-funnel-bar { flex: 1; }

.contract-status-active { color: var(--success); font-weight: 600; }
.contract-status-none { color: var(--text-muted); }

/* progress bar */
.progress { height: 8px; background: #F3F4F6; border-radius: 4px; overflow: hidden; }
.progress-fill { height: 100%; background: var(--wp-yellow); transition: width 0.4s; }
.progress-fill.success { background: var(--success); }
.progress-fill.danger { background: var(--danger); }

/* search highlight */
mark { background: var(--wp-yellow-soft); padding: 0 2px; border-radius: 2px; color: inherit; }

.activity-СТО { background: #DBEAFE; color: #1E40AF; }
.activity-АТП { background: #FEF3C7; color: #92400E; }
.activity-Розничный.магазин, .activity-rm { background: #DCFCE7; color: #166534; }
.activity-Интернет.магазин, .activity-im { background: #EDE9FE; color: #5B21B6; }
.activity-Агрозапчасти, .activity-ag { background: #ECFCCB; color: #4D7C0F; }
.activity-Масла.и.смазки, .activity-oil { background: #CCFBF1; color: #115E59; }
.activity-Маркетплейс, .activity-mp { background: #FCE7F3; color: #9D174D; }
.activity-ОПТ, .activity-opt { background: #F3F4F6; color: #374151; }
.activity-Другое, .activity-other { background: #E5E7EB; color: #4B5563; }
</style>
</head>

// =================== UTIL ===================
const fmt = {
  rub(n) {
    if (n === null || n === undefined || isNaN(n)) return '—';
    n = Number(n);
    if (Math.abs(n) >= 1_000_000) return (n / 1_000_000).toFixed(1).replace('.0','') + ' млн ₽';
    if (Math.abs(n) >= 1_000) return Math.round(n / 1000).toLocaleString('ru-RU') + ' тыс ₽';
    return Math.round(n).toLocaleString('ru-RU') + ' ₽';
  },
  rubFull(n) {
    if (n === null || n === undefined || isNaN(n)) return '—';
    return Math.round(Number(n)).toLocaleString('ru-RU') + ' ₽';
  },
  int(n) { if (n === null || n === undefined) return '—'; return Number(n).toLocaleString('ru-RU'); },
  date(d) {
    if (!d) return '—';
    const dt = (d instanceof Date) ? d : new Date(d);
    if (isNaN(dt)) return d;
    return dt.toLocaleDateString('ru-RU', { day:'2-digit', month:'2-digit', year:'numeric' });
  },
  dateLong(d) {
    if (!d) return '—';
    const dt = (d instanceof Date) ? d : new Date(d);
    if (isNaN(dt)) return d;
    return dt.toLocaleDateString('ru-RU', { day:'numeric', month:'long', year:'numeric' });
  },
  initials(name) {
    if (!name) return '?';
    return name.trim().split(/\s+/).slice(0, 2).map(w => w[0]).join('').toUpperCase();
  },
  daysAgo(d) {
    if (!d) return '—';
    const dt = (d instanceof Date) ? d : new Date(d);
    const days = Math.floor((Date.now() - dt.getTime()) / 86400000);
    if (days < 0) return 'в будущем';
    if (days === 0) return 'сегодня';
    if (days === 1) return 'вчера';
    if (days < 7) return `${days} дн. назад`;
    if (days < 30) return `${Math.floor(days/7)} нед. назад`;
    if (days < 365) return `${Math.floor(days/30)} мес. назад`;
    return `${Math.floor(days/365)} г. назад`;
  },
};

function escapeHtml(s) {
  if (s === null || s === undefined) return '';
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

// =================== TABLE SORT ===================
// Marks ALL <th> elements as sortable unless they have data-no-sort or are empty.
// Sorts auto-detects numeric vs string columns from cell content.
function attachTableSort(tableEl) {
  if (!tableEl) return;
  // Auto-mark sortable
  tableEl.querySelectorAll('thead th').forEach(th => {
    if (th.hasAttribute('data-no-sort')) return;
    if (!th.textContent.trim()) return;
    th.classList.add('sortable');
  });
  const headers = tableEl.querySelectorAll('th.sortable');
  headers.forEach((th) => {
    const colIdx = Array.from(th.parentNode.children).indexOf(th);
    if (th.querySelector('.sort-ind')) return; // already wired
    if (th.querySelector('.sort-ind')) return; // already wired
    th.insertAdjacentHTML('beforeend', '<span class="sort-ind"></span>');
    th.onclick = () => {
      const cur = th.classList.contains('sort-asc') ? 'asc' : th.classList.contains('sort-desc') ? 'desc' : null;
      const next = cur === 'asc' ? 'desc' : 'asc';
      // clear other headers
      tableEl.querySelectorAll('th.sortable').forEach(x => { x.classList.remove('sort-asc'); x.classList.remove('sort-desc'); });
      th.classList.add('sort-' + next);
      sortTableBody(tableEl, colIdx, next);
    };
  });
}
function sortTableBody(tableEl, colIdx, dir) {
  const tbody = tableEl.querySelector('tbody');
  if (!tbody) return;
  const rows = Array.from(tbody.querySelectorAll('tr')).filter(r => !r.classList.contains('tr-footer') && r.children.length > colIdx);
  // Determine if column is numeric
  const sample = rows.slice(0, Math.min(rows.length, 8)).map(r => extractCellValue(r.children[colIdx]));
  const allNumeric = sample.every(v => v.num !== null);
  rows.sort((a, b) => {
    const va = extractCellValue(a.children[colIdx]);
    const vb = extractCellValue(b.children[colIdx]);
    let cmp;
    if (allNumeric) cmp = (va.num || 0) - (vb.num || 0);
    else cmp = va.str.localeCompare(vb.str, 'ru');
    return dir === 'asc' ? cmp : -cmp;
  });
  rows.forEach(r => tbody.appendChild(r));
}
function extractCellValue(td) {
  if (!td) return { num: null, str: '' };
  const explicit = td.getAttribute('data-val');
  const raw = (explicit !== null ? explicit : td.textContent || '').trim();
  // Strip thousand separators and non-numeric noise to parse a number
  const numStr = raw.replace(/[\s ]/g, '').replace(/,/g, '.').replace(/[^\d.\-]/g, '');
  const num = numStr === '' || numStr === '-' || numStr === '.' ? null : Number(numStr);
  return { num: isNaN(num) ? null : num, str: raw.toLowerCase() };
}

const NEG_KEYWORDS = ['отказ', 'отказа', 'отказался', 'не работа', 'не работ', 'не сотруд', 'не интерес', 'не нужно', 'не нужны'];
const TALK_KEYWORDS = ['обсужда', 'переговор', 'предложен', 'отправ', 'цены', 'прайс', 'тест', 'образц', 'асс-т', 'ассортимент', 'условия', 'согласов', 'готовы работать', 'готов работать', 'рассматр'];

function computeAutoStage(c) {
  // Returns {stage, reasons[]}
  const reasons = [];
  const months = c.months || {};
  const monthsActive = Object.values(months).filter(v => v && v > 0).length;
  const revenue = c.revenue || 0;
  const comment = (c.comment || '').toLowerCase();
  const contract = !!c.contract_signed;

  // Manual stage override always wins
  if (c.stageManual && STAGE_IDS.includes(c.stageManual)) {
    return { stage: c.stageManual, reasons: ['Установлено вручную'] };
  }

  if (c.stages_flags && c.stages_flags[5]) {
    return { stage: 'reject', reasons: ['Помечен флагом «Отказ в работе»'] };
  }
  if (NEG_KEYWORDS.some(k => comment.includes(k))) {
    return { stage: 'reject', reasons: ['В комментарии есть упоминание отказа'] };
  }

  if (monthsActive >= 3 || c.category === 'A') {
    reasons.push(`Активные продажи (${monthsActive} мес. с выручкой)`);
    if (c.category === 'A') reasons.push('Категория A');
    return { stage: 'active', reasons };
  }
  if (revenue > 0) {
    reasons.push(`Есть выручка ${fmt.rub(revenue)}`);
    return { stage: 'firstorder', reasons };
  }
  if (contract) {
    reasons.push('Договор подписан');
    return { stage: 'contract', reasons };
  }
  if (TALK_KEYWORDS.some(k => comment.includes(k))) {
    reasons.push('Признаки переговоров в комментарии');
    return { stage: 'talks', reasons };
  }
  return { stage: 'contact', reasons: ['Контакт зафиксирован в 1С'] };
}

function clientStage(c) { return computeAutoStage(c).stage; }

// Auto category A/B/C
// A — заказывает > 1 раза в месяц (3+ месяца с продажами за 5)
// B — заказывает 1 раз в месяц или реже (хотя бы 1 месяц)
// C — не отгружается (нет выручки совсем)
function computeAutoCategory(c) {
  const reasons = [];
  if (c.categoryManual && ['A','B','C'].includes(c.categoryManual)) {
    return { category: c.categoryManual, reasons: ['Установлено вручную'] };
  }
  const months = c.months || {};
  const monthsActive = Object.values(months).filter(v => v && v > 0).length;
  const revenue = c.revenue || 0;
  if (monthsActive >= 3) {
    return { category: 'A', reasons: [`Активный (${monthsActive} мес. с продажами)`] };
  }
  if (revenue > 0 || monthsActive >= 1) {
    return { category: 'B', reasons: [`Слабоактивный (${monthsActive} мес. с продажами)`] };
  }
  return { category: 'C', reasons: ['Нет отгрузок'] };
}
function clientCategory(c) { return computeAutoCategory(c).category; }

  applySettings();
  // First run: bootstrap
  state.clients = CLIENTS_RAW.map((c, i) => ({ id: 'c_' + i, createdAt: c.reg_date || null, ...c }));
  state.users = JSON.parse(JSON.stringify(DEFAULT_USERS));
  // Seed a few example comments & events for demo
  const today = new Date();
  function addDays(d, n) { const dt = new Date(d); dt.setDate(dt.getDate()+n); return dt.toISOString(); }
  const interestingClients = state.clients.filter(c => c.revenue > 1_000_000).slice(0, 8);
  interestingClients.forEach((cl, idx) => {
    state.comments.push({
      id: uid(), clientId: cl.id, author: cl.manager,
      text: 'Регулярный заказ, динамика положительная. Согласовали отгрузку на следующий месяц.',
      kind: 'note', date: addDays(today, -idx*3 - 1)
    });
    if (idx % 2 === 0) {
      state.events.push({
        id: uid(), clientId: cl.id, kind: 'call', author: cl.manager,
        date: addDays(today, idx + 1), title: 'Созвон по плану закупки', completed: false
      });
    }
  });
  state.clients.filter(c => c.contract_signed).slice(0, 5).forEach((cl, i) => {
    state.events.push({
      id: uid(), clientId: cl.id, kind: 'contract', author: cl.manager,
      date: addDays(today, i + 3), title: 'Продление договора', completed: false
    });
  });
  persist();
}

// =================== HELPERS ===================
function visibleClients() {
  let list = state.clients;
  if (state.user && state.user.role !== 'admin' && state.user.manager) {
    list = list.filter(c => c.manager === state.user.manager);
  }
  return list;
}

function applyFilters(list) {
  const f = state.filters;
  return list.filter(c => {
    if (f.manager !== 'all' && c.manager !== f.manager) return false;
    if (f.activity !== 'all' && (c.activity || 'Другое') !== f.activity) return false;
    if (f.category !== 'all' && clientCategory(c) !== f.category) return false;
    if (f.stage !== 'all' && clientStage(c) !== f.stage) return false;
    if (f.search) {
      const s = f.search.toLowerCase();
      if (!(c.name||'').toLowerCase().includes(s) &&
          !(c.inn||'').toLowerCase().includes(s) &&
          !(c.name_1c||'').toLowerCase().includes(s) &&
          !(c.manager||'').toLowerCase().includes(s)) return false;
    }
    return true;
  });
}

function uniqueManagers() {
  const s = new Set();
  state.clients.forEach(c => c.manager && s.add(c.manager));
  // include managers added via admin even if no clients yet
  state.users.forEach(u => u.manager && s.add(u.manager));
  if (state.extraManagers) state.extraManagers.forEach(m => s.add(m));
  return Array.from(s).sort();
}
function uniqueActivities() {
  return ['СТО','АТП','Розничный магазин','Интернет магазин','Агрозапчасти','Масла и смазки','Маркетплейс','ОПТ','Другое'];
}

function getClient(id) { return state.clients.find(c => c.id === id); }
function getComments(clientId) {
  return state.comments.filter(c => c.clientId === clientId).sort((a,b) => new Date(b.date) - new Date(a.date));
}
function getEvents(clientId, all=false) {
  const list = state.events.filter(e => e.clientId === clientId);
  if (all) return list.sort((a,b) => new Date(a.date) - new Date(b.date));
  return list.filter(e => !e.completed).sort((a,b) => new Date(a.date) - new Date(b.date));
}

document.getElementById('global-search').addEventListener('input', (e) => {
  state.filters.search = e.target.value;
  if (['clients','funnel'].includes(state.currentView)) renderView();
  if (state.currentView === 'calendar' && typeof _calendarTab !== 'undefined' && _calendarTab === 'feed') drawActivityTable();
});

function renderView() {
  const c = document.getElementById('view-container');
  c.scrollTop = 0;
  switch (state.currentView) {
    case 'dashboard': c.innerHTML = renderDashboard(); afterDashboard(); break;
    case 'funnel': c.innerHTML = renderFunnel(); afterFunnel(); break;
    case 'clients': c.innerHTML = renderClients(); afterClients(); break;
    case 'managers': c.innerHTML = renderManagers(); afterManagers(); break;
    case 'sales': c.innerHTML = renderSales(); afterSales(); break;
    case 'calendar': c.innerHTML = renderCalendar(); afterCalendar(); break;
    case 'contracts': c.innerHTML = renderContracts(); afterContracts(); break;
    case 'analytics': c.innerHTML = renderAnalytics(); afterAnalytics(); break;
    case 'settings': c.innerHTML = renderSettings(); afterSettings(); break;
    case 'admin': c.innerHTML = renderAdmin(); afterAdmin(); break;
    default: c.innerHTML = '<div class="empty-state">Раздел не найден</div>';
  }

    .filter(c => c.reg_date)
    .sort((a, b) => new Date(b.reg_date) - new Date(a.reg_date))

    .filter(e => !e.completed && new Date(e.date) >= new Date(new Date().toDateString()))
    .sort((a,b) => new Date(a.date) - new Date(b.date))
    .slice(0, 6);

  const inFunnel = totalClients - activeCount - (visibleClients().filter(c => clientStage(c) === 'reject').length);
  const w = state.settings.dashboardWidgets;

  return `
    ${w.kpis ? `
    <div class="grid grid-5 mb-4">

        <div class="kpi-accent"></div>
        <div class="kpi-label">Клиентов в базе</div>
        <div class="kpi-value">${fmt.int(totalClients)}</div>

      <div class="kpi">
        <div class="kpi-accent" style="background: var(--info)"></div>
        <div class="kpi-label">В работе</div>
        <div class="kpi-value">${fmt.int(inFunnel)}</div>
        <div class="kpi-sub">в воронке</div>
      </div>
      <div class="kpi">
        <div class="kpi-accent" style="background: var(--success)"></div>
        <div class="kpi-label">Активно работают</div>
        <div class="kpi-value">${fmt.int(activeCount)}</div>
        <div class="kpi-sub">${totalClients?Math.round(activeCount/totalClients*100):0}% от базы</div>
      </div>
      <div class="kpi">
        <div class="kpi-accent" style="background: var(--wp-yellow)"></div>
        <div class="kpi-label">Выручка ${new Date().getFullYear()}</div>
        <div class="kpi-value">${fmt.rub(revenueTotal)}</div>
        <div class="kpi-sub">за период</div>
      </div>
      <div class="kpi">
        <div class="kpi-accent" style="background: ${overdueTotal>0?'var(--danger)':'var(--text-soft)'}"></div>
        <div class="kpi-label">Долг / Просрочено</div>
        <div class="kpi-value">${fmt.rub(debtTotal)}</div>
        <div class="kpi-sub" style="color: ${overdueTotal>0?'var(--danger)':'var(--text-muted)'}">просрочено: ${fmt.rub(overdueTotal)}</div>
      </div>
    </div>
    ` : ''}

    ${(w.funnel || w.upcoming) ? `
    <div class="grid grid-2 mb-4" style="grid-template-columns: ${w.funnel && w.upcoming ? '2fr 1fr' : '1fr'};">
      ${w.funnel ? `
      <div class="card">
        <div class="card-header">
          <div class="card-title">Воронка по клиентам</div>
          <a class="btn btn-ghost btn-sm" id="dash-go-funnel">Открыть →</a>
        </div>
        <div class="funnel-viz">
          ${STAGES.map(s => {
            const cnt = stageCounts[s.id] || 0;

      ${w.topClients ? `

    <div class="funnel-board" id="funnel-board"></div>

function afterFunnel() {
  bindFilterControls();

}
function drawFunnelBoard() {
  const list = applyFilters(visibleClients());
  document.getElementById('f-count').textContent = list.length;
  const buckets = {};
  STAGES.forEach(s => buckets[s.id] = []);
  list.forEach(c => buckets[clientStage(c)].push(c));

  document.getElementById('funnel-board').innerHTML = STAGES.map(s => `
    <div class="funnel-col" data-stage="${s.id}">
      <div class="funnel-col-head">
        <span class="funnel-col-title" style="color:${s.color}">${escapeHtml(s.name)}</span>
        <span class="funnel-col-count">${buckets[s.id].length}</span>
      </div>
      <div class="funnel-col-bar" style="background:${s.color}"></div>
      <div class="funnel-col-body" data-drop="${s.id}">
        ${buckets[s.id].slice(0,40).map(c => funnelCard(c)).join('')}
        ${buckets[s.id].length > 40 ? `<div class="text-sm text-muted" style="text-align:center; padding:6px;">+ ещё ${buckets[s.id].length-40}</div>` : ''}
      </div>
    </div>
  `).join('');

  // Click → open client modal
  document.querySelectorAll('.funnel-card').forEach(el => {
    el.addEventListener('click', () => openClientModal(el.dataset.cid));
  });

  // === Drag-and-drop ===
  let dragId = null;
  document.querySelectorAll('.funnel-card').forEach(card => {
    card.addEventListener('dragstart', (ev) => {
      dragId = card.dataset.cid;
      card.classList.add('dragging');
      ev.dataTransfer.effectAllowed = 'move';
      // Avoid card disappearing during drag in some browsers
      try { ev.dataTransfer.setData('text/plain', dragId); } catch (e) {}
    });
    card.addEventListener('dragend', () => {
      card.classList.remove('dragging');
      document.querySelectorAll('.funnel-col-body.drag-over').forEach(x => x.classList.remove('drag-over'));
      dragId = null;
    });
  });
  document.querySelectorAll('.funnel-col-body[data-drop]').forEach(col => {
    col.addEventListener('dragover', (ev) => { ev.preventDefault(); ev.dataTransfer.dropEffect = 'move'; col.classList.add('drag-over'); });
    col.addEventListener('dragleave', () => col.classList.remove('drag-over'));
    col.addEventListener('drop', (ev) => {
      ev.preventDefault();
      col.classList.remove('drag-over');
      const cid = dragId || ev.dataTransfer.getData('text/plain');
      if (!cid) return;
      const targetStage = col.dataset.drop;
      const cl = getClient(cid);
      if (!cl) return;
      if (clientStage(cl) === targetStage) return; // already there
      cl.stageManual = targetStage;
      persist();
      drawFunnelBoard();
    });
  });
}
function funnelCard(c) {
  const cat = clientCategory(c);
  return `
    <div class="funnel-card" data-cid="${c.id}" draggable="true">
      <div class="funnel-card-name">${escapeHtml(c.name)}</div>
      <div class="funnel-card-meta">
        ${c.activity ? `<span class="chip chip-activity">${escapeHtml(c.activity)}</span>` : ''}
        <span class="chip chip-cat-${cat}">${cat}</span>
      </div>
      ${c.revenue ? `<div class="funnel-card-rev">${fmt.rub(c.revenue)} • ${escapeHtml(c.manager)}</div>` : `<div class="funnel-card-rev">${escapeHtml(c.manager)}</div>`}

  `;
}
function bindFilterControls() {
  const bind = (id, key) => {

function drawCalendar() {
  const d = _cal.date;
  const title = d.toLocaleDateString('ru-RU', { month: 'long', year: 'numeric' });
  document.getElementById('cal-title').textContent = title.charAt(0).toUpperCase() + title.slice(1);
  const y = d.getFullYear(), m = d.getMonth();
  const first = new Date(y, m, 1);
  const last = new Date(y, m+1, 0);
  let startDay = first.getDay(); startDay = startDay === 0 ? 6 : startDay - 1; // Mon=0
  const totalDays = last.getDate();
  const cells = [];
  const prevLast = new Date(y, m, 0).getDate();
  for (let i = startDay; i > 0; i--) cells.push({ d: new Date(y, m-1, prevLast - i + 1), out: true });
  for (let i = 1; i <= totalDays; i++) cells.push({ d: new Date(y, m, i), out: false });
  while (cells.length % 7) cells.push({ d: new Date(y, m+1, cells.length - totalDays - startDay + 1), out: true });

  const eventsByDate = {};
  const visibleEvents = state.user.role === 'admin'
    ? state.events
    : state.events.filter(e => {
        const cl = getClient(e.clientId);
        return cl && cl.manager === state.user.manager;
      });
  visibleEvents.forEach(e => {
    const k = new Date(e.date).toDateString();
    (eventsByDate[k] = eventsByDate[k] || []).push(e);
  });
  const today = new Date().toDateString();

  const wdays = ['Пн','Вт','Ср','Чт','Пт','Сб','Вс'];
  let html = '<div class="calendar-grid">';
  wdays.forEach(w => html += `<div class="calendar-wd">${w}</div>`);
  cells.forEach(({d: cd, out}) => {
    const isToday = cd.toDateString() === today;
    const evts = eventsByDate[cd.toDateString()] || [];
    html += `<div class="calendar-day ${out?'out':''} ${isToday?'today':''}" data-date="${cd.toISOString()}">
      <span class="calendar-daynum">${cd.getDate()}</span>
      ${evts.slice(0, 3).map(e => `<div class="calendar-event k-${e.kind}" data-eid="${e.id}">${escapeHtml(e.title)}</div>`).join('')}
      ${evts.length > 3 ? `<div class="text-sm muted">+ ${evts.length-3}</div>` : ''}
    </div>`;
  });
  html += '</div>';
  document.getElementById('cal-grid').innerHTML = html;
  document.querySelectorAll('.calendar-event[data-eid]').forEach(el => {
    el.addEventListener('click', (e) => { e.stopPropagation(); openEventModal(el.dataset.eid); });
  });
  document.querySelectorAll('.calendar-day').forEach(el => {
    el.addEventListener('click', () => openEventModal(null, el.dataset.date));
  });

  // list
  const upcoming = visibleEvents
    .filter(e => !e.completed && new Date(e.date) >= new Date(new Date().toDateString()))
    .sort((a,b) => new Date(a.date) - new Date(b.date)).slice(0, 30);
  document.getElementById('cal-list').innerHTML = upcoming.length ? upcoming.map(e => {
    const cl = getClient(e.clientId);
    return `<tr data-eid="${e.id}">
      <td>${fmt.dateLong(e.date)}</td>
      <td><span class="chip chip-${e.kind==='call'?'info':e.kind==='contract'?'yellow':e.kind==='followup'?'success':'default'}">${eventKindLabel(e.kind)}</span></td>
      <td class="fw-600">${escapeHtml(cl?cl.name:'—')}</td>
      <td>${escapeHtml(e.title)}</td>
      <td>${escapeHtml(e.author||'')}</td>
      <td><button class="btn btn-sm" data-done="${e.id}">Готово</button></td>
    </tr>`;
  }).join('') : `<tr><td colspan="6"><div class="empty-state">Нет запланированных событий</div></td></tr>`;
  document.querySelectorAll('[data-done]').forEach(b => b.onclick = (ev) => {
    ev.stopPropagation();
    const ev2 = state.events.find(x => x.id === b.dataset.done);
    if (ev2) { ev2.completed = true; persist(); drawCalendar(); renderNav(); }
  });
  document.querySelectorAll('#cal-list tr[data-eid]').forEach(tr => tr.addEventListener('click', () => openEventModal(tr.dataset.eid)));
}

function openEventModal(eventId, defaultDate=null, defaultClientId=null) {
  const isEdit = !!eventId;
  const e = eventId ? state.events.find(x => x.id === eventId) : { id: uid(), kind:'call', date: defaultDate || new Date().toISOString(), clientId: defaultClientId || '', title:'', author: state.user.name };
  const visibleClientList = visibleClients();
  const html = `
    <div class="modal-header">
      <div class="modal-title">${isEdit?'Событие':'Новое событие'}</div>
      <button class="modal-close" id="m-close">✕</button>
    </div>
    <div class="modal-body">
      <div class="form-row">
        <label class="field"><span>Тип</span>
          <select id="ev-kind">
            <option value="call" ${e.kind==='call'?'selected':''}>Звонок</option>
            <option value="meeting" ${e.kind==='meeting'?'selected':''}>Встреча</option>
            <option value="contract" ${e.kind==='contract'?'selected':''}>Договор</option>
            <option value="followup" ${e.kind==='followup'?'selected':''}>Контрольная точка</option>
          </select>
        </label>
        <label class="field"><span>Дата и время</span>
          <input type="datetime-local" id="ev-date" value="${new Date(e.date).toISOString().slice(0,16)}">
        </label>
      </div>
      <div class="form-row full">
        <label class="field"><span>Клиент</span>
          <select id="ev-client">
            <option value="">—</option>
            ${visibleClientList.map(c => `<option value="${c.id}" ${e.clientId===c.id?'selected':''}>${escapeHtml(c.name)} (${escapeHtml(c.manager)})</option>`).join('')}
          </select>
        </label>
      </div>
      <div class="form-row full">
        <label class="field"><span>Что сделать</span>
          <input type="text" id="ev-title" value="${escapeHtml(e.title||'')}" placeholder="например, перезвонить по предложению">
        </label>
      </div>
    </div>
    <div class="modal-footer">
      ${isEdit ? `<button class="btn btn-danger" id="ev-del">Удалить</button>` : ''}
      <button class="btn" id="ev-cancel">Отмена</button>
      <button class="btn btn-primary" id="ev-save">Сохранить</button>
    </div>
  `;
  openModal(html);
  document.getElementById('ev-cancel').onclick = closeModal;
  document.getElementById('m-close').onclick = closeModal;
  if (isEdit) document.getElementById('ev-del').onclick = () => {
    state.events = state.events.filter(x => x.id !== eventId);
    persist(); closeModal(); drawCalendar(); renderNav();
  };
  document.getElementById('ev-save').onclick = () => {
    const data = {
      id: e.id,
      kind: document.getElementById('ev-kind').value,
      date: new Date(document.getElementById('ev-date').value).toISOString(),
      clientId: document.getElementById('ev-client').value,
      title: document.getElementById('ev-title').value || 'Событие',
      author: state.user.name,
      completed: false,
    };
    if (!data.clientId) { alert('Укажите клиента'); return; }
    if (isEdit) {
      const i = state.events.findIndex(x => x.id === eventId);
      state.events[i] = data;
    } else state.events.push(data);
    persist(); closeModal(); drawCalendar(); renderNav();
  };
}

function afterAnalytics() {
  destroyCharts();
  const all = visibleClients();
  // Stages
  const stageCounts = STAGES.map(s => all.filter(c => clientStage(c)===s.id).length);
  _chartRefs.s1 = new Chart(document.getElementById('ch-stages'), {
    type: 'bar',
    data: { labels: STAGES.map(s=>s.name), datasets: [{ data: stageCounts, backgroundColor: STAGES.map(s=>s.color), borderRadius: 6 }] },
    options: { ...chartBaseOpts({yGrid:true}), plugins: { legend: { display: false } } }
  });
  // Activities
  const acts = uniqueActivities();
  const actCounts = acts.map(a => all.filter(c => (c.activity||'Другое')===a).length);
  _chartRefs.s2 = new Chart(document.getElementById('ch-activity'), {
    type: 'bar', data: {
      labels: acts, datasets: [{ data: actCounts, backgroundColor: '#FFC72C', borderRadius: 6 }]
    }, options: { ...chartBaseOpts({yGrid:true}), indexAxis: 'y', plugins: { legend: { display:false } } }
  });
  // Categories
  const catCounts = ['A','B','C'].map(k => all.filter(c => clientCategory(c)===k).length);
  _chartRefs.s3 = new Chart(document.getElementById('ch-cats'), {
    type: 'doughnut',
    data: { labels: ['A — активные','B — слабоактивные','C — без отгрузок'], datasets:[{ data: catCounts, backgroundColor:['#16A34A','#F59E0B','#DC2626'] }] },
    options: { responsive:true, maintainAspectRatio:false, plugins:{ legend:{ position:'bottom' } } }
  });
  // Solvency
  const sols = ['Отличная (D ≤ 5 дней)','Удовлетворительная (D ≤ 15 дней)','Проблемная (D > 15 дней)'];
  const solCounts = sols.map(s => all.filter(c => (c.solvency||'').includes(s.split(' ')[0])).length);
  solCounts.push(all.filter(c => !c.solvency).length);
  _chartRefs.s4 = new Chart(document.getElementById('ch-solv'), {
    type: 'doughnut',
    data: { labels: ['Отличная','Удовл.','Проблемная','Нет данных'], datasets:[{ data: solCounts, backgroundColor:['#16A34A','#F59E0B','#DC2626','#D1D5DB'] }] },
    options: { responsive:true, maintainAspectRatio:false, plugins:{ legend:{ position:'bottom' } } }
  });
  // Cohort
  const byYear = {};
  all.forEach(c => {
    if (!c.reg_date) return;
    const y = new Date(c.reg_date).getFullYear();
    if (y < 2018) { byYear['до 2018'] = (byYear['до 2018']||0)+1; return; }
    byYear[String(y)] = (byYear[String(y)]||0)+1;
  });
  const yKeys = Object.keys(byYear).sort();
  _chartRefs.s5 = new Chart(document.getElementById('ch-cohort'), {
    type: 'bar', data: { labels: yKeys, datasets:[{ data: yKeys.map(k=>byYear[k]), backgroundColor:'#0F1115', borderRadius:6 }] },
    options: { ...chartBaseOpts({yGrid:true}), plugins: { legend: { display:false } } }
  });
  // Revenue by activity
  const revByAct = acts.map(a => all.filter(c => (c.activity||'Другое')===a).reduce((s,c)=>s+(c.revenue||0),0));
  _chartRefs.s6 = new Chart(document.getElementById('ch-rev-activity'), {
    type: 'bar', data: { labels: acts, datasets:[{ data: revByAct, backgroundColor:'#FFC72C', borderRadius:6 }] },
    options: { ...chartBaseOpts({valueAsRub:true, yGrid:true}), indexAxis:'y', plugins:{ legend:{ display:false } } }
  });
  // Clients by manager
  const mgrs = uniqueManagers();
  const mgrCounts = mgrs.map(m => all.filter(c => c.manager===m).length);
  _chartRefs.s7 = new Chart(document.getElementById('ch-mgr'), {
    type: 'bar', data: { labels: mgrs.map(m=>m.split(' ').slice(0,2).join(' ')), datasets:[{ data: mgrCounts, backgroundColor:'#0F1115', borderRadius:6 }] },
    options: { ...chartBaseOpts({yGrid:true}), plugins:{ legend:{ display:false } } }
  });
}

function afterSettings() {
  if (state.user.role !== 'admin') return;

  document.getElementById('stages-save').onclick = () => {
    const newStages = STAGES.map(s => {
      const nameEl = document.querySelector(`[data-stage-id="${s.id}"][data-field="name"]`);
      const colorEl = document.querySelector(`[data-stage-id="${s.id}"][data-field="color"]`);
      const descEl = document.querySelector(`[data-stage-id="${s.id}"][data-field="desc"]`);
      return { ...s, name: nameEl?.value || s.name, color: colorEl?.value || s.color, desc: descEl?.value || s.desc };
    });
    state.settings.stages = newStages;
    applySettings();
    persist();
    renderView();
  };
  document.getElementById('stages-reset').onclick = () => {
    if (!confirm('Восстановить названия и цвета этапов по умолчанию?')) return;
    state.settings.stages = null;
    applySettings();
    persist();
    renderView();
  };

  // Dashboard widgets toggles
  ['kpis','funnel','upcoming','recent','top'].forEach(key => {
    const map = { kpis: 'kpis', funnel: 'funnel', upcoming: 'upcoming', recent: 'recent', top: 'topClients' };
    const el = document.getElementById('w-' + key);
    if (!el) return;
    el.addEventListener('change', () => {
      state.settings.dashboardWidgets[map[key]] = el.checked;
      persist();
    });
  });

  document.getElementById('auto-cat').addEventListener('change', (e) => {
    state.settings.autoCategoryEnabled = e.target.checked;
    persist();
  });

  // Manager addition
  document.getElementById('add-manager-btn').onclick = () => {
    const inp = document.getElementById('new-manager-name');
    const name = (inp.value || '').trim();
    if (!name) { inp.focus(); return; }
    if (uniqueManagers().includes(name)) { alert('Такой менеджер уже есть в системе'); return; }
    state.extraManagers = state.extraManagers || [];
    state.extraManagers.push(name);
    persist();
    renderView();
  };

  document.getElementById('reset-btn').onclick = () => {
    if (!confirm('Все локальные изменения будут утрачены. Продолжить?')) return;
    localStorage.removeItem(LS_KEY);
    location.reload();
  };
}

      ${isEdit && u.username !== state.user.username ? `<button class="btn btn-danger" id="u-del">Удалить</button>` : ''}

      <button class="btn btn-primary" id="u-save">Сохранить</button>
    </div>
  `);
  document.getElementById('u-cancel').onclick = closeModal;
  document.getElementById('m-close').onclick = closeModal;
  if (isEdit && document.getElementById('u-del')) {
    document.getElementById('u-del').onclick = () => {
      if (!confirm('Удалить пользователя?')) return;
      state.users = state.users.filter(x => x.username !== username);
      persist(); closeModal(); drawUsersTable();
    };
  }
  document.getElementById('u-save').onclick = () => {
    const data = {
      name: document.getElementById('u-name').value.trim(),
      username: (document.getElementById('u-username').value || u.username).trim().toLowerCase(),
      password: document.getElementById('u-password').value || u.password,
      role: document.getElementById('u-role').value,
      manager: document.getElementById('u-manager').value || null,
      active: document.getElementById('u-active').value === '1',
    };
    if (!data.username || !data.name) { alert('Логин и имя обязательны'); return; }
    if (!isEdit && state.users.find(x => x.username === data.username)) { alert('Такой логин уже есть'); return; }
    if (!data.password) { alert('Задайте пароль'); return; }
    if (isEdit) {
      const i = state.users.findIndex(x => x.username === username);
      state.users[i] = data;
    } else state.users.push(data);
    persist(); closeModal(); drawUsersTable(); renderNav();

function openClientModal(clientId) {
  const isNew = !clientId;
  const c = isNew ? {
    id: 'c_new_' + uid(), name: '', manager: state.user.manager || '', activity: 'СТО',
    reg_date: new Date().toISOString().slice(0,10), revenue: 0, debt: 0, overdue: 0,
    months: {}, stages_flags: [false,false,false,false,false,false], contract_signed: false,
  } : getClient(clientId);
  const sgInfo = computeAutoStage(c);
  const catInfo = computeAutoCategory(c);
  const managers = uniqueManagers();
  const acts = uniqueActivities();

  openModal(`
    <div class="client-header">
      <div class="client-header-avatar">${fmt.initials(c.name) || '?'}</div>
      <div class="client-header-info">
        <div class="client-header-name">${escapeHtml(c.name || 'Новый клиент')}</div>
        <div class="client-header-meta">
          <span>👤 ${escapeHtml(c.manager||'—')}</span>
          <span>📅 в базе с ${fmt.dateLong(c.reg_date)}</span>
          <span>⏱ ${fmt.daysAgo(c.reg_date)}</span>
          ${c.inn ? `<span>🔢 ИНН ${escapeHtml(c.inn)}</span>` : ''}
        </div>
        <div style="margin-top:8px; display:flex; gap:6px; flex-wrap:wrap; align-items:center;">
          ${stageChip(sgInfo.stage)}
          <span class="chip chip-cat-${catInfo.category}">Категория ${catInfo.category}</span>
          ${c.activity ? `<span class="chip chip-activity">${escapeHtml(c.activity)}</span>` : ''}
          ${c.contract_signed ? '<span class="chip chip-success">Договор подписан</span>' : ''}
        </div>
      </div>
      <button class="modal-close" id="m-close" style="color:white;">✕</button>
    </div>
    <div class="client-tabs">
      <button class="client-tab active" data-tab="overview">Карточка</button>
      <button class="client-tab" data-tab="sales">Продажи</button>
      <button class="client-tab" data-tab="contract">Договор</button>
    </div>
    <div class="modal-body" id="cm-body"></div>
    <div class="modal-footer">
      ${!isNew && state.user.role==='admin' ? `<button class="btn btn-danger" id="cm-del">Удалить</button>` : ''}
      <button class="btn" id="cm-cancel">Закрыть</button>
      <button class="btn btn-primary" id="cm-save">Сохранить и закрыть</button>
    </div>
  `, 'modal-wide');
  let activeTab = 'overview';
  function renderTab() {
    const body = document.getElementById('cm-body');
    if (activeTab === 'overview') {
      body.innerHTML = renderClientOverview(c, sgInfo, catInfo, managers, acts);
      // Wire activity sub-section
      bindEmbeddedTimeline(c);
    } else if (activeTab === 'sales') {
      body.innerHTML = renderSalesTab(c);
      setTimeout(() => initSalesChart(c), 0);
    } else if (activeTab === 'contract') {
      body.innerHTML = renderContractTab(c);
    }
  }
  renderTab();

  document.querySelectorAll('.client-tab').forEach(b => b.onclick = () => {
    document.querySelectorAll('.client-tab').forEach(x => x.classList.remove('active'));
    b.classList.add('active');
    activeTab = b.dataset.tab;
    renderTab();
  });
  document.getElementById('cm-cancel').onclick = closeModal;
  document.getElementById('m-close').onclick = closeModal;
  if (!isNew && state.user.role==='admin' && document.getElementById('cm-del')) {
    document.getElementById('cm-del').onclick = () => {
      if (!confirm('Удалить клиента?')) return;
      state.clients = state.clients.filter(x => x.id !== c.id);
      state.comments = state.comments.filter(x => x.clientId !== c.id);
      state.events = state.events.filter(x => x.clientId !== c.id);
      persist(); closeModal(); renderView();
    };
  }
  document.getElementById('cm-save').onclick = () => {
    // Read overview fields IF they exist (when on overview tab)
    function val(id) { const el = document.getElementById(id); return el ? el.value : null; }
    const updates = {};
    if (val('ci-name') !== null) updates.name = val('ci-name').trim();
    if (val('ci-name1c') !== null) updates.name_1c = val('ci-name1c').trim();
    if (val('ci-inn') !== null) updates.inn = val('ci-inn').trim();
    if (val('ci-manager') !== null) updates.manager = val('ci-manager');
    if (val('ci-activity') !== null) updates.activity = val('ci-activity');
    if (val('ci-cat-manual') !== null) updates.categoryManual = val('ci-cat-manual') || null;
    if (val('ci-solv') !== null) updates.solvency = val('ci-solv') || null;
    if (val('ci-reg') !== null) updates.reg_date = val('ci-reg');
    if (val('ci-contact-name') !== null) updates.contact_name = val('ci-contact-name');
    if (val('ci-phone') !== null) updates.phone = val('ci-phone');
    if (val('ci-email') !== null) updates.email = val('ci-email');
    if (val('ci-addr') !== null) updates.address = val('ci-addr');
    if (val('ci-comp') !== null) updates.competitor = val('ci-comp');
    if (val('ci-price') !== null) updates.price_type = val('ci-price');
    if (val('ci-stage-manual') !== null) updates.stageManual = val('ci-stage-manual') || null;
    if (val('ci-comment') !== null) updates.comment = val('ci-comment');
    // contract tab
    if (val('cc-no') !== null) updates.contract_no = val('cc-no');
    if (val('cc-date') !== null) updates.contract_date = val('cc-date');
    if (val('cc-signed') !== null) updates.contract_signed = val('cc-signed') === '1';
    if (val('cc-note') !== null) updates.contract_note = val('cc-note');

    Object.assign(c, updates);
    if (isNew) state.clients.push(c);
    persist(); closeModal(); renderView();
  };
}

function renderEmbeddedTimeline(c) {
  const comments = getComments(c.id);
  const events = getEvents(c.id, true);
  return `
    <div class="comment-form">
      <div class="comment-form-row">
        <select id="tl-kind">
          <option value="note">📝 Заметка</option>
          <option value="call">📞 Звонок</option>
          <option value="meeting">🤝 Встреча</option>
          <option value="email">✉️ Письмо</option>
          <option value="other">Другое</option>
        </select>
        <div class="text-sm text-muted">Автор: <b>${escapeHtml(state.user.name)}</b></div>
        <button class="btn btn-sm" id="tl-plan-event" style="margin-left:auto;">📅 Запланировать событие</button>
        <button class="btn btn-primary btn-sm" id="tl-add">Добавить запись</button>
      </div>
      <textarea id="tl-text" placeholder="Опишите событие или результат разговора..."></textarea>
    </div>

    ${events.length || comments.length ? `
      <div class="timeline">
        ${[...events.map(e => ({ kind:'event', date: e.date, data: e })),
            ...comments.map(c => ({ kind:'comment', date: c.date, data: c }))]
          .sort((a,b) => new Date(b.date) - new Date(a.date))
          .map(it => it.kind === 'event' ? `
            <div class="timeline-item">
              <div class="timeline-dot">📅</div>
              <div class="timeline-content">
                <div class="timeline-head">
                  <span class="timeline-kind">${eventKindLabel(it.data.kind)}</span>
                  <span class="timeline-author">${escapeHtml(it.data.author||'')}</span>
                  <span class="timeline-date">${fmt.dateLong(it.date)} • ${fmt.daysAgo(it.date)}</span>
                  ${it.data.completed ? '<span class="chip chip-success" style="margin-left:auto;">Выполнено</span>' : '<span class="chip chip-info" style="margin-left:auto;">Запланировано</span>'}
                </div>
                <div class="timeline-body">${escapeHtml(it.data.title||'')}</div>
              </div>
            </div>
          ` : `
            <div class="timeline-item">
              <div class="timeline-dot">${({note:'📝',call:'📞',meeting:'🤝',email:'✉️',other:'•'})[it.data.kind]||'•'}</div>
              <div class="timeline-content">
                <div class="timeline-head">
                  <span class="timeline-author">${escapeHtml(it.data.author||'')}</span>
                  <span class="timeline-date">${fmt.dateLong(it.date)} • ${fmt.daysAgo(it.date)}</span>
                </div>
                <div class="timeline-body">${escapeHtml(it.data.text||'')}</div>
              </div>
            </div>
          `).join('')}
      </div>
    ` : '<div class="empty-state" style="padding: 30px 20px;"><div class="empty-state-icon">💬</div>Пока нет комментариев и событий.<br><span class="text-sm">Добавьте первую запись или запланируйте событие.</span></div>'}
  `;
}
function bindEmbeddedTimeline(c) {
  const wrap = document.getElementById('cm-activity');
  if (!wrap) return;
  wrap.innerHTML = renderEmbeddedTimeline(c);
  document.getElementById('tl-add').onclick = () => {
    const text = document.getElementById('tl-text').value.trim();
    const kind = document.getElementById('tl-kind').value;
    if (!text) { document.getElementById('tl-text').focus(); return; }
    state.comments.unshift({
      id: uid(), clientId: c.id, author: state.user.name,
      text, kind, date: new Date().toISOString()
    });
    persist();
    bindEmbeddedTimeline(c);
  };
  document.getElementById('tl-plan-event').onclick = () => {
    // Open the event modal pre-selected to this client. Save the open modal first to not lose unsaved changes? Simpler: open event modal on top.
    openEventModal(null, null, c.id);
  };
}

              <div class="timeline-content">
                <div class="timeline-head">
                  <span class="timeline-kind">${eventKindLabel(it.data.kind)}</span>
                  <span class="timeline-author">${escapeHtml(it.data.author||'')}</span>
                  <span class="timeline-date">${fmt.dateLong(it.date)} • ${fmt.daysAgo(it.date)}</span>
                  ${it.data.completed ? '<span class="chip chip-success" style="margin-left:auto;">Выполнено</span>' : '<span class="chip chip-info" style="margin-left:auto;">Запланировано</span>'}
                </div>
                <div class="timeline-body">${escapeHtml(it.data.title||'')}</div>
              </div>
            </div>
          ` : `
            <div class="timeline-item">
              <div class="timeline-dot">${({note:'📝',call:'📞',meeting:'🤝',email:'✉️',other:'•'})[it.data.kind]||'•'}</div>
              <div class="timeline-content">
                <div class="timeline-head">
                  <span class="timeline-author">${escapeHtml(it.data.author||'')}</span>
                  <span class="timeline-date">${fmt.dateLong(it.date)} • ${fmt.daysAgo(it.date)}</span>
                </div>
                <div class="timeline-body">${escapeHtml(it.data.text||'')}</div>
              </div>
            </div>
          `).join('')}
      </div>
    ` : '<div class="empty-state"><div class="empty-state-icon">💬</div>Пока нет комментариев и событий.<br>Добавьте первую запись выше.</div>'}
  `;
}

function bindTimeline(c) {
  document.getElementById('tl-add').onclick = () => {
    const text = document.getElementById('tl-text').value.trim();
    const kind = document.getElementById('tl-kind').value;
    if (!text) return;
    state.comments.unshift({
      id: uid(), clientId: c.id, author: state.user.name,
      text, kind, date: new Date().toISOString()
    });
    persist();
    document.getElementById('tl-text').value = '';
    // re-render timeline tab
    const body = document.getElementById('cm-body');
    body.innerHTML = renderTimelineTab(c, getComments(c.id), getEvents(c.id, true));
    bindTimeline(c);
  };
}
