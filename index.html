          <div title="Сколько % обработанных лидов дошли до постоянного клиента (или хотя бы первого заказа) из всех завершённых (постоянные + первый заказ + архив)"><span class="text-muted text-sm">Конверсия в клиента:</span> <span class="fw-700" style="color:${winRate>=60?'var(--success)':winRate>=30?'var(--text)':'var(--danger)'}">${winRate}%</span> <span class="text-sm text-muted">(${won} стали клиентами из ${won+lost} обработанных)</span></div>
          <div style="margin-left:auto;"><span class="text-muted text-sm">Прогноз выручки:</span> <span class="fw-700" style="color:#8B5CF6;">${fmt.rub(forecastTotal)}</span></div>
        </div>
      </div>
      <div class="card">
        <div class="card-header">
          <div class="card-title">Виды деятельности</div>
          <span class="text-sm text-muted">структура базы</span>

        ${(() => {

          return `<div style="padding: 14px 16px; display:flex; flex-direction:column; gap:12px;">
            ${actSorted.map(([name, cnt], i) => {
              const pct = totalClients ? (cnt / totalClients * 100) : 0;
              const barW = actMax ? (cnt / actMax * 100) : 0;

                <div>

                    <span style="font-size:12px; color:var(--text-muted); white-space:nowrap;"><b style="color:var(--text);">${cnt}</b> · ${pct.toFixed(0)}%</span>
                  </div>
                  <div style="height:6px; background:#F3F4F6; border-radius:3px; overflow:hidden;">
                    <div style="height:100%; width:${barW}%; background:${color}; border-radius:3px; transition:width 0.4s;"></div>
                  </div>

      </div>

    ${(isAdmin && w.managers !== false && mgrData.length) ? `
    <details class="card card-collapsible mb-4" ${state.dashboardMgrOpen?'open':''}>
      <summary style="display:flex; align-items:center; gap:10px; padding:14px 16px; cursor:pointer; list-style:none; border-bottom:1px solid var(--border);">
        <div class="card-title" style="margin:0; flex:1;">Клиенты по менеджерам <span class="text-sm text-muted" style="font-weight:400;">— только для администратора</span></div>
        <span class="text-sm text-muted">${mgrData.length} ${mgrData.length===1?'менеджер':'менеджеров'}</span>
        <span class="text-sm text-muted" style="font-size:12px;">▼</span>
      </summary>
      <table class="data mgr-table">
        <thead><tr>
          <th>Менеджер</th>
          <th class="num">Всего</th>
          <th class="num">Активных</th>
          <th class="num">В воронке</th>
          <th class="num">Архив</th>
          <th style="width:30%;">Структура базы</th>
        </tr></thead>
        <tbody>
          ${mgrData.map(md => {
            const ap = md.total ? md.active/md.total*100 : 0;
            const fp = md.total ? md.inFunnel/md.total*100 : 0;
            const rp = md.total ? md.archive/md.total*100 : 0;
            return `
            <tr class="mgr-row" data-manager="${escapeHtml(md.manager)}" title="Кликните, чтобы посмотреть данные этого менеджера">
              <td><div style="display:flex;align-items:center;gap:9px;"><div class="user-avatar" style="width:24px;height:24px;font-size:9px;">${fmt.initials(md.manager)}</div><span class="fw-600">${escapeHtml(md.manager)}</span></div></td>
              <td class="num fw-700">${md.total}</td>
              <td class="num" style="color:#3F7F5B;">${md.active}</td>
              <td class="num">${md.inFunnel}</td>
              <td class="num text-muted">${md.archive}</td>
              <td>

function afterDashboard() {
  // Open client when clicking on rows that have a client id (events, recent, top)
  document.querySelectorAll('[data-cid]').forEach(el => {
    el.addEventListener('click', () => openClientModal(el.dataset.cid));
  });
  // "Готово" button: first click — enter confirm mode (✓ Подтвердить + ✕ Отмена); second — actually complete
  document.querySelectorAll('[data-todo-done]').forEach(btn => {
    btn.addEventListener('click', (e) => {
      e.stopPropagation();
      const evId = btn.dataset.todoDone;
      if (btn.dataset.confirm === '1') {
        const ev = state.events.find(x => x.id === evId);
        if (ev) {
          ev.completed = true;
          ev.completedAt = new Date().toISOString();
          persist();
          renderView();
        }
        return;
      }
      // Enter confirm mode: morph this button + add a cancel sibling
      btn.dataset.confirm = '1';
      btn.innerHTML = '✓ Подтвердить';
      btn.style.padding = '4px 10px';
      btn.style.fontSize = '12px';
      const cancel = document.createElement('button');
      cancel.className = 'btn btn-sm myday-cancel-btn';
      cancel.innerHTML = '✕';
      cancel.title = 'Отменить';
      cancel.style.cssText = 'margin-left:4px; padding:4px 8px; background:#F3F4F6; color:#374151; border:1px solid var(--border); font-size:12px;';
      cancel.addEventListener('click', (cev) => {
        cev.stopPropagation();
        cancel.remove();
        delete btn.dataset.confirm;
        btn.innerHTML = '✓';
        btn.style.padding = '4px 10px';
        btn.style.fontSize = '12px';
      });
      btn.parentElement.appendChild(cancel);
      // Auto-revert after 5 seconds if not confirmed
      setTimeout(() => { if (btn.dataset.confirm === '1' && document.body.contains(cancel)) cancel.click(); }, 5000);
    });
  });
  // Tabs on My Day widget
  document.querySelectorAll('[data-myday-tab]').forEach(btn => {
    btn.addEventListener('click', () => {
      if (btn.disabled) return;
      state.myDayTab = btn.dataset.mydayTab;
      state.myDayExpanded = false; // reset expand when switching tabs
      renderView();
    });
  });
  // Inline expand / collapse of My Day
  document.getElementById('dash-myday-expand')?.addEventListener('click', () => {
    state.myDayExpanded = true; renderView();
  });
  document.getElementById('dash-myday-collapse')?.addEventListener('click', () => {
    state.myDayExpanded = false; renderView();
  });
  document.getElementById('dash-go-funnel')?.addEventListener('click', () => setView('funnel'));
  document.getElementById('dash-go-cal-myday')?.addEventListener('click', () => setView('calendar'));
  document.getElementById('dash-conv-strip')?.addEventListener('click', (e) => {
    if (e.target.closest('.funnel-stage-clickable')) return;
    setView('analytics');
  });
  // Stage click → go to Funnel with stage filter applied
  document.querySelectorAll('.funnel-stage-clickable').forEach(el => {
    el.addEventListener('click', () => {
      state.filters.stage = el.dataset.stage;
      setView('funnel');
    });
  });
  // Manager row in admin table → set adminViewMgr, re-render dashboard
  document.querySelectorAll('.mgr-row').forEach(el => {
    el.addEventListener('click', () => {
      state.adminViewMgr = el.dataset.manager;
      renderNav();
      renderView();
    });
  });
  // Remember managers panel open/closed state
  const mgrDetails = document.querySelector('details.card-collapsible');
  if (mgrDetails) {
    mgrDetails.addEventListener('toggle', () => { state.dashboardMgrOpen = mgrDetails.open; });
  }
}

function drawFunnelBoard() {
  const list = applyFilters(visibleClients());
  document.getElementById('f-count').textContent = list.length;
  const buckets = {};
  STAGES.forEach(s => buckets[s.id] = []);
  list.forEach(c => buckets[clientStage(c)].push(c));

  document.getElementById('funnel-board').innerHTML = STAGES.map(s => {
    const items = buckets[s.id];
    const sumRevenue = items.reduce((acc, c) => acc + (c.revenue || 0), 0);
    return `
    <div class="funnel-col" data-stage="${s.id}">
      <div class="funnel-col-head">
        <span class="funnel-col-title" style="color:${s.color}">${escapeHtml(s.name)}</span>
        <span class="funnel-col-count">${items.length}</span>
        <span class="funnel-col-sum" title="Суммарная выручка клиентов на этом этапе">${sumRevenue > 0 ? '💰 ' + fmt.rub(sumRevenue) : '— нет выручки'}</span>
      </div>
      <div class="funnel-col-bar" style="background:${s.color}"></div>
      <div class="funnel-col-body" data-drop="${s.id}">
        ${items.slice(0,40).map(c => funnelCard(c)).join('')}
        ${items.length > 40 ? `<div class="text-sm text-muted" style="text-align:center; padding:6px;">+ ещё ${items.length-40}</div>` : ''}
      </div>
    </div>
  `;}).join('');

  document.querySelectorAll('.funnel-card').forEach(el => {
    el.addEventListener('click', () => openClientModal(el.dataset.cid));
  });

  // Drag-and-drop
  let dragId = null;
  document.querySelectorAll('.funnel-card').forEach(card => {
    card.addEventListener('dragstart', (ev) => {
      dragId = card.dataset.cid;
      card.classList.add('dragging');
      ev.dataTransfer.effectAllowed = 'move';
      try { ev.dataTransfer.setData('text/plain', dragId); } catch (e) {}
    });
    card.addEventListener('dragend', () => {
      card.classList.remove('dragging');
      document.querySelectorAll('.funnel-col-body.drag-over').forEach(x => x.classList.remove('drag-over'));
      dragId = null;
    });
  });
  document.querySelectorAll('.funnel-col-body[data-drop]').forEach(col => {
    col.addEventListener('dragover', (ev) => { ev.preventDefault(); ev.dataTransfer.dropEffect = 'move'; col.classList.add('drag-over'); });
    col.addEventListener('dragleave', () => col.classList.remove('drag-over'));
    col.addEventListener('drop', (ev) => {
      ev.preventDefault();
      col.classList.remove('drag-over');
      const cid = dragId || ev.dataTransfer.getData('text/plain');
      if (!cid) return;
      const targetStage = col.dataset.drop;
      const cl = getClient(cid);
      if (!cl) return;
      if (clientStage(cl) === targetStage) return;
      cl.stageManual = targetStage;
      persist();
      drawFunnelBoard();
    });
  });
}
function funnelCard(c) {
  const cat = clientCategory(c);
  const evStatus = clientEventStatus(c.id);
  const next = nextEventDate(c.id);
  let badge = '';
  if (evStatus === 'overdue') badge = '<span class="card-flag card-flag-overdue">⚠ просрочено</span>';
  else if (evStatus === 'today') badge = '<span class="card-flag card-flag-today">● сегодня</span>';
  else if (evStatus === 'stale') badge = '<span class="card-flag card-flag-stale">нет событий</span>';
  else if (evStatus === 'planned' && next) badge = `<span class="card-flag card-flag-ok">→ ${fmt.date(next)}</span>`;
  return `
    <div class="funnel-card card-ev-${evStatus}" data-cid="${c.id}" draggable="true">
      <div class="funnel-card-name">${escapeHtml(c.name)}</div>
      <div class="funnel-card-meta">
        ${c.activity ? `<span class="chip chip-activity">${escapeHtml(c.activity)}</span>` : ''}
        <span class="chip chip-cat-${cat}">${cat}</span>
      </div>
      ${badge}
      <div class="funnel-card-rev">${c.revenue ? fmt.rub(c.revenue)+' • ' : ''}${escapeHtml(c.manager)}</div>
    </div>
  `;
}
function bindFilterControls() {
  const bind = (id, key) => {
    const el = document.getElementById(id);
    if (!el) return;
    el.addEventListener('change', () => {
      state.filters[key] = el.value;

  bind('f-manager','manager'); bind('f-activity','activity'); bind('f-category','category'); bind('f-stage','stage');
  document.getElementById('f-reset')?.addEventListener('click', () => {
    state.filters = { manager:'all', activity:'all', category:'all', stage:'all', eventStatus:'all', search: state.filters.search };
    renderView();
  });
}

function renderManagers() {
  const managers = uniqueManagers();
  const cards = managers.map(m => {
    const clients = state.clients.filter(c => c.manager === m);
    const revenue = clients.reduce((s,c) => s + (c.revenue||0), 0);
    const debt = clients.reduce((s,c) => s + (c.debt||0), 0);
    const overdue = clients.reduce((s,c) => s + (c.overdue||0), 0);
    const buckets = {};
    STAGES.forEach(s => buckets[s.id] = 0);
    clients.forEach(c => buckets[clientStage(c)]++);
    const perf = MANAGER_PERF.find(p => p.manager === m || p.manager === m.trim());
    const planTotal = perf ? (perf.plan.jan + perf.plan.feb + perf.plan.mar) : 0;
    const factTotal = perf ? (perf.fact.jan + perf.fact.feb + perf.fact.mar) : 0;
    const pct = planTotal ? (factTotal / planTotal * 100) : 0;
    return `
      <div class="card">
        <div class="card-header" style="border-bottom:none; padding-bottom:8px;">
          <div style="display:flex; align-items:center; gap:12px;">

          <div class="grid" style="grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 14px;">
            <div>
              <div class="text-sm text-muted">Выручка Q1 2026</div>
              <div class="fw-700" style="font-size:17px;">${fmt.rub(revenue)}</div>
            </div>
            <div>
              <div class="text-sm text-muted">Долг / Просрочка</div>
              <div class="fw-700" style="font-size:17px;">${fmt.rub(debt)}${overdue>0?` <span style="color:var(--danger); font-size:13px;">▲</span>`:''}</div>
            </div>
          </div>
          ${perf ? `
            <div class="text-sm text-muted mb-3">План Q1: <b>${fmt.rub(planTotal)}</b> • Факт: <b>${fmt.rub(factTotal)}</b> • <span style="color:${pct>=95?'var(--success)':pct>=70?'var(--warning)':'var(--danger)'}; font-weight:600;">${pct.toFixed(0)}%</span></div>
            <div class="progress"><div class="progress-fill ${pct>=95?'success':pct<60?'danger':''}" style="width:${Math.min(pct,140)}%; background:${pct>=95?'var(--success)':pct>=70?'var(--wp-yellow)':'var(--danger)'};"></div></div>
          ` : '<div class="text-sm text-muted">План на квартал не задан</div>'}
          <div style="margin-top:14px;">
            <div class="text-sm text-muted mb-3">Воронка</div>
            <div class="mini-funnel">
              ${STAGES.map(s => {
                const w = clients.length ? (buckets[s.id] / clients.length * 100) : 0;
                return `<div class="mini-funnel-bar" style="background:${s.color}; flex:${w||0.01}" title="${s.name}: ${buckets[s.id]}"></div>`;
              }).join('')}
            </div>
            <div class="flex gap-2 mt-3" style="flex-wrap:wrap;">
              ${STAGES.map(s => `<span class="chip" style="background:${s.soft}; color:${s.color}">${s.name.split(' ')[0]}: ${buckets[s.id]}</span>`).join('')}
            </div>
          </div>
        </div>
      </div>
    `;
  }).join('');
  return `<div class="grid grid-2">${cards}</div>`;
}

function afterCalendar() {
  drawCalendar();
  document.getElementById('cal-prev').onclick = () => { _cal.date.setMonth(_cal.date.getMonth()-1); drawCalendar(); };
  document.getElementById('cal-next').onclick = () => { _cal.date.setMonth(_cal.date.getMonth()+1); drawCalendar(); };
  document.getElementById('cal-today').onclick = () => { _cal.date = new Date(); drawCalendar(); };
  document.getElementById('cal-add').onclick = () => openEventModal(null);
  document.getElementById('cal-mgr').addEventListener('change', (e) => { _calMgr = e.target.value; drawCalendar(); });
}
function drawCalendar() {
  const d = _cal.date;
  const title = d.toLocaleDateString('ru-RU', { month: 'long', year: 'numeric' });
  document.getElementById('cal-title').textContent = title.charAt(0).toUpperCase() + title.slice(1);
  const y = d.getFullYear(), m = d.getMonth();
  const first = new Date(y, m, 1);
  const last = new Date(y, m+1, 0);
  let startDay = first.getDay(); startDay = startDay === 0 ? 6 : startDay - 1; // Mon=0
  const totalDays = last.getDate();
  const cells = [];
  const prevLast = new Date(y, m, 0).getDate();
  for (let i = startDay; i > 0; i--) cells.push({ d: new Date(y, m-1, prevLast - i + 1), out: true });
  for (let i = 1; i <= totalDays; i++) cells.push({ d: new Date(y, m, i), out: false });
  while (cells.length % 7) cells.push({ d: new Date(y, m+1, cells.length - totalDays - startDay + 1), out: true });

  const eventsByDate = {};
  let visibleEvents = state.user.role === 'admin'
    ? state.events
    : state.events.filter(e => {
        const cl = getClient(e.clientId);
        return cl && cl.manager === state.user.manager;
      });
  if (_calMgr && _calMgr !== 'all') {
    visibleEvents = visibleEvents.filter(e => {
      const cl = getClient(e.clientId);
      return (cl && cl.manager === _calMgr) || e.author === _calMgr;
    });
  }
  visibleEvents.forEach(e => {
    const k = new Date(e.date).toDateString();
    (eventsByDate[k] = eventsByDate[k] || []).push(e);
  });
  const today = new Date().toDateString();

  const wdays = ['Пн','Вт','Ср','Чт','Пт','Сб','Вс'];
  let html = '<div class="calendar-grid">';
  wdays.forEach(w => html += `<div class="calendar-wd">${w}</div>`);
  cells.forEach(({d: cd, out}) => {
    const isToday = cd.toDateString() === today;
    const evts = eventsByDate[cd.toDateString()] || [];
    html += `<div class="calendar-day ${out?'out':''} ${isToday?'today':''}" data-date="${cd.toISOString()}">
      <span class="calendar-daynum">${cd.getDate()}</span>
      ${evts.slice(0, 3).map(e => `<div class="calendar-event k-${e.kind}" data-eid="${e.id}">${escapeHtml(e.title)}</div>`).join('')}
      ${evts.length > 3 ? `<div class="text-sm muted">+ ${evts.length-3}</div>` : ''}
    </div>`;
  });
  html += '</div>';
  document.getElementById('cal-grid').innerHTML = html;
  document.querySelectorAll('.calendar-event[data-eid]').forEach(el => {
    el.addEventListener('click', (e) => { e.stopPropagation(); openEventModal(el.dataset.eid); });
  });
  document.querySelectorAll('.calendar-day').forEach(el => {
    el.addEventListener('click', () => openEventModal(null, el.dataset.date));
  });

  // list
  const upcoming = visibleEvents
    .filter(e => !e.completed && new Date(e.date) >= new Date(new Date().toDateString()))
    .sort((a,b) => new Date(a.date) - new Date(b.date)).slice(0, 30);
  document.getElementById('cal-list').innerHTML = upcoming.length ? upcoming.map(e => {
    const cl = getClient(e.clientId);
    return `<tr data-eid="${e.id}">
      <td>${fmt.dateLong(e.date)}</td>
      <td><span class="chip chip-${e.kind==='call'?'info':e.kind==='contract'?'yellow':e.kind==='followup'?'success':'default'}">${eventKindLabel(e.kind)}</span></td>
      <td class="fw-600">${escapeHtml(cl?cl.name:'—')}</td>
      <td>${escapeHtml(e.title)}</td>
      <td>${escapeHtml(e.author||'')}</td>
      <td><button class="btn btn-sm" data-done="${e.id}">Готово</button></td>
    </tr>`;
  }).join('') : `<tr><td colspan="6"><div class="empty-state">Нет запланированных событий</div></td></tr>`;
  document.querySelectorAll('[data-done]').forEach(b => b.onclick = (ev) => {
    ev.stopPropagation();
    const ev2 = state.events.find(x => x.id === b.dataset.done);
    if (ev2) { ev2.completed = true; persist(); drawCalendar(); renderNav(); }
  });
  document.querySelectorAll('#cal-list tr[data-eid]').forEach(tr => tr.addEventListener('click', () => openEventModal(tr.dataset.eid)));
}

function openEventModal(eventId, defaultDate=null, defaultClientId=null) {
  const isEdit = !!eventId;
  const e = eventId ? state.events.find(x => x.id === eventId) : { id: uid(), kind:'call', date: defaultDate || new Date().toISOString(), clientId: defaultClientId || '', title:'', author: state.user.name };
  const visibleClientList = visibleClients();
  const html = `
    <div class="modal-header">
      <div class="modal-title">${isEdit?'Событие':'Новое событие'}</div>
      <button class="modal-close" id="m-close">✕</button>
    </div>
    <div class="modal-body">
      <div class="form-row">
        <label class="field"><span>Тип</span>
          <select id="ev-kind">
            <option value="call" ${e.kind==='call'?'selected':''}>Звонок</option>
            <option value="meeting" ${e.kind==='meeting'?'selected':''}>Встреча</option>
            <option value="contract" ${e.kind==='contract'?'selected':''}>Договор</option>
            <option value="followup" ${e.kind==='followup'?'selected':''}>Контрольная точка</option>
          </select>
        </label>
        <label class="field"><span>Дата и время</span>
          <input type="datetime-local" id="ev-date" value="${new Date(e.date).toISOString().slice(0,16)}">
        </label>
      </div>
      <div class="form-row full">
        <label class="field"><span>Клиент</span>
          <select id="ev-client">
            <option value="">—</option>
            ${visibleClientList.map(c => `<option value="${c.id}" ${e.clientId===c.id?'selected':''}>${escapeHtml(c.name)} (${escapeHtml(c.manager)})</option>`).join('')}
          </select>
        </label>
      </div>
      <div class="form-row full">
        <label class="field"><span>Что сделать</span>
          <input type="text" id="ev-title" value="${escapeHtml(e.title||'')}" placeholder="например, перезвонить по предложению">
        </label>
      </div>
    </div>
    <div class="modal-footer">
      ${isEdit ? `<button class="btn btn-danger" id="ev-del">Удалить</button>` : ''}
      <button class="btn" id="ev-cancel">Отмена</button>
      <button class="btn btn-primary" id="ev-save">Сохранить</button>
    </div>
  `;
  openModal(html);
  document.getElementById('ev-cancel').onclick = closeModal;
  document.getElementById('m-close').onclick = closeModal;
  if (isEdit) document.getElementById('ev-del').onclick = () => {
    state.events = state.events.filter(x => x.id !== eventId);
    persist(); closeModal(); drawCalendar(); renderNav();
  };
  document.getElementById('ev-save').onclick = () => {
    const data = {
      id: e.id,
      kind: document.getElementById('ev-kind').value,
      date: new Date(document.getElementById('ev-date').value).toISOString(),
      clientId: document.getElementById('ev-client').value,
      title: document.getElementById('ev-title').value || 'Событие',
      author: state.user.name,
      completed: false,
    };
    if (!data.clientId) { alert('Укажите клиента'); return; }
    if (isEdit) {
      const i = state.events.findIndex(x => x.id === eventId);
      state.events[i] = data;
    } else state.events.push(data);
    persist(); closeModal(); drawCalendar(); renderNav();
  };
}

function afterAnalytics() {

    yellow: '#EBC55B', yellowSoft: '#F6E3A8', dark: '#2A2D34',
    green: '#8FBF9F', greenSoft: '#BFD9C6', gray: '#C9CCD1', graySoft: '#E4E6EA',
    grid: '#EEF0F2',
  };
  Chart.defaults.font.family = 'Inter';
  Chart.defaults.color = '#6B7280';

  // 1. Stages — horizontal soft bar
  const stageCounts = STAGES.map(s => all.filter(c => clientStage(c)===s.id).length);
  _chartRefs.s1 = new Chart(document.getElementById('ch-stages'), {
    type: 'bar',
    data: { labels: STAGES.map(s=>s.name), datasets: [{ label:'Клиентов', data: stageCounts, backgroundColor: C.yellow, borderRadius: 6, borderSkipped:false, barThickness: 18 }] },
    options: softHBar(false, C)
  });

  // 2. Activities — horizontal soft bar
  const acts = uniqueActivities();
  const actCounts = acts.map(a => all.filter(c => (c.activity||'Другое')===a).length);
  _chartRefs.s2 = new Chart(document.getElementById('ch-activity'), {
    type: 'bar',
    data: { labels: acts, datasets: [{ label:'Клиентов', data: actCounts, backgroundColor: C.yellow, borderRadius: 6, borderSkipped:false, barThickness: 16 }] },
    options: softHBar(false, C)
  });

  // 3. Categories — doughnut, soft tones
  const catCounts = ['A','B','C'].map(k => all.filter(c => clientCategory(c)===k).length);
  _chartRefs.s3 = new Chart(document.getElementById('ch-cats'), {
    type: 'doughnut',
    data: { labels: ['A — активные','B — слабоактивные','C — без отгрузок'],
            datasets:[{ data: catCounts, backgroundColor:[C.green, C.yellow, C.gray], borderWidth: 2, borderColor: '#fff' }] },
    options: { responsive:true, maintainAspectRatio:false, cutout: '62%',
               plugins:{ legend:{ position:'bottom', labels:{ boxWidth:10, padding:14, font:{family:'Inter'} } } } }
  });

  // 4. Revenue by activity — horizontal dark bar
  const revByAct = acts.map(a => all.filter(c => (c.activity||'Другое')===a).reduce((s,c)=>s+(c.revenue||0),0));
  _chartRefs.s4 = new Chart(document.getElementById('ch-rev-activity'), {
    type: 'bar',
    data: { labels: acts, datasets: [{ label:'Выручка', data: revByAct, backgroundColor: C.dark, borderRadius: 6, borderSkipped:false, barThickness: 16 }] },
    options: softHBar(true, C)
  });

  // 5. Cohort by year — vertical soft bar
  const byYear = {};
  all.forEach(c => {
    if (!c.reg_date) return;
    const y = new Date(c.reg_date).getFullYear();
    if (y < 2018) { byYear['до 2018'] = (byYear['до 2018']||0)+1; return; }
    byYear[String(y)] = (byYear[String(y)]||0)+1;
  });
  const yKeys = Object.keys(byYear).sort();
  _chartRefs.s5 = new Chart(document.getElementById('ch-cohort'), {
    type: 'bar',
    data: { labels: yKeys, datasets:[{ label:'Клиентов', data: yKeys.map(k=>byYear[k]), backgroundColor: C.yellow, borderRadius: 6, borderSkipped:false }] },
    options: softVBar(C)
  });

  // 6. Events KPIs
  const clientIds = new Set(all.map(c => c.id));
  const evs = state.events.filter(e => clientIds.has(e.clientId));
  const now = new Date();
  const open = evs.filter(e => !e.completed);
  const overdue = open.filter(e => new Date(e.date) < new Date(now.toDateString()));
  const done = evs.filter(e => e.completed);
  const withOpenEvent = new Set(open.map(e => e.clientId));
  const coverage = all.length ? Math.round(withOpenEvent.size / all.length * 100) : 0;
  const perClient = all.length ? (evs.length / all.length) : 0;
  const evKpis = [
    { label: 'Всего событий', value: fmt.int(evs.length), accent: C.yellow },
    { label: 'Запланировано', value: fmt.int(open.length - overdue.length), accent: '#9AB7D4', sub: 'открытых, в срок' },
    { label: 'Просрочено', value: fmt.int(overdue.length), accent: '#D89A9A', sub: overdue.length ? 'требуют внимания' : 'всё в срок' },
    { label: 'Выполнено', value: fmt.int(done.length), accent: C.green },
    { label: 'Покрытие базы', value: coverage + '%', accent: C.dark, sub: `${perClient.toFixed(1)} событий на клиента` },
  ];
  document.getElementById('ev-kpis').innerHTML = evKpis.map(k => `
    <div class="kpi"><div class="kpi-accent" style="background:${k.accent}"></div>
      <div class="kpi-label">${k.label}</div><div class="kpi-value">${k.value}</div>
      ${k.sub ? `<div class="kpi-sub">${k.sub}</div>` : ''}</div>
  `).join('');

  // Per-manager
  const mgrs = [...new Set(all.map(c => c.manager).filter(Boolean))];
  const clientMgr = {}; all.forEach(c => clientMgr[c.id] = c.manager);
  const mgrStats = mgrs.map(m => {
    const me = evs.filter(e => clientMgr[e.clientId] === m);
    const mClients = all.filter(c => c.manager === m);
    const activeCnt = mClients.filter(c => clientStage(c) === 'active').length;
    return {
      manager: m,
      planned: me.filter(e => !e.completed && new Date(e.date) >= new Date(now.toDateString())).length,
      overdue: me.filter(e => !e.completed && new Date(e.date) < new Date(now.toDateString())).length,
      total: mClients.length, active: activeCnt,
      conv: mClients.length ? Math.round(activeCnt / mClients.length * 100) : 0,
    };
  }).sort((a,b) => (b.planned+b.overdue) - (a.planned+a.overdue));

  // 7a. Events by manager — soft stacked
  _chartRefs.s6 = new Chart(document.getElementById('ch-mgr-events'), {
    type: 'bar',
    data: {
      labels: mgrStats.map(s => s.manager.split(' ').slice(0,2).join(' ')),
      datasets: [
        { label: 'Запланировано', data: mgrStats.map(s=>s.planned), backgroundColor: '#9AB7D4', borderRadius: 4, barThickness: 16 },
        { label: 'Просрочено',    data: mgrStats.map(s=>s.overdue), backgroundColor: '#D89A9A', borderRadius: 4, barThickness: 16 },
      ]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: { legend: { position: 'bottom', labels: { boxWidth: 10, padding: 12, font:{family:'Inter'} } } },
      scales: {
        x: { stacked: true, grid: { display: false } },
        y: { stacked: true, grid: { color: C.grid }, border: { display:false }, ticks: { precision: 0 } }
      }
    }
  });

  // 7b. Conversion by manager — soft green horizontal
  const convSorted = [...mgrStats].sort((a,b) => b.conv - a.conv);
  _chartRefs.s7 = new Chart(document.getElementById('ch-mgr-conv'), {
    type: 'bar',
    data: {
      labels: convSorted.map(s => s.manager.split(' ').slice(0,2).join(' ')),
      datasets: [{ label: 'Конверсия', data: convSorted.map(s=>s.conv), backgroundColor: C.green, borderRadius: 5, borderSkipped:false, barThickness: 16 }]
    },
    options: {
      responsive: true, maintainAspectRatio: false, indexAxis: 'y',
      plugins: { legend: { display: false },
        tooltip: { callbacks: { label: (ctx) => {
          const s = convSorted[ctx.dataIndex];
          return `Конверсия ${s.conv}% — ${s.active} из ${s.total} клиентов`;
        } } } },
      scales: {
        x: { grid: { color: C.grid }, border: { display:false }, max: 100, ticks: { callback: v => v + '%' } },
        y: { grid: { display: false }, border: { display:false } }
      }
    }
  });
}

// Soft horizontal bar options (Power-BI-ish: muted grid, no axis borders)
function softHBar(valueAsRub, C) {
  return {
    responsive: true, maintainAspectRatio: false, indexAxis: 'y',
    plugins: {
      legend: { display: false },
      tooltip: { callbacks: { label: (ctx) => valueAsRub ? fmt.rubFull(ctx.parsed.x) : `${ctx.parsed.x}` } }
    },
    scales: {
      x: { grid: { color: C.grid }, border: { display:false }, ticks: { callback: v => valueAsRub ? fmt.rub(v) : v } },
      y: { grid: { display: false }, border: { display:false } }
    }
  };
}
function softVBar(C) {
  return {
    responsive: true, maintainAspectRatio: false,
    plugins: { legend: { display: false } },
    scales: {
      x: { grid: { display: false }, border: { display:false } },
      y: { grid: { color: C.grid }, border: { display:false }, ticks: { precision: 0 } }
    }
  };
}
function hbarOpts(valueAsRub) {
  return {
    responsive: true, maintainAspectRatio: false, indexAxis: 'y',
    plugins: { legend: { display: false },
      tooltip: { callbacks: { label: (ctx) => valueAsRub ? fmt.rubFull(ctx.parsed.x) : `${ctx.parsed.x}` } } },
    scales: {
      x: { grid: { color: '#EEF0F2' }, ticks: { callback: v => valueAsRub ? fmt.rub(v) : v } },
      y: { grid: { display: false } }
    }
  };
}

function afterSettings() {
  if (state.user.role !== 'admin') return;

  document.getElementById('stages-save').onclick = () => {
    const newStages = STAGES.map(s => {
      const nameEl = document.querySelector(`[data-stage-id="${s.id}"][data-field="name"]`);
      const colorEl = document.querySelector(`[data-stage-id="${s.id}"][data-field="color"]`);
      const descEl = document.querySelector(`[data-stage-id="${s.id}"][data-field="desc"]`);
      return { ...s, name: nameEl?.value || s.name, color: colorEl?.value || s.color, desc: descEl?.value || s.desc };
    });
    state.settings.stages = newStages;
    applySettings();
    persist();
    renderView();
  };
  document.getElementById('stages-reset').onclick = () => {
    if (!confirm('Восстановить названия и цвета этапов по умолчанию?')) return;
    state.settings.stages = null;
    applySettings();
    persist();
    renderView();
  };

  // Menu visibility toggles
  document.querySelectorAll('.view-toggle').forEach(el => {
    el.addEventListener('change', () => {
      const id = el.dataset.viewId;
      let hv = state.settings.hiddenViews || [];
      if (el.checked) hv = hv.filter(x => x !== id);
      else if (!hv.includes(id)) hv.push(id);
      state.settings.hiddenViews = hv;
      persist();
      renderNav();
    });
  });

  // Menu order drag-and-drop
  (function() {
    const listEl = document.getElementById('menu-order-list');
    if (!listEl) return;
    let dragEl = null;
    listEl.querySelectorAll('.menu-order-item').forEach(item => {
      item.addEventListener('dragstart', () => { dragEl = item; item.classList.add('dragging'); });
      item.addEventListener('dragend', () => {
        item.classList.remove('dragging');
        dragEl = null;
        const order = [...listEl.querySelectorAll('.menu-order-item')].map(x => x.dataset.mid);
        state.settings.menuOrder = order;
        persist();
        renderNav();
      });
      item.addEventListener('dragover', (e) => {
        e.preventDefault();
        if (!dragEl || dragEl === item) return;
        const rect = item.getBoundingClientRect();
        const after = e.clientY > rect.top + rect.height / 2;
        listEl.insertBefore(dragEl, after ? item.nextSibling : item);
      });
    });
    document.getElementById('menu-order-reset').onclick = () => {
      state.settings.menuOrder = null;
      persist();
      renderView();
    };
  })();

  // Dashboard widgets toggles
  [['kpis','kpis'],['funnel','funnel'],['managers','managers'],['upcoming','upcoming'],['recent','recent'],['top','topClients']].forEach(([key, prop]) => {
    const el = document.getElementById('w-' + key);
    if (!el) return;
    el.addEventListener('change', () => {
      state.settings.dashboardWidgets[prop] = el.checked;
      persist();
    });
  });

  document.getElementById('auto-cat').addEventListener('change', (e) => {
    state.settings.autoCategoryEnabled = e.target.checked;
    persist();
  });
  document.getElementById('stale-weeks').addEventListener('change', (e) => {
    const v = parseInt(e.target.value, 10);
    state.settings.staleWeeks = (isNaN(v) || v < 1) ? 2 : v;
    persist();
  });

  // Manager add
  document.getElementById('add-manager-btn').onclick = () => {
    const inp = document.getElementById('new-manager-name');
    const name = (inp.value || '').trim();
    if (!name) { inp.focus(); return; }
    if (uniqueManagers().includes(name)) { alert('Такой менеджер уже есть в системе'); return; }
    state.extraManagers = state.extraManagers || [];
    state.extraManagers.push(name);
    persist();
    renderView();
  };
  // Manager delete
  document.querySelectorAll('.del-manager').forEach(b => b.onclick = () => {
    const m = b.dataset.mgr;
    const clients = state.clients.filter(c => c.manager === m);
    const others = uniqueManagers().filter(x => x !== m);
    if (clients.length > 0) {
      if (!others.length) { alert('Нельзя удалить единственного менеджера, у которого есть клиенты.'); return; }
      const target = prompt(`У менеджера «${m}» ${clients.length} клиент(ов).\nВведите имя менеджера, которому их переназначить:\n\nДоступны: ${others.join(', ')}`, others[0]);
      if (target === null) return;
      const t = others.find(x => x.toLowerCase() === target.trim().toLowerCase());
      if (!t) { alert('Менеджер «' + target + '» не найден. Удаление отменено.'); return; }
      clients.forEach(c => { c.manager = t; });
    } else {
      if (!confirm(`Удалить менеджера «${m}»?`)) return;
    }
    state.extraManagers = (state.extraManagers || []).filter(x => x !== m);
    state.users.forEach(u => { if (u.manager === m) u.manager = null; });
    persist();
    renderView();
  });

  document.getElementById('reset-btn').onclick = () => {
    if (!confirm('Все локальные изменения будут утрачены. Продолжить?')) return;
    localStorage.removeItem(LS_KEY);
    location.reload();
  };
}

function importPlansXlsx(file) {
  if (typeof XLSX === 'undefined') { alert('Библиотека импорта не загрузилась.'); return; }
  const result = document.getElementById('import-result') || document.getElementById('imp-result') || { innerHTML: '' };
  const reader = new FileReader();
  reader.onload = (e) => {
    try {
      const wb = XLSX.read(e.target.result, { type: 'array' });
      const ws = wb.Sheets[wb.SheetNames[0]];
      const rows = XLSX.utils.sheet_to_json(ws);
      const MONTHS = { 'январь':'jan','февраль':'feb','март':'mar','1':'jan','2':'feb','3':'mar' };
      let applied = 0, skipped = 0;
      rows.forEach(r => {
        const mgr = String(r['Менеджер'] || r['менеджер'] || '').trim();
        const monRaw = String(r['Месяц'] || r['месяц'] || '').trim().toLowerCase();
        const plan = Number(r['План'] || r['план'] || 0);
        const monKey = MONTHS[monRaw];
        if (!mgr || !monKey) { skipped++; return; }
        let mp = MANAGER_PERF.find(x => x.manager === mgr);
        if (!mp) { mp = { manager: mgr, plan: {}, fact: {} }; MANAGER_PERF.push(mp); }
        mp.plan = mp.plan || {};
        mp.plan[monKey] = plan;
        applied++;
      });
      result.innerHTML = `<span style="color:var(--success)">✓ Загружено строк: ${applied}${skipped?`, пропущено: ${skipped}`:''}.</span> Планы обновлены в разделе «Продажи».`;
    } catch (err) {
      result.innerHTML = `<span style="color:var(--danger)">Ошибка чтения файла: ${escapeHtml(err.message)}</span>`;
    }
  };
  reader.readAsArrayBuffer(file);
}

// =================== 1С IMPORT ===================
// Источник: 8 xlsx-выгрузок из 1С. Парсер строит 2-слойную модель: from1c.* в каждом клиенте.
// CRM-only поля (events, comments, контакты, описание) защищены от перезаписи.

const ONEC_FILE_TYPES = [
  { key: 'partners',   re: /B2B\s*продаж/i,                label: 'Справочник партнёров (B2B)', required: true },
  { key: 'inn',        re: /\(\s*ИНН\s*\)/i,                label: 'Справочник ИНН' },
  { key: 'address',    re: /факт\.?\s*адрес/i,              label: 'Факт. адреса' },
  { key: 'contracts',  re: /Договоры/i,                     label: 'Договоры (лимиты)' },
  { key: 'agreements', re: /Соглашения/i,                   label: 'Соглашения (отсрочки)' },
  { key: 'debt',       re: /Задолженност/i,                 label: 'Задолженность' },
  { key: 'orders',     re: /Расшифровка\s*заказ/i,          label: 'Расшифровка заказов' },
  { key: 'sales',      re: /Продаж[иь]\s*по\s*дн/i,         label: 'Продажи по дням' }
];

const ONEC_STAGE_MAP = {
  '1) Контакт': 'contact',
  '2) Переговоры': 'talks',
  '3) Договор': 'contract',
  '4) Первый заказ': 'firstorder',
  '5) Активно работает': 'active',
  '6) Отказ в работе': 'reject'
};

function onec_detect(filename) {
  for (const t of ONEC_FILE_TYPES) if (t.re.test(filename)) return t.key;
  return null;
}

function onec_readXlsx(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = (e) => {
      try { resolve(XLSX.read(e.target.result, { type: 'array', cellDates: true })); }
      catch (err) { reject(err); }
    };
    reader.onerror = () => reject(new Error('Не удалось прочитать файл'));
    reader.readAsArrayBuffer(file);
  });
}

function onec_rows(wb) {
  const ws = wb.Sheets[wb.SheetNames[0]];
  return XLSX.utils.sheet_to_json(ws, { header: 1, raw: false, defval: null });
}

function onec_parseDate(v) {
  if (!v) return null;
  if (v instanceof Date) return v.toISOString().slice(0, 10);
  const s = String(v).trim();
  const m = s.match(/^(\d{1,2})[.\/](\d{1,2})[.\/](\d{4})/);
  if (m) return `${m[3]}-${m[2].padStart(2,'0')}-${m[1].padStart(2,'0')}`;
  if (/^\d{4}-\d{2}-\d{2}/.test(s)) return s.slice(0,10);
  return null;
}

function onec_num(v) {
  if (v == null || v === '') return 0;
  if (typeof v === 'number') return v;
  let s = String(v).replace(/\s/g, '').trim();
  if (!s) return 0;
  // Формат "1,234.56" (US, запятые — разделители тысяч) vs "1234,56" (RU, запятая — десятичная)
  if (s.indexOf('.') >= 0 && s.indexOf(',') >= 0) {
    s = s.replace(/,/g, '');
  } else if (s.indexOf(',') >= 0 && s.indexOf('.') < 0) {
    s = s.replace(',', '.');
  }
  const n = Number(s);
  return isFinite(n) ? n : 0;
}

// --- 8 parsers, каждый возвращает Map<partnerName, data> или массив ---

function onec_parsePartners(rows) {
  // Файл: «Справочник партнеров (B2B продажи)». Header row index 7 (двойной заголовок 7+8).
  // Данные начинаются с r9. Фильтр: Клиент='Да' AND Поставщик!='Да'.
  const map = new Map();
  for (let i = 9; i < rows.length; i++) {
    const r = rows[i]; if (!r) continue;
    const name = (r[3] || '').toString().trim();
    if (!name) continue;
    const isClient = (r[7] || '').toString().trim() === 'Да';
    const isSupplier = (r[10] || '').toString().trim() === 'Да';
    if (!isClient || isSupplier) continue;
    const stage1c = ONEC_STAGE_MAP[(r[27] || '').toString().trim()] || null;
    map.set(name, {
      name,
      reg_date: onec_parseDate(r[0]),
      partner: name,
      head_company: (r[5] || '').toString().trim() || null,
      public_name: (r[6] || '').toString().trim() || null,
      code: (r[8] || '').toString().trim() || null,
      note1c: (r[9] || '').toString().trim() || null,           // «Комментарий» из 1С
      primary_manager: (r[11] || '').toString().trim() || null,
      entity_type: (r[12] || '').toString().trim() || null,     // Юр/Физлицо
      price_type: (r[13] || '').toString().trim() || null,
      activity: (r[15] || '').toString().trim() || (r[14] || '').toString().trim() || null,
      cashback: (r[16] || '').toString().trim() || null,
      main_competitor: (r[17] || '').toString().trim() || null,
      wpart_connected: (r[18] || '').toString().trim() === 'Да',
      otkh: (r[19] || '').toString().trim() === 'Да',
      retro_bonus: (r[20] || '').toString().trim() === 'Да',
      tested_product: (r[21] || '').toString().trim() === 'Да',
      brand_competitor: (r[22] || '').toString().trim() || null,
      price_competition: (r[23] || '').toString().trim() || null,
      solvency: (r[24] || '').toString().trim() || null,
      category: (r[25] || '').toString().trim() || null,
      from_seller: (r[26] || '').toString().trim() === 'Да',
      stage: stage1c
    });
  }
  return map;
}

function onec_parseInn(rows) {
  // Файл: «Справочник партнёров (ИНН)». Header row 6, данные с 8 (r7 «Наше предприятие»).
  const map = new Map();
  for (let i = 8; i < rows.length; i++) {
    const r = rows[i]; if (!r) continue;
    const partner = (r[8] || '').toString().trim();
    if (!partner || partner === 'Наше предприятие') continue;
    if (!map.has(partner)) {
      map.set(partner, {
        short_name: (r[4] || '').toString().trim() || null,
        head_contractor: (r[5] || '').toString().trim() || null,
        inn: (r[6] || '').toString().trim() || null,
        kpp: (r[7] || '').toString().trim() || null
      });
    }
  }
  return map;
}

function onec_parseAddress(rows) {
  // Файл: «Справочник клиентов - факт.адрес». Header row 0, данные с 1.
  const map = new Map();
  for (let i = 1; i < rows.length; i++) {
    const r = rows[i]; if (!r) continue;
    const partner = (r[0] || '').toString().trim();
    if (!partner) continue;
    map.set(partner, {
      address_full: (r[1] || '').toString().trim() || null,
      country: (r[2] || '').toString().trim() || null,
      region: (r[3] || '').toString().trim() || null,
      city: (r[4] || '').toString().trim() || null
    });
  }
  return map;
}

function onec_parseContracts(rows) {
  // Файл: «Договоры с клиентами (лимиты)». Header row 7, данные с 8.
  // Колонки: 0=№док, 3=валюта, 5=№(краткий), 6=Контрагент(=Партнёр), 7=Статус, 9=Подписан, 10=НДС
  // 11=№док полный, 13=Дата, 14=Тип(Закупка/Реализация), 17=Менеджер, 21=Лимит
  const map = new Map();
  for (let i = 8; i < rows.length; i++) {
    const r = rows[i]; if (!r) continue;
    const partner = (r[6] || '').toString().trim();
    if (!partner) continue;
    const type = (r[14] || '').toString().trim();
    // Для CRM нам важны только договоры Реализации (с клиентами, не закупки у поставщиков)
    if (type && type !== 'Реализация') continue;
    const contract = {
      no: (r[5] || r[0] || '').toString().trim() || null,
      date: onec_parseDate(r[13]),
      currency: (r[3] || '').toString().trim() || 'RUB',
      status: (r[7] || '').toString().trim() || null,
      vat: (r[10] || '').toString().trim() || null,
      manager: (r[17] || '').toString().trim() || null,
      limit: onec_num(r[21])
    };
    const arr = map.get(partner) || [];
    arr.push(contract);
    map.set(partner, arr);
  }
  return map;
}

function onec_parseAgreements(rows) {
  // Файл: «Соглашения с клиентами (отсрочка)». Header row 8, данные с 9.
  // Колонки (на основе скана): 0=Спецификация, 3=Оплата, 4=База даты, 6=Партнёр, 7=%, 8=Дней
  const map = new Map();
  for (let i = 9; i < rows.length; i++) {
    const r = rows[i]; if (!r) continue;
    const partner = (r[6] || '').toString().trim();
    if (!partner) continue;
    const existing = map.get(partner);
    const newDays = onec_num(r[8]);
    // Если несколько соглашений — берём с максимальной отсрочкой
    if (!existing || newDays > existing.days) {
      map.set(partner, {
        spec: (r[0] || '').toString().trim() || null,
        payment_rule: (r[3] || '').toString().trim() || null,
        date_base: (r[4] || '').toString().trim() || null,
        percent: onec_num(r[7]),
        days: newDays
      });
    }
  }
  return map;
}

function onec_parseDebt(rows) {
  // Файл: «Задолженность клиентов по срокам». Header row 9 (с подзаголовками 10-11), данные с 12.
  // Колонки: 1=Клиент, 7=Менеджер, 9=Долг всего, 10=Доля%, 11=Просрочено, 12=%просрочки, 13=Дней
  // 14=Наш долг (мы должны), 16-23 = aging buckets (Не просрочено / 1-2 / 3-14 / 15-29 / 30-44 / 45-59 / 60-179 / >180)
  const map = new Map();
  for (let i = 12; i < rows.length; i++) {
    const r = rows[i]; if (!r) continue;
    const partner = (r[1] || '').toString().trim();
    if (!partner) continue;
    const entry = map.get(partner) || {
      total: 0, overdue: 0, our_debt: 0,
      aging: { not_overdue: 0, d1_2: 0, d3_14: 0, d15_29: 0, d30_44: 0, d45_59: 0, d60_179: 0, d180plus: 0 },
      max_overdue_days: 0,
      docs_count: 0
    };
    entry.total += onec_num(r[9]);
    entry.overdue += onec_num(r[11]);
    entry.our_debt += onec_num(r[14]);
    entry.aging.not_overdue += onec_num(r[16]);
    entry.aging.d1_2     += onec_num(r[17]);
    entry.aging.d3_14    += onec_num(r[18]);
    entry.aging.d15_29   += onec_num(r[19]);
    entry.aging.d30_44   += onec_num(r[20]);
    entry.aging.d45_59   += onec_num(r[21]);
    entry.aging.d60_179  += onec_num(r[22]);
    entry.aging.d180plus += onec_num(r[23]);
    entry.max_overdue_days = Math.max(entry.max_overdue_days, onec_num(r[13]));
    entry.docs_count++;
    map.set(partner, entry);
  }
  return map;
}

function onec_parseOrders(rows) {
  // Файл: «Расшифровка заказов клиентов». Header row 2, данные с 3.
  // Колонки: 0=№заказа+дата, 1=Клиент(Партнёр), 2=Валюта, 3=Тип, 4=Статус(Закрыт/Открыт),
  // 5=Условия(Самовывоз), 6=Менеджер, 7=Головное, 8=Сумма
  const map = new Map();
  for (let i = 3; i < rows.length; i++) {
    const r = rows[i]; if (!r) continue;
    const partner = (r[1] || '').toString().trim();
    if (!partner) continue;
    const orderStr = (r[0] || '').toString();
    // Извлекаем дату из строки вида "Заказ клиента 00ЦБ-000004 от 18.01.2024..."
    const dm = orderStr.match(/от\s+(\d{1,2}\.\d{1,2}\.\d{4})/);
    const date = dm ? onec_parseDate(dm[1]) : null;
    const amount = onec_num(r[8]);
    const entry = map.get(partner) || { count: 0, total: 0, closed: 0, open: 0, last_date: null };
    entry.count++;
    entry.total += amount;
    const status = (r[4] || '').toString().trim();
    if (status === 'Закрыт') entry.closed++; else entry.open++;
    if (date && (!entry.last_date || date > entry.last_date)) entry.last_date = date;
    map.set(partner, entry);
  }
  return map;
}

function onec_parseSales(rows) {
  // Файл: «Продажи по дням». Header row 2, данные с 3. Колонки:
  // 0=Дата (только в верхней строке группы), 3=Артикул, 4=Номенклатура, 5=Бренд,
  // 6=Покупатель(Партнёр), 7=Головное, 8=Заказ, 9=Категория, 10=Менеджер,
  // 12=Кол-во, 13=Сумма, 14=Себест.
  const map = new Map();
  let currentDate = null;
  for (let i = 3; i < rows.length; i++) {
    const r = rows[i]; if (!r) continue;
    const dateCell = onec_parseDate(r[0]);
    if (dateCell) currentDate = dateCell;
    const partner = (r[6] || '').toString().trim();
    if (!partner || !currentDate) continue;
    const amount = onec_num(r[13]);
    const cost = onec_num(r[14]);
    const qty = onec_num(r[12]);
    const year = currentDate.slice(0, 4);
    const month = currentDate.slice(0, 7);     // YYYY-MM
    const entry = map.get(partner) || {
      total: 0, total_cost: 0, by_year: {}, by_month: {},
      last_date: null, txn_count: 0, transactions: []
    };
    entry.total += amount;
    entry.total_cost += cost;
    entry.by_year[year] = (entry.by_year[year] || 0) + amount;
    entry.by_month[month] = (entry.by_month[month] || 0) + amount;
    if (!entry.last_date || currentDate > entry.last_date) entry.last_date = currentDate;
    // Пропускаем строки с нулевой суммой (служебные / не отгружено / сторно с 0)
    if (amount === 0) continue;
    entry.txn_count++;
    entry.transactions.push({
      date: currentDate,
      article: (r[3] || '').toString().trim(),
      nomenclature: (r[4] || '').toString().trim(),
      brand: (r[5] || '').toString().trim(),
      qty,
      amount,
      price: qty ? amount / qty : amount
    });
    map.set(partner, entry);
  }
  // Финал: сортируем по дате desc. Лимит не применяем — все транзакции.
  // Если localStorage переполнится — persist() сам обрежет и пометит _truncated.
  map.forEach((entry) => {
    entry.transactions.sort((a, b) => (b.date || '').localeCompare(a.date || ''));
  });
  return map;
}

const ONEC_PARSERS = {
  partners: onec_parsePartners,
  inn: onec_parseInn,
  address: onec_parseAddress,
  contracts: onec_parseContracts,
  agreements: onec_parseAgreements,
  debt: onec_parseDebt,
  orders: onec_parseOrders,
  sales: onec_parseSales
};

// Собирает данные из 8 источников в единые объекты клиентов.
// Если allowedManagers передан — фильтрует партнёров по primary_manager.
// Возвращает { clients, skipReport: { byUnknownManager: {mgr → count}, totalSkipped } }
function onec_buildClients(parsed, allowedManagers /* Set | null */) {
  if (!parsed.partners) throw new Error('Не загружен главный файл «Справочник партнёров B2B»');
  const out = [];
  const skipReport = { byUnknownManager: {}, totalSkipped: 0, noManager: 0 };
  parsed.partners.forEach((p, name) => {
    // Фильтр по менеджерам из CRM
    if (allowedManagers) {
      const mgr = (p.primary_manager || '').trim();
      if (!mgr) {
        // партнёр без менеджера — пропускаем
        skipReport.noManager++;
        skipReport.totalSkipped++;
        return;
      }
      if (!allowedManagers.has(mgr)) {
        skipReport.byUnknownManager[mgr] = (skipReport.byUnknownManager[mgr] || 0) + 1;
        skipReport.totalSkipped++;
        return;
      }
    }
    const inn  = parsed.inn        ? parsed.inn.get(name)        : null;
    const addr = parsed.address    ? parsed.address.get(name)    : null;
    const con  = parsed.contracts  ? parsed.contracts.get(name)  : null;
    const agr  = parsed.agreements ? parsed.agreements.get(name) : null;
    const debt = parsed.debt       ? parsed.debt.get(name)       : null;
    const ord  = parsed.orders     ? parsed.orders.get(name)     : null;
    const sal  = parsed.sales      ? parsed.sales.get(name)      : null;
    out.push({
      name,
      from1c: {
        last_synced: new Date().toISOString(),
        ...p,
        ...(inn || {}),
        ...(addr || {}),
        contracts: con || [],
        agreement: agr || null,
        debt: debt || null,
        orders: ord || null,
        sales: sal || null
      }
    });
  });
  return { clients: out, skipReport };
}

// Получает Set имён менеджеров из state.users
function onec_crmManagers() {
  return new Set((state.users || []).filter(u => u.manager).map(u => u.manager));
}

// Merge: сохраняет CRM-only поля, обновляет 1С-слой
function onec_mergeClients(newClients, mode /* 'replace' | 'merge' */) {
  const stats = { added: 0, updated: 0, archived: 0, total_incoming: newClients.length };
  const incomingByName = new Map(newClients.map(c => [c.name.toLowerCase(), c]));

  if (mode === 'replace') {
    // Удаляем тестовые (без from1c) ДО построения карты, иначе мы будем «обновлять» удалённые объекты
    state.clients = state.clients.filter(c => c.from1c);
  }
  const localByName = new Map(state.clients.map(c => [(c.name||'').toLowerCase(), c]));

  // Выбирает «основной» договор для отображения в плоских полях карточки/раздела «Договоры»
  function pickPrimaryContract(contracts) {
    if (!contracts || !contracts.length) return null;
    const active = contracts.filter(x => x.status === 'Действует');
    const pool = active.length ? active : contracts;
    // Сортируем по дате (новейший первый)
    const sorted = [...pool].sort((a, b) => (b.date || '').localeCompare(a.date || ''));
    return sorted[0];
  }

  // Обновить существующих или добавить новых
  newClients.forEach(nc => {
    const key = nc.name.toLowerCase();
    const local = localByName.get(key);
    const from1c = nc.from1c;
    const primary = pickPrimaryContract(from1c.contracts);
    if (local) {
      // Слияние: from1c полностью обновляется, плоские поля — выборочно
      local.from1c = from1c;
      // Перебиваем (1С — источник истины)
      if (from1c.primary_manager) local.manager = from1c.primary_manager;
      if (from1c.activity && !local.activityManual) local.activity = from1c.activity;
      if (from1c.inn) local.inn = from1c.inn;
      if (from1c.reg_date) local.reg_date = from1c.reg_date;
      if (from1c.city) local.city = local.cityManual || from1c.city;
      if (from1c.address_full) local.address = local.addressManual || from1c.address_full;
      // Финансы — всегда из 1С (это факт)
      local.revenue = from1c.sales ? from1c.sales.total : (local.revenue || 0);
      local.debt = from1c.debt ? from1c.debt.total : 0;
      local.overdue = from1c.debt ? from1c.debt.overdue : 0;
      // Договор — копируем актуальный из 1С в плоские поля (для совместимости с renderContracts)
      if (primary) {
        if (!local.contract_noManual) local.contract_no = primary.no || '';
        if (!local.contract_dateManual) local.contract_date = primary.date || '';
        local.contract_signed = primary.status === 'Действует';
      }
      // Снимаем флаг архив-исчезновения, если клиент снова в выгрузке
      delete local.from1c_archived;
      stats.updated++;
    } else {
      // Новый клиент
      const newClient = {
        id: 'c_p_' + (from1c.code || uid()),
        name: nc.name,
        manager: from1c.primary_manager || '',
        activity: from1c.activity || 'Другое',
        inn: from1c.inn || '',
        reg_date: from1c.reg_date || new Date().toISOString().slice(0,10),
        city: from1c.city || '',
        address: from1c.address_full || '',
        revenue: from1c.sales ? from1c.sales.total : 0,
        debt: from1c.debt ? from1c.debt.total : 0,
        overdue: from1c.debt ? from1c.debt.overdue : 0,
        contract_no: primary ? (primary.no || '') : '',
        contract_date: primary ? (primary.date || '') : '',
        contract_signed: primary ? primary.status === 'Действует' : false,
        from1c
      };
      state.clients.push(newClient);
      stats.added++;
    }
  });

  // Помечаем «исчезнувших» (были в from1c, теперь нет)
  state.clients.forEach(c => {
    if (!c.from1c) return; // тестовые не трогаем
    if (!incomingByName.has((c.name||'').toLowerCase())) {
      if (!c.from1c_archived) {
        c.from1c_archived = true;
        c.stageManual = 'reject';
        stats.archived++;
      }
    }
  });

  state.lastImportedAt = new Date().toISOString();
  state.from1cImportStats = stats;
  persist();
  return stats;
}

// =================== 1С: АВТО-ИМПОРТ из локальной папки _data/ ===================
// Сценарий: пользователь запустил start_crm.ps1 → скрипт скопировал xlsx в _data/ →
// сервер стартанул, CRM открыта на http://localhost — проверяем папку и тихо импортируем.

const ONEC_AUTOLOAD_FILES = [
  'Справочник партнеров (B2B продажи) XLSX.xlsx',
  'Справочник партнеров (ИНН) XLSX.xlsx',
  'Справочник клиентов - факт.адрес.xlsx',
  'Договоры с клиентами (лимиты) XLSX.xlsx',
  'Соглашения с клиентами (отсрочка) XLSX.xlsx',
  'Задолженность клиентов по срокам - для Power BI (факт данные) XLSX.xlsx',
  'Расшифровка заказов клиентов.xlsx',
  'Продажи по дням (для анализа) XLSX.xlsx'
];

async function onec_dataFolderAvailable() {
  // file:// не умеет fetch к относительным путям → авто-импорт невозможен
  if (location.protocol === 'file:') return false;
  try {
    const r = await fetch('./_data/' + encodeURIComponent(ONEC_AUTOLOAD_FILES[0]), { method: 'HEAD' });
    return r.ok;
  } catch (e) { return false; }
}

function onec_toast(msg, type='info', durationMs=4000) {
  let t = document.getElementById('onec-toast');
  if (!t) {
    t = document.createElement('div');
    t.id = 'onec-toast';
    t.style.cssText = 'position:fixed; right:20px; bottom:20px; padding:12px 16px; border-radius:10px; box-shadow:0 8px 24px rgba(0,0,0,0.15); font-size:13px; font-weight:600; z-index:9999; transition:opacity 0.25s, transform 0.25s; max-width:380px;';
    document.body.appendChild(t);
  }
  const color = type === 'success' ? '#16A34A' : type === 'error' ? '#DC2626' : '#3B82F6';
  t.style.background = 'white';
  t.style.border = `1px solid ${color}`;
  t.style.color = color;
  t.innerHTML = msg;
  t.style.opacity = '1';
  t.style.transform = 'translateY(0)';
  clearTimeout(onec_toast._t);
  if (durationMs) onec_toast._t = setTimeout(() => { t.style.opacity = '0'; t.style.transform = 'translateY(8px)'; }, durationMs);
}

async function onec_autoImport(opts = {}) {
  const silent = opts.silent !== false;
  if (!await onec_dataFolderAvailable()) return false;
  if (!silent) onec_toast('🔄 Загрузка свежих данных из 1С…', 'info', 0);

  const parsed = {};
  const errors = [];
  for (const fn of ONEC_AUTOLOAD_FILES) {
    try {
      const r = await fetch('./_data/' + encodeURIComponent(fn));
      if (!r.ok) { errors.push(`${fn}: ${r.status}`); continue; }
      const ab = await r.arrayBuffer();
      const key = onec_detect(fn);
      if (!key) continue;
      parsed[key] = ONEC_PARSERS[key](onec_rows(XLSX.read(ab, { type: 'array', cellDates: true })));
    } catch (e) { errors.push(`${fn}: ${e.message}`); }
  }
  if (!parsed.partners) {
    onec_toast('⚠ Не удалось распарсить файлы 1С', 'error');
    return false;
  }

  const allowed = onec_crmManagers();
  const built = onec_buildClients(parsed, allowed.size ? allowed : null);
  const stats = onec_mergeClients(built.clients, 'replace');
  state.lastAutoImportAt = new Date().toISOString();
  persist();
  renderNav();
  renderView();

  let msg = `✓ <b>Импорт завершён:</b><br>+${stats.added} новых, ${stats.updated} обновлено`;
  if (stats.archived) msg += `, ${stats.archived} в архив`;
  if (built.skipReport.totalSkipped) msg += `<br><span style="font-weight:400; color:#92400E;">⚠ Пропущено ${built.skipReport.totalSkipped} — менеджеров нет в CRM</span>`;
  onec_toast(msg, 'success', 6000);
  return true;
}

// UI: основной воркфлоу импорта
async function onec_runImport() {
  const input = document.createElement('input');
  input.type = 'file';
  input.multiple = true;
  input.accept = '.xlsx,.xls';
  input.onchange = async (e) => {
    const files = Array.from(e.target.files || []);
    if (!files.length) return;
    onec_processFiles(files);
  };
  input.click();
}

async function onec_processFiles(files) {
  // Показать прогресс
  const layer = document.getElementById('modal-layer');
  const modal = document.getElementById('modal-content');
  modal.className = 'modal modal-wide';
  modal.innerHTML = `
    <div style="padding:32px; text-align:center;">
      <div style="font-size:32px; margin-bottom:12px;">📥</div>
      <h3 style="margin:0 0 16px;">Парсинг файлов 1С…</h3>
      <div id="onec-progress" style="font-size:13px; color:var(--text-muted);">Обработано: 0 из ${files.length}</div>
    </div>`;
  layer.classList.remove('hidden');
  document.body.style.overflow = 'hidden';

  // Распознать и разобрать
  const matched = {};
  const errors = [];
  const fileReport = [];
  let processed = 0;
  for (const f of files) {
    const key = onec_detect(f.name);
    if (!key) {
      errors.push(`Не опознан: ${f.name}`);
      fileReport.push({ file: f.name, key: null, ok: false, error: 'не опознан' });
      processed++;
      continue;
    }
    if (matched[key]) {
      errors.push(`Дубликат типа «${key}»: ${f.name}`);
      processed++;
      continue;
    }
    try {
      const wb = await onec_readXlsx(f);
      const rows = onec_rows(wb);
      const data = ONEC_PARSERS[key](rows);
      matched[key] = data;
      fileReport.push({ file: f.name, key, ok: true, rows: rows.length, items: data.size || data.length || 0 });
    } catch (err) {
      errors.push(`${f.name}: ${err.message}`);
      fileReport.push({ file: f.name, key, ok: false, error: err.message });
    }
    processed++;
    const pg = document.getElementById('onec-progress');
    if (pg) pg.textContent = `Обработано: ${processed} из ${files.length}`;
  }

  if (!matched.partners) {
    onec_showError('Главный файл «Справочник партнёров B2B» не найден. Обязателен для импорта.', errors, fileReport);
    return;
  }

  // Собираем единый список клиентов с фильтром по менеджерам из CRM
  const allowedManagers = onec_crmManagers();
  let buildResult;
  try { buildResult = onec_buildClients(matched, allowedManagers.size ? allowedManagers : null); }
  catch (err) { onec_showError(err.message, errors, fileReport); return; }

  // Превью
  onec_showPreview(buildResult.clients, matched, errors, fileReport, buildResult.skipReport);
}

function onec_showError(msg, errors, fileReport) {
  document.getElementById('modal-content').innerHTML = `
    <div style="padding:24px;">
      <h3 style="margin:0 0 12px; color:var(--danger);">⚠ ${escapeHtml(msg)}</h3>
      ${errors.length ? `<div style="background:#FEE2E2; padding:12px; border-radius:8px; font-size:13px;">${errors.map(e => `• ${escapeHtml(e)}`).join('<br>')}</div>` : ''}
      ${fileReport.length ? `<div style="margin-top:12px; font-size:12px;"><b>Файлы:</b><br>${fileReport.map(f => `${f.ok?'✓':'✗'} ${escapeHtml(f.file)} ${f.key?`(${f.key})`:''} ${f.error?'— '+escapeHtml(f.error):''}`).join('<br>')}</div>` : ''}
      <div style="margin-top:16px; text-align:right;"><button class="btn" onclick="closeModal()">Закрыть</button></div>
    </div>`;
}

function onec_showPreview(newClients, matched, errors, fileReport, skipReport) {

  const willBeUpdated = newClients.length - willBeAdded;
  const willBeArchived = localFrom1c.filter(c => !incomingNames.has((c.name||'').toLowerCase()) && !c.from1c_archived).length;

  // Skip report — пропущенные по фильтру менеджера

  document.getElementById('modal-content').innerHTML = `
    <div style="padding:0;">
      <div style="background:linear-gradient(135deg, #64748B 0%, #475569 100%); color:white; padding:24px 32px;">
        <div style="display:flex; align-items:center; gap:14px;">
          <div style="font-size:36px;">📥</div>
          <div>
            <h3 style="margin:0 0 4px; font-size:22px;">Импорт из 1С</h3>
            <div style="font-size:13px; opacity:.85;">Найдено клиентов: <b>${newClients.length}</b> • Загружено файлов: ${Object.keys(matched).length} из 8</div>
          </div>
          <button class="modal-close" onclick="closeModal()" style="margin-left:auto; color:white;">✕</button>
        </div>
      </div>

      <div style="padding:24px 32px;">
        <div class="grid grid-3" style="margin-bottom:20px;">
          <div class="kpi"><div class="kpi-accent" style="background:var(--success)"></div><div class="kpi-label">Будет добавлено</div><div class="kpi-value">+${willBeAdded}</div><div class="kpi-sub">новых клиентов</div></div>
          <div class="kpi"><div class="kpi-accent" style="background:var(--info)"></div><div class="kpi-label">Будет обновлено</div><div class="kpi-value">${willBeUpdated}</div><div class="kpi-sub">существующих</div></div>
          <div class="kpi"><div class="kpi-accent" style="background:var(--warning)"></div><div class="kpi-label">В архив</div><div class="kpi-value">${willBeArchived}</div><div class="kpi-sub">исчезли из 1С</div></div>
        </div>

        <div class="grid grid-3" style="margin-bottom:20px;">
          <div class="kpi"><div class="kpi-accent" style="background:var(--wp-yellow)"></div><div class="kpi-label">Σ выручка</div><div class="kpi-value">${fmt.rub(totalRevenue)}</div><div class="kpi-sub">за период данных</div></div>
          <div class="kpi"><div class="kpi-accent" style="background:#8B5CF6"></div><div class="kpi-label">Σ долг</div><div class="kpi-value">${fmt.rub(totalDebt)}</div><div class="kpi-sub">по 1С</div></div>
          <div class="kpi"><div class="kpi-accent" style="background:var(--danger)"></div><div class="kpi-label">Σ просрочено</div><div class="kpi-value">${fmt.rub(totalOverdue)}</div><div class="kpi-sub">${totalDebt? Math.round(totalOverdue/totalDebt*100) : 0}% от долга</div></div>
        </div>

        <div style="background:#F9FAFB; border:1px solid var(--border); border-radius:10px; padding:14px 16px; margin-bottom:16px;">
          <div style="font-weight:600; font-size:13px; margin-bottom:8px;">Файлы:</div>
          <div style="font-size:12px; line-height:1.7;">
            ${ONEC_FILE_TYPES.map(t => {
              const r = fileReport.find(f => f.key === t.key);
              if (!r) return `<div style="color:var(--text-soft);">○ ${escapeHtml(t.label)} <span style="color:var(--text-soft);">— не загружен${t.required?' (обязательный)':''}</span></div>`;
              if (!r.ok) return `<div style="color:var(--danger);">✗ ${escapeHtml(t.label)} — ${escapeHtml(r.error||'')}</div>`;
              return `<div style="color:#166534;">✓ ${escapeHtml(t.label)} <span style="color:var(--text-muted);">— ${r.items} записей</span></div>`;
            }).join('')}
          </div>
          ${errors.length ? `<div style="margin-top:10px; padding-top:10px; border-top:1px solid var(--border); color:var(--danger); font-size:12px;">${errors.map(e => `⚠ ${escapeHtml(e)}`).join('<br>')}</div>` : ''}
        </div>

        ${sr.totalSkipped > 0 ? `
        <details class="card" style="background:#FEF3C7; border:1px solid #F59E0B; padding:0; margin-bottom:16px;" open>
          <summary style="cursor:pointer; padding:12px 14px; font-size:13px; font-weight:600; color:#92400E; list-style:none; display:flex; align-items:center; gap:8px;">
            <span style="font-size:16px;">⚠</span>
            Пропущено ${sr.totalSkipped} клиентов — их менеджеры не заведены в CRM

              </div>
            ` : ''}
            ${sr.noManager ? `<div style="margin-top:8px;">+ <b>${sr.noManager}</b> партнёров вообще без менеджера в 1С — тоже пропущены.</div>` : ''}
          </div>
        </details>
        ` : ''}

        ${testClientsCount > 0 ? `
        <div style="background:#FEF3C7; border-left:3px solid var(--wp-yellow); padding:12px 14px; border-radius:6px; margin-bottom:16px; font-size:13px;">
          <b>В CRM есть ${testClientsCount} тестовых клиентов</b> (без привязки к 1С). При импорте они <b>будут удалены</b> (выбран режим «полная замена»).
        </div>
        ` : ''}

        <div style="background:#F0F9FF; border:1px solid #BFDBFE; border-radius:8px; padding:12px 14px; margin-bottom:20px; font-size:12px; color:#1E40AF;">
          ℹ <b>Что защищено от перезаписи:</b> комментарии и события (timeline), длинное описание клиента, телефоны / email / WhatsApp / Telegram, контактное лицо, загруженные файлы, ручные override-этапы.
          <br>📍 <b>База «Полевые продажи» (ТП) — отдельная.</b> Импорт из 1С её не трогает: клиенты, собранные торговыми представителями, и план визитов остаются как есть.

        <div style="display:flex; gap:10px; justify-content:flex-end;">
          <button class="btn" onclick="closeModal()">Отмена</button>
          <button class="btn btn-primary" id="onec-apply">Импортировать ${newClients.length} клиентов</button>
        </div>
      </div>
    </div>`;

  document.getElementById('onec-apply').onclick = () => {
    const btn = document.getElementById('onec-apply');
    btn.disabled = true; btn.textContent = 'Применяю…';
    setTimeout(() => {
      const stats = onec_mergeClients(newClients, 'replace');
      onec_showSuccess(stats);
    }, 50);
  };
}

function onec_showSuccess(stats) {
  document.getElementById('modal-content').innerHTML = `
    <div style="padding:32px; text-align:center;">
      <div style="font-size:48px; margin-bottom:12px;">🎉</div>

        <div><div style="font-size:26px; font-weight:700; color:var(--info);">${stats.updated}</div><div style="font-size:12px; color:var(--text-muted);">обновлено</div></div>

function drawUsersTable() {

      <td><code>${escapeHtml(u.username)}</code></td>

      <td>${escapeHtml(u.manager||'—')}</td>
