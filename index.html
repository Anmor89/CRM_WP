function openUserModal(username) {
  const isEdit = !!username;
  const u = username ? state.users.find(x => x.username === username) : { username:'', password:'', name:'', role:'manager', manager:'', active:true };
  const managerOpts = uniqueManagers().map(m => `<option value="${escapeHtml(m)}">`).join('');
  openModal(`
    <div class="modal-header">
      <div class="modal-title">${isEdit?'Изменить пользователя':'Новый пользователь'}</div>
      <button class="modal-close" id="m-close">✕</button>
    </div>
    <div class="modal-body">
      <div class="form-row">
        <label class="field"><span>Имя</span><input id="u-name" value="${escapeHtml(u.name)}" placeholder="Иванов Иван"></label>
        <label class="field"><span>Логин</span><input id="u-username" value="${escapeHtml(u.username)}" ${isEdit?'disabled':''} placeholder="ivanov"></label>
      </div>
      <div class="form-row">
        <label class="field"><span>Пароль ${isEdit?'(оставьте пустым — без изменений)':''}</span><input id="u-password" type="text" value="" placeholder="${isEdit?'без изменений':'минимум 4 символа'}"></label>
        <label class="field"><span>Роль</span>
          <select id="u-role">
            <option value="manager" ${u.role==='manager'?'selected':''}>Менеджер</option>
            <option value="admin" ${u.role==='admin'?'selected':''}>Администратор</option>
          </select>
        </label>
      </div>
      <div class="form-row">
        <label class="field"><span>Имя менеджера (как в 1С, для привязки клиентов)</span>
          <input id="u-manager" list="manager-suggestions" value="${escapeHtml(u.manager||'')}" placeholder="Можно выбрать или ввести нового">
          <datalist id="manager-suggestions">${managerOpts}</datalist>
        </label>
        <label class="field"><span>Статус</span>
          <select id="u-active">
            <option value="1" ${u.active?'selected':''}>Активен</option>
            <option value="0" ${!u.active?'selected':''}>Отключён</option>
          </select>
        </label>
      </div>
    </div>
    <div class="modal-footer">
      ${isEdit && u.username !== state.user.username ? `<button class="btn btn-danger" id="u-del">Удалить</button>` : ''}
      <button class="btn" id="u-cancel">Отмена</button>
      <button class="btn btn-primary" id="u-save">Сохранить</button>
    </div>
  `);
  document.getElementById('u-cancel').onclick = closeModal;
  document.getElementById('m-close').onclick = closeModal;
  if (isEdit && document.getElementById('u-del')) {
    document.getElementById('u-del').onclick = () => {
      if (!confirm('Удалить пользователя?')) return;
      state.users = state.users.filter(x => x.username !== username);
      persist(); closeModal(); drawUsersTable();
    };
  }
  document.getElementById('u-save').onclick = () => {
    const data = {
      name: document.getElementById('u-name').value.trim(),
      username: (document.getElementById('u-username').value || u.username).trim().toLowerCase(),
      password: document.getElementById('u-password').value || u.password,
      role: document.getElementById('u-role').value,
      manager: document.getElementById('u-manager').value || null,
      active: document.getElementById('u-active').value === '1',
    };
    if (!data.username || !data.name) { alert('Логин и имя обязательны'); return; }
    if (!isEdit && state.users.find(x => x.username === data.username)) { alert('Такой логин уже есть'); return; }
    if (!data.password) { alert('Задайте пароль'); return; }
    if (isEdit) {
      const i = state.users.findIndex(x => x.username === username);
      state.users[i] = data;
    } else state.users.push(data);
    persist(); closeModal(); drawUsersTable(); renderNav();
  };
}

// =================== CLIENT MODAL ===================
function openClientModal(clientId) {
  const isNew = !clientId;
  const c = isNew ? {
    id: 'c_new_' + uid(), name: '', manager: state.user.manager || '', activity: 'СТО',
    reg_date: new Date().toISOString().slice(0,10), revenue: 0, debt: 0, overdue: 0,
    months: {}, stages_flags: [false,false,false,false,false,false], contract_signed: false,
  } : getClient(clientId);
  const sgInfo = computeAutoStage(c);
  const catInfo = computeAutoCategory(c);
  const managers = uniqueManagers();
  const acts = uniqueActivities();

  const waRaw = (c.wa || c.phone || '').trim();
  const waDigits = waRaw.replace(/\D/g, '');
  const waLink = waDigits ? (waRaw.startsWith('http') ? waRaw : `https://wa.me/${waDigits}`) : '';
  const tgRaw = (c.tg || '').trim();
  const tgHandle = tgRaw.replace(/^@/, '').replace(/^https?:\/\/t\.me\//i, '');
  const tgLink = tgRaw ? (tgRaw.startsWith('http') ? tgRaw : `https://t.me/${tgHandle}`) : '';
  const contactBtnBase = 'display:inline-flex; align-items:center; justify-content:center; width:36px; height:36px; border-radius:10px; color:white; text-decoration:none; font-size:16px; transition:transform 0.12s, filter 0.12s;';
  const contactBtns = (tgLink || waLink || c.email) ? `
        <div style="display:flex; gap:8px; margin-top:12px;">
          ${tgLink ? `<a href="${escapeHtml(tgLink)}" target="_blank" rel="noopener noreferrer" title="Telegram: ${escapeHtml(c.tg)}" style="${contactBtnBase} background:#2AABEE;" onmouseover="this.style.filter='brightness(1.1)'; this.style.transform='translateY(-1px)'" onmouseout="this.style.filter=''; this.style.transform=''">✈️</a>` : ''}
          ${waLink ? `<a href="${escapeHtml(waLink)}" target="_blank" rel="noopener noreferrer" title="WhatsApp: ${escapeHtml(c.wa || c.phone)}" style="${contactBtnBase} background:#25D366;" onmouseover="this.style.filter='brightness(1.1)'; this.style.transform='translateY(-1px)'" onmouseout="this.style.filter=''; this.style.transform=''">💬</a>` : ''}
          ${c.email ? `<a href="mailto:${escapeHtml(c.email)}" title="Написать: ${escapeHtml(c.email)}" style="${contactBtnBase} background:rgba(255,255,255,0.18);" onmouseover="this.style.background='rgba(255,255,255,0.32)'; this.style.transform='translateY(-1px)'" onmouseout="this.style.background='rgba(255,255,255,0.18)'; this.style.transform=''">✉️</a>` : ''}
        </div>` : '';

  // KPI-чипы в шапке (показываем только при наличии 1С-данных или ненулевых значений)
  const revenue = c.revenue || 0;
  const debt = c.debt || 0;
  const overdue = c.overdue || 0;
  const overduePct = debt ? Math.round(overdue/debt*100) : 0;
  const deferralDays = c.from1c && c.from1c.agreement ? c.from1c.agreement.days : 0;
  const limit = c.from1c && c.from1c.contracts && c.from1c.contracts.length ? (c.from1c.contracts.find(x => x.status === 'Действует') || c.from1c.contracts[0]).limit : 0;
  const hdrKpiStyle = (bg) => `display:inline-flex; align-items:center; gap:6px; padding:6px 12px; background:${bg}; border-radius:999px; font-size:12px; font-weight:600; white-space:nowrap;`;
  const headerKpis = (revenue || debt || deferralDays || limit) ? `
        <div style="margin-top:10px; display:flex; gap:8px; flex-wrap:wrap; align-items:center;">
          ${revenue ? `<span style="${hdrKpiStyle('rgba(255,199,44,0.18)')}; color:#FCD34D;">💰 Выручка <b style="color:white;">${fmt.rub(revenue)}</b></span>` : ''}
          ${debt ? `<span style="${hdrKpiStyle('rgba(220,38,38,0.18)')}; color:#FCA5A5;">🔴 Долг <b style="color:white;">${fmt.rub(debt)}</b>${overduePct ? ` <span style="opacity:.8;">(${overduePct}% просрочено)</span>` : ''}</span>` : ''}
          ${deferralDays ? `<span style="${hdrKpiStyle('rgba(59,130,246,0.18)')}; color:#93C5FD;">⏱ Отсрочка <b style="color:white;">${deferralDays} дн</b></span>` : ''}
          ${limit ? `<span style="${hdrKpiStyle('rgba(139,92,246,0.2)')}; color:#C4B5FD;">💳 Лимит <b style="color:white;">${fmt.rub(limit)}</b></span>` : ''}
        </div>` : '';

  openModal(`
    <div class="client-header">
      <div class="client-header-avatar">${fmt.initials(c.name) || '?'}</div>
      <div class="client-header-info">
        <div class="client-header-name">${escapeHtml(c.name || 'Новый клиент')}</div>
        <div class="client-header-meta">
          <span>👤 ${escapeHtml(c.manager||'—')}</span>
          <span>📅 в базе с ${fmt.dateLong(c.reg_date)}</span>
          <span>⏱ ${fmt.daysAgo(c.reg_date)}</span>
          ${c.inn ? `<span>🔢 ИНН ${escapeHtml(c.inn)}</span>` : ''}
          ${c.from1c && c.from1c.city ? `<span>📍 ${escapeHtml(c.from1c.city)}${c.from1c.region ? ', ' + escapeHtml(c.from1c.region) : ''}</span>` : ''}
        </div>
        <div style="margin-top:8px; display:flex; gap:6px; flex-wrap:wrap; align-items:center;">
          ${stageChip(sgInfo.stage)}
          <span class="chip chip-cat-${catInfo.category}" title="Категория клиента">Категория ${catInfo.category}</span>
          ${c.activity ? `<span class="chip chip-activity">${escapeHtml(c.activity)}</span>` : ''}
          ${c.contract_signed ? '<span class="chip chip-success">Договор подписан</span>' : ''}
          ${c.from1c_archived ? '<span class="chip chip-danger" title="Клиент исчез из последней выгрузки 1С">⚠ Архив (нет в 1С)</span>' : ''}
        </div>
        ${headerKpis}
        ${contactBtns}
      </div>
      <button class="modal-close" id="m-close" style="color:white;">✕</button>
    </div>
    <div class="client-tabs">
      <button class="client-tab active" data-tab="overview">Карточка</button>
      <button class="client-tab" data-tab="sales">Продажи</button>
      <button class="client-tab" data-tab="debt">💰 ПДЗ${(c.overdue > 0) ? ` <span class="myday-tab-count" style="margin-left:2px; background:rgba(220,38,38,0.18); color:var(--danger);">!</span>` : ''}</button>
      <button class="client-tab" data-tab="contract">Договор</button>
      <button class="client-tab" data-tab="files">📁 Файлы${(c.files && c.files.length) ? ` <span class="myday-tab-count" style="margin-left:2px;">${c.files.length}</span>` : ''}</button>
      <button class="client-tab" data-tab="settings">⚙ Настройки</button>
    </div>
    <div class="modal-body" id="cm-body"></div>
    <div class="modal-footer">
      ${!isNew && state.user.role==='admin' ? `<button class="btn btn-danger" id="cm-del">Удалить</button>` : ''}
      <button class="btn" id="cm-cancel">Закрыть</button>
      <button class="btn btn-primary" id="cm-save">Сохранить и закрыть</button>
    </div>
  `, 'modal-wide');
  let activeTab = 'overview';
  function renderTab() {
    const body = document.getElementById('cm-body');
    if (activeTab === 'overview') {
      body.innerHTML = renderClientOverview(c, sgInfo, catInfo, managers, acts);
      bindEmbeddedTimeline(c);
      bindClientFiles(c);
    } else if (activeTab === 'sales') {
      body.innerHTML = renderSalesTab(c);
      setTimeout(() => initSalesChart(c), 0);
    } else if (activeTab === 'contract') {
      body.innerHTML = renderContractTab(c);
    } else if (activeTab === 'debt') {
      body.innerHTML = renderClientDebtTab(c);
    } else if (activeTab === 'files') {
      body.innerHTML = renderClientFilesTab(c);
      bindClientFiles(c);
    } else if (activeTab === 'settings') {
      body.innerHTML = renderClientSettings(c, sgInfo, catInfo, managers);
      bindClientSettings(c);
    }
  }
  renderTab();

  document.querySelectorAll('.client-tab').forEach(b => b.onclick = () => {
    document.querySelectorAll('.client-tab').forEach(x => x.classList.remove('active'));
    b.classList.add('active');
    activeTab = b.dataset.tab;
    renderTab();
  });
  document.getElementById('cm-cancel').onclick = closeModal;
  document.getElementById('m-close').onclick = closeModal;
  if (!isNew && state.user.role==='admin' && document.getElementById('cm-del')) {
    document.getElementById('cm-del').onclick = () => {
      if (!confirm('Удалить клиента?')) return;
      state.clients = state.clients.filter(x => x.id !== c.id);
      state.comments = state.comments.filter(x => x.clientId !== c.id);
      state.events = state.events.filter(x => x.clientId !== c.id);
      persist(); closeModal(); renderView();
    };
  }
  document.getElementById('cm-save').onclick = () => {
    function val(id) { const el = document.getElementById(id); return el ? el.value : null; }
    const updates = {};
    // Block "Клиент"
    if (val('ci-name') !== null) updates.name = val('ci-name').trim();
    if (val('ci-inn') !== null) updates.inn = val('ci-inn').trim();
    if (val('ci-activity') !== null) updates.activity = val('ci-activity');
    if (val('ci-reg') !== null) updates.reg_date = val('ci-reg');
    if (val('ci-price') !== null) updates.price_type = val('ci-price');
    if (val('ci-region') !== null) updates.region = val('ci-region');
    if (val('ci-city') !== null) updates.city = val('ci-city');
    if (val('ci-addr') !== null) updates.address = val('ci-addr');
    if (val('ci-comment') !== null) updates.comment = val('ci-comment');
    // Block "Контакты"
    if (val('ci-contact-name') !== null) updates.contact_name = val('ci-contact-name');
    if (val('ci-position') !== null) updates.position = val('ci-position');
    if (val('ci-phone') !== null) updates.phone = val('ci-phone');
    if (val('ci-email') !== null) updates.email = val('ci-email');
    if (val('ci-wa') !== null) updates.wa = val('ci-wa');
    if (val('ci-tg') !== null) updates.tg = val('ci-tg');
    // Block "Флаги работы"
    if (val('ci-comp') !== null) updates.competitor = val('ci-comp');
    // Settings tab — override-ы
    if (val('ci-stage-manual') !== null) updates.stageManual = val('ci-stage-manual') || null;
    if (val('ci-cat-manual') !== null) updates.categoryManual = val('ci-cat-manual') || null;
    if (val('ci-manager') !== null) updates.manager = val('ci-manager');
    // Contract tab
    if (val('cc-no') !== null) updates.contract_no = val('cc-no');
    if (val('cc-date') !== null) updates.contract_date = val('cc-date');
    if (val('cc-signed') !== null) updates.contract_signed = val('cc-signed') === '1';
    if (val('cc-note') !== null) updates.contract_note = val('cc-note');

    Object.assign(c, updates);
    if (isNew) state.clients.push(c);
    persist(); closeModal(); renderView();
  };
}

// === Helpers для блока «Файлы» ===
function fileIcon(type) {
  if (!type) return '📄';
  if (type.includes('pdf')) return '📕';
  if (type.includes('image')) return '🖼';
  if (type.includes('excel') || type.includes('sheet')) return '📊';
  if (type.includes('word') || type.includes('document')) return '📝';
  if (type.includes('zip') || type.includes('rar')) return '🗜';
  return '📄';
}
function fileTypeLabel(type) {
  if (!type) return '—';
  if (type.includes('pdf')) return 'PDF';
  if (type.includes('jpeg') || type.includes('jpg')) return 'JPG';
  if (type.includes('png')) return 'PNG';
  if (type.includes('sheet') || type.includes('excel')) return 'Excel';
  if (type.includes('word') || type.includes('document')) return 'Word';
  if (type.includes('text')) return 'Текст';
  return type.split('/')[1] || type;
}
if (!fmt.size) fmt.size = (b) => {
  if (!b) return '—';
  if (b < 1024) return b + ' Б';
  if (b < 1024*1024) return (b/1024).toFixed(1).replace('.0','') + ' КБ';
  return (b/1024/1024).toFixed(1).replace('.0','') + ' МБ';
};

function bindClientFiles(c) {
  const addBtn = document.getElementById('cf-add-btn');
  const input = document.getElementById('cf-input');
  if (!addBtn || !input) return;

  const reRender = () => {
    // Перерендерить вкладку «Файлы»
    const body = document.getElementById('cm-body');
    if (!body) return;
    body.innerHTML = renderClientFilesTab(c);
    bindClientFiles(c);
    // Обновить счётчик в табе
    const filesTab = [...document.querySelectorAll('.client-tab')].find(t => t.dataset.tab === 'files');
    if (filesTab) {
      const cnt = (c.files || []).length;
      const baseLabel = '📁 Файлы';
      filesTab.innerHTML = cnt ? `${baseLabel} <span class="myday-tab-count" style="margin-left:2px;">${cnt}</span>` : baseLabel;
    }
  };

  addBtn.onclick = () => input.click();
  input.onchange = async (e) => {
    const files = Array.from(e.target.files || []);
    if (!files.length) return;
    c.files = c.files || [];
    for (const f of files) {
      if (f.size > 2 * 1024 * 1024) {
        alert(`Файл «${f.name}» больше 2 МБ. Загружайте через бэкенд, когда он появится. Пока — пропустим.`);
        continue;
      }
      const dataUrl = await new Promise((res, rej) => {
        const r = new FileReader();
        r.onload = () => res(r.result);
        r.onerror = rej;
        r.readAsDataURL(f);
      });
      c.files.push({
        id: 'f_' + uid(),
        name: f.name,
        type: f.type || '',
        size: f.size,
        dataUrl,
        addedAt: new Date().toISOString().slice(0, 10),
        addedBy: state.user.name
      });
    }
    persist();
    reRender();
  };
  document.querySelectorAll('[data-cf-del]').forEach(btn => {
    btn.addEventListener('click', () => {
      const id = btn.dataset.cfDel;
      if (!confirm('Удалить файл?')) return;
      c.files = (c.files || []).filter(f => f.id !== id);
      persist();
      reRender();
    });
  });
  // Просмотр в новой вкладке через blob: URL (надёжнее, чем data:, не блокируется в Chrome)
  document.querySelectorAll('[data-cf-view]').forEach(btn => {
    btn.addEventListener('click', () => {
      const f = (c.files || []).find(x => x.id === btn.dataset.cfView);
      if (!f) return;
      try {
        // dataUrl → Blob → blob URL → window.open
        const dataUrl = f.dataUrl;
        const commaIdx = dataUrl.indexOf(',');
        const meta = dataUrl.substring(5, commaIdx); // "image/png;base64"
        const isBase64 = meta.includes('base64');
        const mime = meta.split(';')[0];
        const dataPart = dataUrl.substring(commaIdx + 1);
        let bytes;
        if (isBase64) {
          const binary = atob(dataPart);
          bytes = new Uint8Array(binary.length);
          for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
        } else {
          bytes = new TextEncoder().encode(decodeURIComponent(dataPart));
        }
        const blob = new Blob([bytes], { type: mime || f.type || 'application/octet-stream' });
        const url = URL.createObjectURL(blob);
        const w = window.open(url, '_blank');
        if (!w) alert('Не получилось открыть окно — разрешите всплывающие окна для этого сайта.');
        // Освободим память через 1 минуту
        setTimeout(() => URL.revokeObjectURL(url), 60000);
      } catch (e) {
        alert('Не удалось открыть файл: ' + e.message);
      }
    });
  });
}

                  <span class="timeline-author">${escapeHtml(it.data.author||'')}</span>
                  <span class="timeline-date">${fmt.dateLong(it.date)} • ${fmt.daysAgo(it.date)}</span>
                </div>
                <div class="timeline-body">${escapeHtml(it.data.text||'')}</div>
              </div>
            </div>
          `).join('')}
      </div>
    ` : '<div class="empty-state"><div class="empty-state-icon">💬</div>Пока нет комментариев и событий.<br>Добавьте первую запись выше.</div>'}
  `;
}

function bindTimeline(c) {
  document.getElementById('tl-add').onclick = () => {
    const text = document.getElementById('tl-text').value.trim();
    const kind = document.getElementById('tl-kind').value;
    if (!text) return;
    state.comments.unshift({
      id: uid(), clientId: c.id, author: state.user.name,
      text, kind, date: new Date().toISOString()
    });
    persist();
    document.getElementById('tl-text').value = '';
    // re-render timeline tab
    const body = document.getElementById('cm-body');
    body.innerHTML = renderTimelineTab(c, getComments(c.id), getEvents(c.id, true));
    bindTimeline(c);
  };
}

        </div>
      ` : ''}
    </div>
  `;

function _buildSalesSeries(sales, period) {
  const byMonth = sales.by_month || {};
  const allKeys = Object.keys(byMonth).sort();
  if (!allKeys.length) return null;

  const now = new Date();
  const curY = now.getFullYear();
  const curM = now.getMonth() + 1;
  const curKey = `${curY}-${String(curM).padStart(2,'0')}`;
  const fmtKey = (y, m) => `${y}-${String(m).padStart(2,'0')}`;

  // Определяем диапазон
  let startKey, endKey;
  switch (period) {
    case '3m':       { let y=curY, m=curM-2; while(m<=0){m+=12;y--;} startKey=fmtKey(y,m); endKey=curKey; break; }
    case '6m':       { let y=curY, m=curM-5; while(m<=0){m+=12;y--;} startKey=fmtKey(y,m); endKey=curKey; break; }
    case '12m':      { let y=curY, m=curM-11; while(m<=0){m+=12;y--;} startKey=fmtKey(y,m); endKey=curKey; break; }
    case 'ytd':      { startKey=fmtKey(curY,1); endKey=curKey; break; }
    case 'lastyear': { startKey=fmtKey(curY-1,1); endKey=fmtKey(curY-1,12); break; }
    case 'all':
    default: {
      startKey = allKeys[0];
      const lastDataKey = allKeys[allKeys.length-1];
      endKey = lastDataKey > curKey ? lastDataKey : curKey;
      break;
    }
  }

  const labels = [];
  const salesSeries = [];
  const refundsSeries = [];
  const monthKeys = [];

  let [sy, sm] = startKey.split('-').map(Number);
  const [ey, em] = endKey.split('-').map(Number);
  while (sy < ey || (sy === ey && sm <= em)) {
    const k = fmtKey(sy, sm);
    const v = byMonth[k] || 0;
    labels.push(`${_monthLabels[sm-1]} ${String(sy).slice(2)}`);
    monthKeys.push(k);
    // Непрерывная линия — НЕ используем null. Пустой месяц = 0.
    salesSeries.push(v >= 0 ? v : 0);
    // Возвраты — отдельная линия. null где нет (Chart рисует с spanGaps:false)
    refundsSeries.push(v < 0 ? v : null);
    sm++; if (sm > 12) { sm = 1; sy++; }
  }

  // Forecast — добавляем виртуальный месяц справа, ТОЛЬКО если:
  //   1) текущий месяц входит в выбранный диапазон
  //   2) в текущем месяце есть продажи
  //   3) месяц ещё не закончился
  let forecastSeries = labels.map(() => null);
  let projected = null;
  const curIdx = monthKeys.indexOf(curKey);
  if (curIdx >= 0) {
    const curVal = byMonth[curKey] || 0;
    const dayOfMonth = now.getDate();
    const daysInMonth = new Date(curY, curM, 0).getDate();
    if (curVal > 0 && dayOfMonth > 0 && dayOfMonth < daysInMonth) {
      projected = curVal * daysInMonth / dayOfMonth;
      // Добавляем виртуальную точку «прогноз на конец того же месяца»
      labels.push(`${_monthLabels[curM-1]} ${String(curY).slice(2)} ★`);
      monthKeys.push(curKey + '_forecast');
      salesSeries.push(null);     // в прогнозной точке нет «факта»
      refundsSeries.push(null);
      forecastSeries.push(projected);
      // соединяем прогноз с фактической точкой текущего месяца
      forecastSeries[curIdx] = curVal;
    }
  }

  return { labels, salesSeries, refundsSeries, forecastSeries, projected, hasRefunds: refundsSeries.some(v => v !== null) };
}

function initSalesChart(c) {
  const el = document.getElementById('ch-client-months');
  const sales = c.from1c && c.from1c.sales ? c.from1c.sales : null;
  if (!el || !sales || !sales.by_month) return;
  const period = state._salesPeriod || '12m';
  const s = _buildSalesSeries(sales, period);
  if (!s) return;

  const datasets = [
    {
      label: 'Продажи',
      data: s.salesSeries,
      borderColor: '#FFC72C',
      backgroundColor: 'rgba(255,199,44,0.12)',

      fill: true,
      tension: 0.3,
      pointRadius: (ctx) => (ctx.raw == null ? 0 : 3),
      pointBackgroundColor: '#FFC72C',

    },
    {

      data: s.forecastSeries,
      borderColor: '#3B82F6',
      backgroundColor: 'rgba(59,130,246,0.08)',
      borderWidth: 2,

      pointBackgroundColor: '#3B82F6',
      pointBorderColor: 'white',
      pointBorderWidth: 1.5,
      spanGaps: true,
      hidden: !s.projected

  ];
  if (s.hasRefunds) {
    datasets.push({

      data: s.refundsSeries,
      borderColor: '#DC2626',
      backgroundColor: 'rgba(220,38,38,0.12)',

      },
      scales: {

      }
    }

  document.querySelectorAll('.sales-period-tabs [data-period]').forEach(btn => {
    btn.onclick = () => {
      state._salesPeriod = btn.dataset.period;

      initSalesChart(c);
    };
  });

  // Поиск по таблице
  const search = document.getElementById('sales-search');
  if (search) {
    search.addEventListener('input', () => {
      const q = search.value.trim().toLowerCase();
      const rows = document.querySelectorAll('#sales-table tbody tr');
      let visible = 0;
      rows.forEach(tr => {
        const txt = tr.innerText.toLowerCase();
        const match = !q || txt.includes(q);
        tr.style.display = match ? '' : 'none';
        if (match) visible++;
      });

      if (empty) empty.style.display = visible ? 'none' : 'block';
    });
  }
}

function activityKindLabel(kind, source) {
  if (source === 'event') {
    return ({ call:'Звонок', meeting:'Встреча', contract:'Договор', followup:'Контроль' })[kind] || 'Событие';
  }
  return ({ note:'Заметка', call:'Звонок', meeting:'Встреча', email:'Письмо', other:'Другое' })[kind] || 'Комментарий';
}
function activityChipClass(kind, source) {
  if (source === 'event') {
    return ({ call:'chip-info', meeting:'chip-default', contract:'chip-yellow', followup:'chip-success' })[kind] || 'chip-default';
  }
  return ({ note:'chip-default', call:'chip-info', meeting:'chip-default', email:'chip-info', other:'chip-default' })[kind] || 'chip-default';
}
function activityIcon(kind, source) {
  const map = { call:'📞', meeting:'🤝', contract:'📝', followup:'✅', note:'📝', email:'✉️', other:'•' };
  return source === 'event' ? '📅' : (map[kind] || '•');
}

function getAllActivity() {
  // Unified list: events + comments
  const items = [];
  state.events.forEach(e => items.push({
    id: e.id, source: 'event', kind: e.kind, date: e.date,
    clientId: e.clientId, author: e.author,
    title: e.title, text: '', completed: !!e.completed
  }));
  state.comments.forEach(c => items.push({
    id: c.id, source: 'comment', kind: c.kind, date: c.date,
    clientId: c.clientId, author: c.author,
    title: '', text: c.text, completed: null
  }));
  // Restrict to clients the user can see
  const allowedIds = new Set(visibleClients().map(c => c.id));
  return items.filter(i => allowedIds.has(i.clientId));
}

function applyActivityFilters(items) {
  const f = state.activityFilters;
  return items.filter(i => {
    // Kind filter
    if (f.kind !== 'all') {
      if (f.kind === 'event' && i.source !== 'event') return false;
      if (f.kind === 'comment' && i.source !== 'comment') return false;
      if (!['all','event','comment'].includes(f.kind) && i.kind !== f.kind) return false;
    }
    // Manager filter
    if (f.manager !== 'all') {
      const cl = getClient(i.clientId);
      if (!cl || cl.manager !== f.manager) return false;
    }
    // Period
    if (f.period && f.period !== '0') {
      const days = parseInt(f.period, 10);
      if (!isNaN(days)) {
        const cutoff = Date.now() - days * 86400000;
        if (new Date(i.date).getTime() < cutoff) return false;
      }
    }
    // Search
    if (state.filters.search) {
      const s = state.filters.search.toLowerCase();
      const cl = getClient(i.clientId);
      const hay = `${cl?cl.name:''} ${i.author||''} ${i.title||''} ${i.text||''}`.toLowerCase();
      if (!hay.includes(s)) return false;
    }
    return true;
  });
}

function afterActivity() {
  const bindActF = (id, key) => {
    const el = document.getElementById(id);
    if (!el) return;
    el.addEventListener('change', () => { state.activityFilters[key] = el.value; drawActivityTable(); });
  };
  bindActF('af-kind', 'kind');
  bindActF('af-manager', 'manager');
  bindActF('af-period', 'period');
  document.getElementById('af-reset').onclick = () => {
    state.activityFilters = { kind: 'all', manager: 'all', period: '0' };
    state.filters.search = '';
    const gs = document.getElementById('global-search'); if (gs) gs.value = '';
    renderView();
  };
  document.getElementById('af-add-event').onclick = () => openEventModal(null);
  drawActivityTable();
}

function drawActivityTable() {
  const all = getAllActivity();
  const filtered = applyActivityFilters(all);
  const sorted = [...filtered].sort((a, b) => new Date(b.date) - new Date(a.date));

  const setText = (id, val) => { const el = document.getElementById(id); if (el) el.textContent = val; };
  setText('af-count', sorted.length);
  const k = {
    total: sorted.length,
    planned: sorted.filter(i => i.source === 'event' && !i.completed).length,
    done: sorted.filter(i => i.source === 'event' && i.completed).length,
    comments: sorted.filter(i => i.source === 'comment').length,
  };
  setText('af-k-total', fmt.int(k.total));
  setText('af-k-planned', fmt.int(k.planned));
  setText('af-k-done', fmt.int(k.done));
  setText('af-k-comments', fmt.int(k.comments));

  const tbody = document.getElementById('activity-tbody');
  if (!sorted.length) {
    tbody.innerHTML = `<tr><td colspan="7"><div class="empty-state"><div class="empty-state-icon">📭</div>Активности по выбранным фильтрам нет</div></td></tr>`;
    return;
  }
  tbody.innerHTML = sorted.slice(0, 500).map(i => {
    const cl = getClient(i.clientId);
    const desc = i.source === 'event'
      ? `<span class="fw-600">${escapeHtml(i.title || '—')}</span>`
      : `<span title="${escapeHtml(i.text)}">${escapeHtml((i.text || '').slice(0, 140))}${i.text && i.text.length > 140 ? '…' : ''}</span>`;
    let status;
    const isOpenEvent = i.source === 'event' && !i.completed;
    if (i.source === 'event') {
      const past = new Date(i.date) < new Date();
      if (i.completed) status = '<span class="chip chip-success">Выполнено</span>';
      else if (past) status = '<span class="chip chip-danger">Просрочено</span>';
      else status = '<span class="chip chip-info">Запланировано</span>';
    } else {
      status = '<span class="chip chip-default">Комментарий</span>';
    }
    return `
      <tr data-cid="${i.clientId}" data-eid="${i.source === 'event' ? i.id : ''}">
        <td>
          <div class="fw-600 text-sm">${fmt.date(i.date)}</div>
          <div class="text-sm text-muted">${fmt.daysAgo(i.date)}</div>
        </td>
        <td>
          <span class="chip ${activityChipClass(i.kind, i.source)}">${activityIcon(i.kind, i.source)} ${activityKindLabel(i.kind, i.source)}</span>
        </td>
        <td class="fw-600">${escapeHtml(cl ? cl.name : '— клиент удалён —')}</td>
        <td>${escapeHtml(cl ? cl.manager : '')}</td>
        <td>${desc}</td>
        <td class="text-sm">${escapeHtml(i.author || '')}</td>
        <td style="display:flex; align-items:center; gap:6px;">${status}${isOpenEvent?`<button class="btn btn-sm btn-done" data-af-done="${i.id}">Готово</button>`:''}</td>
      </tr>
    `;
  }).join('');
  tbody.querySelectorAll('[data-af-done]').forEach(b => b.onclick = (e) => {
    e.stopPropagation();
    const ev = state.events.find(x => x.id === b.dataset.afDone);
    if (ev) { ev.completed = true; persist(); drawActivityTable(); renderNav(); }
  });
  if (sorted.length > 500) {
    tbody.insertAdjacentHTML('beforeend', `<tr><td colspan="7" class="muted text-sm" style="text-align:center;padding:14px;">Показано 500 из ${sorted.length}. Уточните фильтры.</td></tr>`);
  }
  tbody.querySelectorAll('tr[data-cid]').forEach(tr => tr.addEventListener('click', () => {
    if (tr.dataset.eid) openEventModal(tr.dataset.eid);
    else openClientModal(tr.dataset.cid);
  }));
}

// =================== MODAL HELPERS ===================
function openModal(html, extraClass='') {
  const layer = document.getElementById('modal-layer');
  const modal = document.getElementById('modal-content');
  modal.className = 'modal' + (extraClass ? ' ' + extraClass : '');
  modal.innerHTML = html;
  layer.classList.remove('hidden');
  layer.onclick = (e) => { if (e.target === layer) closeModal(); };
  document.body.style.overflow = 'hidden';
}

// =================== FIELD SALES (ТП) ===================
const TP_STATUS_META = {
  'Договор':       { cls: 'tps-green',  label: 'Договор' },
  'В работе':      { cls: 'tps-blue',   label: 'В работе' },
  'Переговоры':    { cls: 'tps-amber',  label: 'Переговоры' },
  'В перспективе': { cls: 'tps-indigo', label: 'В перспективе' },
  'Сложно':        { cls: 'tps-orange', label: 'Сложно' },
  'Не интересен':  { cls: 'tps-gray',   label: 'Не интересен' },
};
function tpStatusChip(status) {
  const m = TP_STATUS_META[status] || { cls: 'tps-gray', label: status || '—' };
  return `<span class="tp-status ${m.cls}">${escapeHtml(m.label)}</span>`;
}
function tpUniqueReps() {
  return [...new Set(state.tpClients.map(c => c.rep).filter(Boolean))].sort();
}
function tpUniqueCities() {
  return [...new Set(state.tpClients.map(c => c.city).filter(Boolean))].sort();
}
// Cross-link: find a main-base client with the same INN
function tpMainMatch(tpc) {
  if (!tpc.inn) return null;
  const inn = String(tpc.inn).replace(/\D/g, '');
  if (!inn) return null;
  return state.clients.find(c => c.inn && String(c.inn).replace(/\D/g, '') === inn) || null;
}

let _tpTab = 'base';
function renderFieldSales() {
  return `
    <div class="page-tabs">
      <button class="page-tab ${_tpTab==='base'?'active':''}" data-tptab="base">📇 База ТП</button>
      <button class="page-tab ${_tpTab==='visits'?'active':''}" data-tptab="visits">🗺 Визиты</button>
      <button class="page-tab ${_tpTab==='svod'?'active':''}" data-tptab="svod">📊 Свод</button>
    </div>
    <div id="tp-tab-content"></div>
  `;
}
function afterFieldSales() {
  document.querySelectorAll('.page-tab[data-tptab]').forEach(b => b.onclick = () => {
    _tpTab = b.dataset.tptab;
    document.querySelectorAll('.page-tab[data-tptab]').forEach(x => x.classList.toggle('active', x.dataset.tptab === _tpTab));
    drawTpTab();
  });
  drawTpTab();
}
function drawTpTab() {
  const wrap = document.getElementById('tp-tab-content');
  if (_tpTab === 'base') drawTpBase(wrap);
  else if (_tpTab === 'visits') drawTpVisits(wrap);
  else drawTpSvod(wrap);
}

const _tpFilters = { rep: 'all', city: 'all', type: 'all', status: 'all' };
function tpFiltered() {
  return state.tpClients.filter(c => {
    if (_tpFilters.rep !== 'all' && c.rep !== _tpFilters.rep) return false;
    if (_tpFilters.city !== 'all' && c.city !== _tpFilters.city) return false;
    if (_tpFilters.type !== 'all' && c.type !== _tpFilters.type) return false;
    if (_tpFilters.status !== 'all' && c.work_status !== _tpFilters.status) return false;
    return true;
  });
}

function drawTpBase(wrap) {
  const reps = tpUniqueReps();
  const cities = tpUniqueCities();
  const types = [...new Set(state.tpClients.map(c => c.type).filter(Boolean))].sort();
  const all = state.tpClients;
  const dealCount = all.filter(c => c.work_status === 'Договор').length;
  const handed = all.filter(c => c.handover_mark || c.manager).length;
  const linked = all.filter(c => tpMainMatch(c)).length;
  const conv = all.length ? Math.round(dealCount / all.length * 100) : 0;

  wrap.innerHTML = `
    <div class="grid grid-4 mb-4">
      <div class="kpi"><div class="kpi-accent"></div><div class="kpi-label">Клиентов собрано ТП</div><div class="kpi-value">${fmt.int(all.length)}</div></div>
      <div class="kpi"><div class="kpi-accent" style="background:var(--success)"></div><div class="kpi-label">Дошли до договора</div><div class="kpi-value">${fmt.int(dealCount)}</div><div class="kpi-sub">конверсия ${conv}%</div></div>
      <div class="kpi"><div class="kpi-accent" style="background:var(--info)"></div><div class="kpi-label">Передано менеджерам</div><div class="kpi-value">${fmt.int(handed)}</div></div>
      <div class="kpi"><div class="kpi-accent" style="background:var(--wp-yellow)"></div><div class="kpi-label">Связаны с базой по ИНН</div><div class="kpi-value">${fmt.int(linked)}</div><div class="kpi-sub">пересечения с «Клиентами»</div></div>
    </div>
    <div class="filter-bar">
      <select id="tpf-rep"><option value="all">Все ТП</option>${reps.map(r=>`<option ${_tpFilters.rep===r?'selected':''}>${escapeHtml(r)}</option>`).join('')}</select>
      <select id="tpf-city"><option value="all">Все города</option>${cities.map(c=>`<option ${_tpFilters.city===c?'selected':''}>${escapeHtml(c)}</option>`).join('')}</select>
      <select id="tpf-type"><option value="all">Все типы</option>${types.map(t=>`<option ${_tpFilters.type===t?'selected':''}>${escapeHtml(t)}</option>`).join('')}</select>
      <select id="tpf-status"><option value="all">Все статусы</option>${Object.keys(TP_STATUS_META).map(s=>`<option ${_tpFilters.status===s?'selected':''}>${escapeHtml(s)}</option>`).join('')}</select>
      <button class="btn btn-ghost btn-sm" id="tpf-reset">Сбросить</button>
      <div style="margin-left:auto; display:flex; gap:8px; align-items:center;">
        <span class="text-sm text-muted">Найдено: <b id="tpf-count">—</b></span>
        <button class="btn btn-primary btn-sm" id="tp-add">+ Клиент ТП</button>
      </div>
    </div>
    <div class="table-wrap">
      <table class="data">
        <thead><tr>
          <th>Клиент</th><th>Торговый представитель</th><th>Город</th><th>Тип</th>
          <th>Статус работы</th><th>ИНН</th><th>Связь с CRM</th><th>Передан менеджеру</th>
        </tr></thead>
        <tbody id="tp-base-tbody"></tbody>
      </table>
    </div>
  `;
  const bindF = (id, key) => { const el = document.getElementById(id); el.addEventListener('change', () => { _tpFilters[key] = el.value; drawTpBaseTable(); }); };
  bindF('tpf-rep','rep'); bindF('tpf-city','city'); bindF('tpf-type','type'); bindF('tpf-status','status');
  document.getElementById('tpf-reset').onclick = () => { _tpFilters.rep='all'; _tpFilters.city='all'; _tpFilters.type='all'; _tpFilters.status='all'; drawTpTab(); };
  document.getElementById('tp-add').onclick = () => openTpClientModal(null);
  drawTpBaseTable();
}
function drawTpBaseTable() {
  const list = tpFiltered();
  document.getElementById('tpf-count').textContent = list.length;
  const tbody = document.getElementById('tp-base-tbody');
  if (!list.length) { tbody.innerHTML = '<tr><td colspan="8"><div class="empty-state">Клиенты не найдены</div></td></tr>'; return; }
  tbody.innerHTML = list.slice(0, 400).map(c => {
    const match = tpMainMatch(c);
    return `
    <tr data-tpid="${c.id}">
      <td><div class="fw-600">${escapeHtml(c.name)}</div>${c.contact_name?`<div class="text-sm text-muted">${escapeHtml(c.contact_name)}</div>`:''}</td>
      <td>${escapeHtml(c.rep||'—')}</td>
      <td>${escapeHtml(c.city||'—')}</td>
      <td>${c.type?`<span class="chip chip-activity">${escapeHtml(c.type)}</span>`:'—'}</td>
      <td>${tpStatusChip(c.work_status)}</td>
      <td>${c.inn?escapeHtml(c.inn):'<span class="text-muted">нет</span>'}</td>
      <td>${match?`<span class="chip chip-success">✓ в базе</span>`:'<span class="text-muted">—</span>'}</td>
      <td>${c.manager?`<span class="chip chip-info">${escapeHtml(c.manager)}</span>`:'<span class="text-muted">—</span>'}</td>
    </tr>`;
  }).join('');
  if (list.length > 400) tbody.insertAdjacentHTML('beforeend', `<tr><td colspan="8" class="muted text-sm" style="text-align:center;padding:12px;">Показано 400 из ${list.length}</td></tr>`);
  tbody.querySelectorAll('tr[data-tpid]').forEach(tr => tr.addEventListener('click', () => openTpClientModal(tr.dataset.tpid)));
  attachTableSort(document.querySelector('#tp-base-tbody').closest('table'));
}

function drawTpVisits(wrap) {
  const reps = tpUniqueReps();
  wrap.innerHTML = `
    <div class="filter-bar">
      <select id="tpv-rep"><option value="all">Все ТП</option>${reps.map(r=>`<option ${_tpFilters.rep===r?'selected':''}>${escapeHtml(r)}</option>`).join('')}</select>
      <div style="margin-left:auto;"><button class="btn btn-primary btn-sm" id="tpv-add">+ Запланировать визит</button></div>
    </div>
    <div id="tpv-list"></div>
  `;
  document.getElementById('tpv-rep').addEventListener('change', (e) => { _tpFilters.rep = e.target.value; drawTpVisitsList(); });
  document.getElementById('tpv-add').onclick = () => openVisitModal(null);
  drawTpVisitsList();
}
function drawTpVisitsList() {
  const wrap = document.getElementById('tpv-list');
  let list = state.tpVisits.slice();
  if (_tpFilters.rep !== 'all') list = list.filter(v => v.rep === _tpFilters.rep);
  if (!list.length) { wrap.innerHTML = '<div class="empty-state"><div class="empty-state-icon">🗺</div>Визитов нет. Запланируйте первый визит.</div>'; return; }
  // group by rep -> month -> week
  const groups = {};
  list.forEach(v => {
    const g = v.rep || '—';
    (groups[g] = groups[g] || []).push(v);
  });
  wrap.innerHTML = Object.keys(groups).sort().map(rep => {
    const items = groups[rep].sort((a,b) => String(a.month).localeCompare(String(b.month)) || String(a.week).localeCompare(String(b.week)));
    const done = items.filter(v => v.completed).length;
    return `
      <div class="card mb-4">
        <div class="card-header">
          <div class="card-title">${escapeHtml(rep)}</div>
          <span class="text-sm text-muted">${items.length} визитов • выполнено ${done}</span>
        </div>
        <table class="data">
          <thead><tr><th>Месяц</th><th>Нед.</th><th>Клиент</th><th>Итоги встречи</th><th>Дальнейший план</th><th>Статус</th><th data-no-sort></th></tr></thead>
          <tbody>
            ${items.map(v => `
              <tr data-vid="${v.id}">
                <td>${escapeHtml(v.month||'—')}</td>
                <td>${escapeHtml(String(v.week||'—'))}</td>
                <td class="fw-600">${escapeHtml(v.client)}</td>
                <td class="text-sm">${escapeHtml((v.result||'').slice(0,80))}${v.result&&v.result.length>80?'…':''}</td>
                <td class="text-sm">${escapeHtml((v.next_plan||'').slice(0,80))}${v.next_plan&&v.next_plan.length>80?'…':''}</td>
                <td>${v.completed?'<span class="chip chip-success">Выполнен</span>':'<span class="chip chip-info">Запланирован</span>'}</td>
                <td>${v.completed?'':`<button class="btn btn-sm btn-done" data-done-visit="${v.id}">Готово</button>`}</td>
              </tr>
            `).join('')}
          </tbody>
        </table>
      </div>
    `;
  }).join('');
  wrap.querySelectorAll('tr[data-vid]').forEach(tr => tr.addEventListener('click', () => openVisitModal(tr.dataset.vid)));
  wrap.querySelectorAll('[data-done-visit]').forEach(b => b.onclick = (e) => {
    e.stopPropagation();
    const v = state.tpVisits.find(x => x.id === b.dataset.doneVisit);
    if (v) { v.completed = true; persist(); drawTpVisitsList(); }
  });
}

  };

      <div class="card-section-h">Результат визита</div>
      <label class="field-row" style="margin-bottom:12px;"><span>Итоги встречи</span><textarea id="v-result" class="big-comment" rows="2">${escapeHtml(v.result||'')}</textarea></label>
      <label class="field-row" style="margin-bottom:12px;"><span>Дальнейший план действий</span><textarea id="v-next" class="big-comment" rows="2">${escapeHtml(v.next_plan||'')}</textarea></label>
      <label class="field-row"><span>Дополнительная информация</span><textarea id="v-extra" class="big-comment" rows="2">${escapeHtml(v.extra||'')}</textarea></label>
    </div>
    <div class="modal-footer">
      ${!isNew ? `<button class="btn btn-danger" id="v-del">Удалить</button>` : ''}
      ${!isNew && !v.completed ? `<button class="btn btn-done" id="v-done">Отметить выполненным</button>` : ''}
      <button class="btn" id="v-cancel">Закрыть</button>
      <button class="btn btn-primary" id="v-save">Сохранить</button>
    </div>
  `);
  document.getElementById('m-close').onclick = closeModal;
  document.getElementById('v-cancel').onclick = closeModal;
  if (document.getElementById('v-del')) document.getElementById('v-del').onclick = () => {
    if (!confirm('Удалить визит?')) return;
    state.tpVisits = state.tpVisits.filter(x => x.id !== v.id);
    persist(); closeModal(); drawTpTab();
  };
  if (document.getElementById('v-done')) document.getElementById('v-done').onclick = () => {
    v.completed = true; persist(); closeModal(); drawTpTab();
  };
  document.getElementById('v-save').onclick = () => {
    const val = id => (document.getElementById(id).value || '').trim();
    if (!val('v-client')) { alert('Укажите клиента'); return; }
    Object.assign(v, {
      rep: val('v-rep'), client: val('v-client'), month: val('v-month'), week: val('v-week'),
      contacts: val('v-contacts'), address: val('v-address'),
      result: val('v-result'), next_plan: val('v-next'), extra: val('v-extra'),
    });
    if (isNew) state.tpVisits.push(v);
    persist(); closeModal(); drawTpTab();
  };
}

// =================== EXPORT PAGE ===================
function renderExport() {
  const lastImp = state.lastImportedAt ? new Date(state.lastImportedAt) : null;
  const lastImpText = lastImp ? `${lastImp.toLocaleDateString('ru-RU')} ${lastImp.toLocaleTimeString('ru-RU', {hour:'2-digit', minute:'2-digit'})}` : 'ещё не выполнялся';
  const importStats = state.from1cImportStats;
  return `
    <div class="card mb-4" style="border-left:4px solid #2563EB;">
      <div class="card-header">
        <div class="card-title">📥 Импорт из 1С</div>
        <span class="text-sm text-muted">основной источник данных</span>
      </div>
      <div style="padding:16px 24px;">
        <p class="text-sm" style="margin-bottom:14px; color:var(--text);">
          Загружает данные о клиентах из 8 файлов выгрузки 1С: реквизиты, договоры, отсрочки, задолженность, заказы, продажи.
          Файлы должны лежать в папке <code style="background:#F3F4F6; padding:1px 6px; border-radius:4px;">Claude Cowork/Claude code/Данные 1С/</code>.
        </p>
        <div style="display:flex; gap:12px; align-items:center; flex-wrap:wrap; margin-bottom:14px;">
          <button class="btn btn-primary" id="onec-run">📥 Импорт из 1С (выбрать 8 файлов)</button>
          <span class="text-sm text-muted">Последний импорт: <b style="color:var(--text);">${lastImpText}</b></span>
        </div>
        ${importStats ? `
          <div style="display:flex; gap:16px; font-size:13px; color:var(--text-muted); padding:10px 14px; background:#F9FAFB; border-radius:8px;">
            <span>+${importStats.added} новых</span>
            <span>${importStats.updated} обновлено</span>
            <span>${importStats.archived} в архив</span>
          </div>
        ` : ''}
        <details style="margin-top:14px;">
          <summary style="cursor:pointer; font-size:12px; color:var(--text-muted);">Какие файлы нужны и как они связаны?</summary>
          <div style="font-size:12px; color:var(--text-muted); margin-top:10px; line-height:1.7;">
            ${ONEC_FILE_TYPES.map(t => `<div>• <b>${escapeHtml(t.label)}</b>${t.required ? ' <span style="color:var(--danger);">(обязательный)</span>' : ''}</div>`).join('')}
            <div style="margin-top:8px; padding:10px; background:#F0F9FF; border-radius:6px; color:#1E40AF;">
              ℹ Данные не отправляются в интернет — импорт работает локально в браузере. Контакты и комментарии менеджеров не перезаписываются. Полная архитектура слияния — см. документацию.
            </div>
          </div>
        </details>
      </div>
    </div>

    <div class="grid grid-2 mb-4" style="grid-template-columns:1fr 1fr;">
      <div class="card">
        <div class="card-header"><div class="card-title">Выгрузка клиентов (менеджеры)</div></div>
        <div class="card-body">
          <p class="text-sm text-muted" style="margin-bottom:10px;">Список клиентов основной базы в Excel: контакты, менеджер, этап, категория, события, комментарии.</p>
          <button class="btn btn-dark" id="exp-clients">📤 Выгрузить клиентов в XLSX</button>
        </div>
      </div>
      <div class="card">
        <div class="card-header"><div class="card-title">Выгрузка базы ТП</div></div>
        <div class="card-body">
          <p class="text-sm text-muted" style="margin-bottom:10px;">Полный свод по клиентам, собранным торговыми представителями.</p>
          <button class="btn btn-dark" id="exp-tp">📤 Выгрузить базу ТП в XLSX</button>
        </div>
      </div>
      <div class="card">
        <div class="card-header"><div class="card-title">Загрузка планов выручки</div></div>
        <div class="card-body">
          <p class="text-sm text-muted" style="margin-bottom:8px;">Файл Excel со столбцами (первая строка — заголовки):</p>
          <div class="text-sm" style="padding:10px 12px; background:#F3F4F6; border-radius:8px; margin-bottom:10px; font-family:monospace;">Менеджер | Месяц | План</div>
          <p class="text-sm text-muted" style="margin-bottom:8px;">«Месяц» — название (Январь…Декабрь) или число 1–12. «План» — сумма выручки.</p>
          <input type="file" id="imp-plans" accept=".xlsx,.xls" style="display:none;">
          <button class="btn btn-sm" id="imp-plans-btn">📤 Загрузить планы</button>
          <button class="btn btn-sm" id="dl-plan-tpl">Скачать шаблон</button>
          <div id="imp-result" class="text-sm" style="margin-top:10px;"></div>
        </div>
      </div>
    </div>
  `;
}
function afterExport() {
  document.getElementById('onec-run')?.addEventListener('click', onec_runImport);
  document.getElementById('exp-clients').onclick = exportClientsXlsx;
  document.getElementById('exp-tp').onclick = exportTpXlsx;
  const fi = document.getElementById('imp-plans');
  document.getElementById('imp-plans-btn').onclick = () => fi.click();
  fi.onchange = (e) => { if (e.target.files[0]) importPlansXlsx(e.target.files[0]); };
  document.getElementById('dl-plan-tpl').onclick = downloadPlanTemplate;
}
function exportTpXlsx() {
  if (typeof XLSX === 'undefined') { alert('Библиотека экспорта не загрузилась.'); return; }
  const rows = state.tpClients.map(c => ({
    'Торговый представитель': c.rep||'', 'Город': c.city||'', 'Зона': c.zone||'', 'Тип клиента': c.type||'',
    'Наименование': c.name||'', 'Адрес': c.address||'', 'ИНН': c.inn||'',
    'Контактное лицо': c.contact_name||'', 'Телефон': c.phone||'', 'Почта': c.email||'',
    'Программа': c.program||'', 'Группы': c.groups||'', 'Приоритет': c.priority||'',
    'Парк / СТО': c.fleet||'', 'Бренды з/ч': c.brands_parts||'', 'Бренды масла': c.brands_oil||'',
    'Статус работы': c.work_status||'', 'Условия': c.work_terms||'', 'Менеджер': c.manager||'',
    'В основной базе': tpMainMatch(c) ? 'Да' : 'Нет', 'Комментарий': c.comment||'',
  }));
  const ws = XLSX.utils.json_to_sheet(rows);
  ws['!cols'] = Object.keys(rows[0]||{a:1}).map(() => ({ wch: 20 }));
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, 'База ТП');
  XLSX.writeFile(wb, `WestPart_база_ТП_${new Date().toISOString().slice(0,10)}.xlsx`);
}

// =================== BOOTSTRAP ===================
initData();

</script>
