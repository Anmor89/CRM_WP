// =================== ACTIVITY (unified table of events + comments) ===================
function activityKindLabel(kind, source) {
  if (source === 'event') {
    return ({ call:'Звонок', meeting:'Встреча', contract:'Договор', followup:'Контроль' })[kind] || 'Событие';
  }
  return ({ note:'Заметка', call:'Звонок', meeting:'Встреча', email:'Письмо', other:'Другое' })[kind] || 'Комментарий';
}
function activityChipClass(kind, source) {
  if (source === 'event') {
    return ({ call:'chip-info', meeting:'chip-default', contract:'chip-yellow', followup:'chip-success' })[kind] || 'chip-default';
  }
  return ({ note:'chip-default', call:'chip-info', meeting:'chip-default', email:'chip-info', other:'chip-default' })[kind] || 'chip-default';
}
function activityIcon(kind, source) {
  const map = { call:'📞', meeting:'🤝', contract:'📝', followup:'✅', note:'📝', email:'✉️', other:'•' };
  return source === 'event' ? '📅' : (map[kind] || '•');
}

function getAllActivity() {
  // Unified list: events + comments
  const items = [];
  state.events.forEach(e => items.push({
    id: e.id, source: 'event', kind: e.kind, date: e.date,
    clientId: e.clientId, author: e.author,
    title: e.title, text: '', completed: !!e.completed
  }));
  state.comments.forEach(c => items.push({
    id: c.id, source: 'comment', kind: c.kind, date: c.date,
    clientId: c.clientId, author: c.author,
    title: '', text: c.text, completed: null
  }));
  // Restrict to clients the user can see
  const allowedIds = new Set(visibleClients().map(c => c.id));
  return items.filter(i => allowedIds.has(i.clientId));
}

function applyActivityFilters(items) {
  const f = state.activityFilters;
  return items.filter(i => {
    // Kind filter
    if (f.kind !== 'all') {
      if (f.kind === 'event' && i.source !== 'event') return false;
      if (f.kind === 'comment' && i.source !== 'comment') return false;
      if (!['all','event','comment'].includes(f.kind) && i.kind !== f.kind) return false;
    }
    // Manager filter
    if (f.manager !== 'all') {
      const cl = getClient(i.clientId);
      if (!cl || cl.manager !== f.manager) return false;
    }
    // Period
    if (f.period && f.period !== '0') {
      const days = parseInt(f.period, 10);
      if (!isNaN(days)) {
        const cutoff = Date.now() - days * 86400000;
        if (new Date(i.date).getTime() < cutoff) return false;
      }
    }
    // Search
    if (state.filters.search) {
      const s = state.filters.search.toLowerCase();
      const cl = getClient(i.clientId);
      const hay = `${cl?cl.name:''} ${i.author||''} ${i.title||''} ${i.text||''}`.toLowerCase();
      if (!hay.includes(s)) return false;
    }
    return true;
  });
}

function renderActivity() {
  const managers = uniqueManagers();
  const f = state.activityFilters;
  return `
    <div class="filter-bar">
      <select id="af-kind">
        <option value="all">Все типы</option>
        <optgroup label="События">
          <option value="event" ${f.kind==='event'?'selected':''}>Все события</option>
          <option value="call" ${f.kind==='call'?'selected':''}>Звонок (план)</option>
          <option value="meeting" ${f.kind==='meeting'?'selected':''}>Встреча (план)</option>
          <option value="contract" ${f.kind==='contract'?'selected':''}>Договор (план)</option>
          <option value="followup" ${f.kind==='followup'?'selected':''}>Контроль (план)</option>
        </optgroup>
        <optgroup label="Комментарии">
          <option value="comment" ${f.kind==='comment'?'selected':''}>Все комментарии</option>
          <option value="note" ${f.kind==='note'?'selected':''}>Заметка</option>
          <option value="email" ${f.kind==='email'?'selected':''}>Письмо</option>
        </optgroup>
      </select>
      <select id="af-manager">
        <option value="all">Все менеджеры</option>
        ${managers.map(m => `<option value="${escapeHtml(m)}" ${f.manager===m?'selected':''}>${escapeHtml(m)}</option>`).join('')}
      </select>
      <select id="af-period">
        <option value="7" ${f.period==='7'?'selected':''}>За неделю</option>
        <option value="30" ${f.period==='30'?'selected':''}>За 30 дней</option>
        <option value="90" ${f.period==='90'?'selected':''}>За 90 дней</option>
        <option value="365" ${f.period==='365'?'selected':''}>За год</option>
        <option value="0" ${f.period==='0'?'selected':''}>За всё время</option>
      </select>
      <button class="btn btn-ghost btn-sm" id="af-reset">Сбросить</button>
      <div style="margin-left:auto; display:flex; gap:8px; align-items:center;">
        <span class="text-sm text-muted">Найдено: <b id="af-count">—</b></span>
        <button class="btn btn-primary btn-sm" id="af-add-event">+ Запланировать событие</button>
      </div>
    </div>

    <div class="grid grid-4 mb-4">
      <div class="kpi"><div class="kpi-accent"></div><div class="kpi-label">Всего записей</div><div class="kpi-value" id="af-k-total">—</div></div>
      <div class="kpi"><div class="kpi-accent" style="background:var(--info)"></div><div class="kpi-label">Запланировано</div><div class="kpi-value" id="af-k-planned">—</div><div class="kpi-sub">не выполнено</div></div>
      <div class="kpi"><div class="kpi-accent" style="background:var(--success)"></div><div class="kpi-label">Выполнено</div><div class="kpi-value" id="af-k-done">—</div></div>
      <div class="kpi"><div class="kpi-accent" style="background:var(--warning)"></div><div class="kpi-label">Комментариев</div><div class="kpi-value" id="af-k-comments">—</div></div>
    </div>

    <div class="card">
      <div class="card-header">
        <div class="card-title">Лента активности</div>
        <span class="text-sm text-muted">Сортировка: новые сверху</span>
      </div>
      <table class="data">
        <thead>
          <tr>
            <th style="width: 130px;">Дата</th>
            <th style="width: 70px;">Тип</th>
            <th>Клиент</th>
            <th>Менеджер</th>
            <th>Описание</th>
            <th>Автор</th>
            <th style="width: 110px;">Статус</th>
          </tr>
        </thead>
        <tbody id="activity-tbody"></tbody>
      </table>
    </div>
  `;
}

function afterActivity() {
  const bindActF = (id, key) => {
    const el = document.getElementById(id);
    if (!el) return;
    el.addEventListener('change', () => { state.activityFilters[key] = el.value; drawActivityTable(); });
  };
  bindActF('af-kind', 'kind');
  bindActF('af-manager', 'manager');
  bindActF('af-period', 'period');
  document.getElementById('af-reset').onclick = () => {
    state.activityFilters = { kind: 'all', manager: 'all', period: '0' };
    state.filters.search = '';
    document.getElementById('global-search').value = '';
    renderView();
  };
  document.getElementById('af-add-event').onclick = () => openEventModal(null);
  drawActivityTable();
}

function drawActivityTable() {
  const all = getAllActivity();
  const filtered = applyActivityFilters(all);
  const sorted = [...filtered].sort((a, b) => new Date(b.date) - new Date(a.date));

  document.getElementById('af-count').textContent = sorted.length;
  const k = {
    total: sorted.length,
    planned: sorted.filter(i => i.source === 'event' && !i.completed).length,
    done: sorted.filter(i => i.source === 'event' && i.completed).length,
    comments: sorted.filter(i => i.source === 'comment').length,
  };
  document.getElementById('af-k-total').textContent = fmt.int(k.total);
  document.getElementById('af-k-planned').textContent = fmt.int(k.planned);
  document.getElementById('af-k-done').textContent = fmt.int(k.done);
  document.getElementById('af-k-comments').textContent = fmt.int(k.comments);

  const tbody = document.getElementById('activity-tbody');
  if (!sorted.length) {
    tbody.innerHTML = `<tr><td colspan="7"><div class="empty-state"><div class="empty-state-icon">📭</div>Активности по выбранным фильтрам нет</div></td></tr>`;
    return;
  }
  tbody.innerHTML = sorted.slice(0, 500).map(i => {
    const cl = getClient(i.clientId);
    const desc = i.source === 'event'
      ? `<span class="fw-600">${escapeHtml(i.title || '—')}</span>`
      : `<span title="${escapeHtml(i.text)}">${escapeHtml((i.text || '').slice(0, 140))}${i.text && i.text.length > 140 ? '…' : ''}</span>`;
    let status;
    if (i.source === 'event') {
      const past = new Date(i.date) < new Date();
      if (i.completed) status = '<span class="chip chip-success">Выполнено</span>';
      else if (past) status = '<span class="chip chip-danger">Просрочено</span>';
      else status = '<span class="chip chip-info">Запланировано</span>';
    } else {
      status = '<span class="chip chip-default">Комментарий</span>';
    }
    return `
      <tr data-cid="${i.clientId}" data-eid="${i.source === 'event' ? i.id : ''}">
        <td>
          <div class="fw-600 text-sm">${fmt.date(i.date)}</div>
          <div class="text-sm text-muted">${fmt.daysAgo(i.date)}</div>
        </td>
        <td>
          <span class="chip ${activityChipClass(i.kind, i.source)}">${activityIcon(i.kind, i.source)} ${activityKindLabel(i.kind, i.source)}</span>
        </td>
        <td class="fw-600">${escapeHtml(cl ? cl.name : '— клиент удалён —')}</td>
        <td>${escapeHtml(cl ? cl.manager : '')}</td>
        <td>${desc}</td>
        <td class="text-sm">${escapeHtml(i.author || '')}</td>
        <td>${status}</td>
      </tr>
    `;
  }).join('');
  if (sorted.length > 500) {
    tbody.insertAdjacentHTML('beforeend', `<tr><td colspan="7" class="muted text-sm" style="text-align:center;padding:14px;">Показано 500 из ${sorted.length}. Уточните фильтры.</td></tr>`);
  }
  tbody.querySelectorAll('tr[data-cid]').forEach(tr => tr.addEventListener('click', () => {
    if (tr.dataset.eid) openEventModal(tr.dataset.eid);
    else openClientModal(tr.dataset.cid);
  }));
}

// =================== MODAL HELPERS ===================
function openModal(html, extraClass='') {
  const layer = document.getElementById('modal-layer');
  const modal = document.getElementById('modal-content');
  modal.className = 'modal' + (extraClass ? ' ' + extraClass : '');
  modal.innerHTML = html;
  layer.classList.remove('hidden');
  layer.onclick = (e) => { if (e.target === layer) closeModal(); };
  document.body.style.overflow = 'hidden';
}
function closeModal() {
  document.getElementById('modal-layer').classList.add('hidden');
  document.body.style.overflow = '';
}
document.addEventListener('keydown', (e) => { if (e.key === 'Escape') closeModal(); });

// =================== BOOTSTRAP ===================
initData();
// auto-login? No — show login.

</script>
